name: Advance M3-01 To Next Task

on:
  push:
    branches:
      - work/m3-02-scene-beat-cross-chapter

permissions:
  contents: write

jobs:
  advance:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Record M3-01 and activate next task
        run: pnpm task:advance -- --ci=success --commit=82400d6cf35247a54c84b46faab065938e39310c
      - name: Validate and commit task transition
        run: |
          pnpm task:validate
          git rm .github/workflows/advance-m3-01.yml
          git add docs/tasks/ACTIVE_TASK.json docs/tasks/ACTIVE_TASK.md docs/tasks/TASK_INDEX.md docs/tasks/M3/M3-01_PROJECT_BRIEF_OUTLINE.md docs/tasks/M3/M3-02_SCENE_BEAT_CROSS_CHAPTER.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore(M3): record M3-01 and activate M3-02"
          git push
