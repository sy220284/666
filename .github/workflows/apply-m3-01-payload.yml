name: Apply M3-01 Implementation Payload

on:
  push:
    branches:
      - work/m3-01-project-brief-outline

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Reconstruct and verify implementation patch
        run: |
          set -euo pipefail
          cat .m3-upload/xz00 .m3-upload/xz01 .m3-upload/xz02 .m3-upload/xz03 \
            | base64 --decode \
            | xz --decompress --stdout > /tmp/m3-01.patch
          git apply --check /tmp/m3-01.patch
          git apply /tmp/m3-01.patch
      - name: Commit formal M3-01 implementation
        run: |
          set -euo pipefail
          rm -rf .m3-upload
          git rm .github/workflows/apply-m3-01-payload.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat(M3-01): implement project brief and outline tree"
          git push
