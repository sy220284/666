name: Apply M3-03 Patch

on:
  push:
    branches:
      - work/m3-03-entity-canon
    paths:
      - .github/workflows/apply-m3-03-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-03-entity-canon
          fetch-depth: 0
      - name: Apply uploaded patch
        shell: bash
        run: |
          set -euo pipefail
          test -f .m3-upload/m3-03.patch.b64
          base64 --decode .m3-upload/m3-03.patch.b64 > /tmp/m3-03.patch
          git apply --check /tmp/m3-03.patch
          git apply /tmp/m3-03.patch
          rm -f .m3-upload/m3-03.patch.b64
          rmdir .m3-upload 2>/dev/null || true
          rm -f .github/workflows/apply-m3-03-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(M3-03): implement entity and static canon"
          git push origin HEAD:work/m3-03-entity-canon
