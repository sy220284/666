name: Temporary Apply Renderer Architecture Task Cards

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'policy/task-plan-renderer-architecture' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply task plan
        run: |
          python .github/governance/apply_renderer_task_cards.py
          python .github/governance/apply_renderer_task_governance.py
      - name: Remove temporary applicator
        run: |
          rm -rf .github/governance/renderer-task-cards
          rm -f .github/governance/apply_renderer_task_cards.py
          rm -f .github/governance/apply_renderer_task_governance.py
          rm -f .github/workflows/apply-renderer-task-cards.yml
      - name: Commit generated planning documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs(tasks): insert renderer architecture migration cards"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
