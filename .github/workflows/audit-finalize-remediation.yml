name: Audit Finalize Remediation

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

concurrency:
  group: audit-finalize-remediation
  cancel-in-progress: true

jobs:
  finalize-and-self-remove:
    if: ${{ !contains(github.event.head_commit.message, 'apply final formatter and IPC documentation') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-m0-m2-remediation
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Update frozen IPC contract
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const file = 'docs/contracts/IPC_CONTRACTS.md';
          let source = await readFile(file, 'utf8');
          const oldRow = '| `trash.previewPermanentDelete`  | projectId、trashEntryId                               | 影响数量、Version/Candidate阻断项与planHash |';
          const newRow = '| `trash.previewPermanentDelete`  | projectId、trashEntryId                               | 影响数量、全部章节外键阻断项与planHash      |';
          if (!source.includes(oldRow)) throw new Error('TRASH_PREVIEW_ROW_NOT_FOUND');
          source = source.replace(oldRow, newRow);

          const highRisk = '高风险结构执行前先重算预览并校验`planHash`、Draft Revision、块Hash、归属和LockGuard；预检通过后创建已验证恢复点，再在单个项目库事务中提交结构与Draft Revision。任一重校验失败都不修改原结构。';
          const highRiskReplacement = `${highRisk}\n\n永久删除预览以SQLite外键元数据为权威来源。除受控Draft内部引用外，任何指向\`chapters\`的外键都必须返回\`source=表名.字段名\`、引用数量和\`ON DELETE\`动作；Version、Candidate及\`CASCADE/RESTRICT/NO ACTION/SET NULL/SET DEFAULT\`引用均阻断执行。Core在写事务内重新扫描并验证完整\`planHash\`，Renderer不得提交表名、引用数量或删除动作。`;
          if (!source.includes(highRisk)) throw new Error('HIGH_RISK_PARAGRAPH_NOT_FOUND');
          source = source.replace(highRisk, highRiskReplacement);

          const backupLines = '- `backup.create/list/verify/restoreToCopy/delete`\n- `trash.list/restore/permanentDelete`';
          const recoveryLines = '- `backup.create/list/verify/restoreToCopy/delete`\n- `recovery.createCheckpoint/getOverview/restoreCheckpoint/exportVersion`\n- `trash.list/restore/permanentDelete`';
          if (!source.includes(backupLines)) throw new Error('BACKUP_COMMANDS_NOT_FOUND');
          source = source.replace(backupLines, recoveryLines);

          const settingsLine = '- `settings.get/set/reset`';
          const recoveryBoundary = `${settingsLine}\n\n\`recovery.getOverview\`在项目数据库仍可读取时直接返回只读Version目录；\`project.sqlite\`物理不可读且\`readOnlyReason=integrity-failed\`时，只允许从外部Checkpoint回退。Checkpoint必须通过路径边界、普通文件且非符号链接、大小、SHA-256、SQLite完整性、外键和项目ID校验，才能向Renderer暴露Version。\`recovery.exportVersion\`按已验证Checkpoint顺序查找并原子写入用户选择目录，不修改损坏源库或Checkpoint。`;
          if (!source.includes(settingsLine)) throw new Error('SETTINGS_LINE_NOT_FOUND');
          source = source.replace(settingsLine, recoveryBoundary);
          await writeFile(file, source, 'utf8');
          NODE
      - name: Apply locked formatter
        run: pnpm exec prettier --write tests/e2e/structure-recovery.spec.ts docs/contracts/IPC_CONTRACTS.md
      - name: Remove bootstrap authorization
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const file = '.github/audit-remediations/m0-m2-2026-07-20.json';
          const manifest = JSON.parse(await readFile(file, 'utf8'));
          manifest.governancePaths = manifest.governancePaths.filter(
            (value) => value !== '.github/workflows/audit-finalize-remediation.yml',
          );
          await writeFile(file, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          NODE
          rm .github/workflows/audit-finalize-remediation.yml
      - name: Commit exact finalization output
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'style(audit): apply final formatter and IPC documentation'
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
