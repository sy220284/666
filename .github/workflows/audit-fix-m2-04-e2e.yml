name: Audit Fix M2-04 E2E

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

concurrency:
  group: audit-fix-m2-04-e2e
  cancel-in-progress: true

jobs:
  fix-and-self-remove:
    if: ${{ !contains(github.event.head_commit.message, 'use created TimelineEvent id') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-m0-m2-remediation
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Repair event id lookup
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const file = 'tests/e2e/structure-recovery.spec.ts';
          let source = await readFile(file, 'utf8');
          const before = `      if (!event.ok) throw new Error(\`E2E_TIMELINE_EVENT_FAILED:\${event.error.code}\`);\n      return {\n        projectId: active.data.projectId,\n        chapterId: chapter.id,\n        eventId: event.data.id,\n      };`;
          const after = `      if (!event.ok) throw new Error(\`E2E_TIMELINE_EVENT_FAILED:\${event.error.code}\`);\n      const createdEvent = event.data.timelineEvents.find(\n        (candidate) => candidate.title === '拆出章节锚点',\n      );\n      if (!createdEvent) throw new Error('E2E_TIMELINE_EVENT_MISSING');\n      return {\n        projectId: active.data.projectId,\n        chapterId: chapter.id,\n        eventId: createdEvent.id,\n      };`;
          if (!source.includes(before)) throw new Error('EVENT_ID_PATTERN_NOT_FOUND');
          source = source.replace(before, after);
          await writeFile(file, source, 'utf8');
          NODE
      - name: Apply locked formatter and typecheck
        run: |
          pnpm exec prettier --write tests/e2e/structure-recovery.spec.ts
          pnpm typecheck
      - name: Remove bootstrap authorization
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const file = '.github/audit-remediations/m0-m2-2026-07-20.json';
          const manifest = JSON.parse(await readFile(file, 'utf8'));
          manifest.governancePaths = manifest.governancePaths.filter(
            (value) => value !== '.github/workflows/audit-fix-m2-04-e2e.yml',
          );
          await writeFile(file, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          NODE
          rm .github/workflows/audit-fix-m2-04-e2e.yml
      - name: Commit repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'test(M2-04): use created TimelineEvent id'
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
