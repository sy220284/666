name: Audit Fix Permanent Delete Executable

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Apply exact implementation fix and regression
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          implementation = Path('packages/core-service/src/reference-aware-structure-operations.ts')
          source = implementation.read_text(encoding='utf-8')
          pattern = re.compile(
              r"(override assertPermanentDeleteExecutable\([\s\S]*?const input = TrashPermanentDeleteInputSchema\.parse\(raw\);\n)"
              r"\s*const preview = this\.previewPermanentDelete\(input\);"
          )
          replacement = (
              r"\1    const preview = this.previewPermanentDelete({\n"
              r"      projectId: input.projectId,\n"
              r"      trashEntryId: input.trashEntryId,\n"
              r"    });"
          )
          source, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'implementation replacement count={count}')
          implementation.write_text(source, encoding='utf-8')

          test = Path('tests/integration/audit-m0-m2-remediation.test.ts')
          source = test.read_text(encoding='utf-8')
          marker = "      expect(clear.canDelete).toBe(true);\n"
          regression = """      expect(clear.canDelete).toBe(true);
              expect(() =>
                harness.operations.assertPermanentDeleteExecutable({
                  projectId: project.projectId,
                  trashEntryId: trashEntry.id,
                  planHash: clear.planHash,
                  confirmationTitle: trashEntry.title,
                }),
              ).not.toThrow();
          """
          if source.count(marker) != 1:
              raise SystemExit(f'test insertion marker count={source.count(marker)}')
          test.write_text(source.replace(marker, regression, 1), encoding='utf-8')
          PY
          rm -f docs/process/AUDIT_PERMANENT_DELETE_DIAGNOSTIC.txt
          git rm .github/workflows/audit-fix-permanent-delete-executable.yml
      - name: Commit fix
        shell: bash
        run: |
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix(M2-04): validate executable delete preview input"
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
