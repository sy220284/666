name: Audit Fix Permanent Delete Executable

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

env:
  CI: true

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply exact fix and regression
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          implementation = Path('packages/core-service/src/reference-aware-structure-operations.ts')
          source = implementation.read_text(encoding='utf-8')
          old = """    const input = TrashPermanentDeleteInputSchema.parse(raw);
              const preview = this.previewPermanentDelete(input);
          """
          new = """    const input = TrashPermanentDeleteInputSchema.parse(raw);
              const preview = this.previewPermanentDelete({
                projectId: input.projectId,
                trashEntryId: input.trashEntryId,
              });
          """
          if source.count(old) != 1:
              raise SystemExit('expected assertPermanentDeleteExecutable implementation not found exactly once')
          implementation.write_text(source.replace(old, new), encoding='utf-8')

          test = Path('tests/integration/audit-m0-m2-remediation.test.ts')
          source = test.read_text(encoding='utf-8')
          old = """      expect(clear.canDelete).toBe(true);

                await harness.workspace.writeProject(randomUUID(), project.projectId, (database) => {
          """
          new = """      expect(clear.canDelete).toBe(true);
                expect(() =>
                  harness.operations.assertPermanentDeleteExecutable({
                    projectId: project.projectId,
                    trashEntryId: trashEntry.id,
                    planHash: clear.planHash,
                    confirmationTitle: trashEntry.title,
                  }),
                ).not.toThrow();

                await harness.workspace.writeProject(randomUUID(), project.projectId, (database) => {
          """
          if source.count(old) != 1:
              raise SystemExit('expected remediation regression insertion point not found exactly once')
          test.write_text(source.replace(old, new), encoding='utf-8')
          PY
          rm -f docs/process/AUDIT_PERMANENT_DELETE_DIAGNOSTIC.txt
          git rm .github/workflows/audit-fix-permanent-delete-executable.yml
      - name: Format changed source
        run: pnpm exec prettier --write packages/core-service/src/reference-aware-structure-operations.ts tests/integration/audit-m0-m2-remediation.test.ts
      - name: Run targeted regression
        run: pnpm exec vitest run tests/integration/audit-m0-m2-remediation.test.ts tests/integration/structure-operations.test.ts --reporter=verbose
      - name: Run typecheck
        run: pnpm typecheck
      - name: Commit verified fix
        shell: bash
        run: |
          git add packages/core-service/src/reference-aware-structure-operations.ts tests/integration/audit-m0-m2-remediation.test.ts docs/process/AUDIT_PERMANENT_DELETE_DIAGNOSTIC.txt .github/workflows/audit-fix-permanent-delete-executable.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix(M2-04): validate executable delete preview input"
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
