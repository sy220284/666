name: Audit Format Permanent Delete Regression

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Fix exact regression indentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/integration/audit-m0-m2-remediation.test.ts')
          source = path.read_text(encoding='utf-8')
          marker = '      expect(clear.canDelete).toBe(true);'
          marker_index = source.index(marker)
          start = source.index('\n    expect(() =>', marker_index) + 1
          end = source.index('\n\n      await harness.workspace.writeProject', start)
          block = source[start:end]
          if not block.endswith(').not.toThrow();'):
              raise SystemExit('unexpected regression block')
          formatted = '\n'.join(f'  {line}' for line in block.splitlines())
          path.write_text(source[:start] + formatted + source[end:], encoding='utf-8')
          PY
          git rm .github/workflows/audit-format-permanent-delete-regression.yml
      - name: Commit formatting
        shell: bash
        run: |
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "test(M2-04): format executable delete regression"
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
