name: Audit Remediation Formatter

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

concurrency:
  group: audit-remediation-formatter
  cancel-in-progress: true

jobs:
  format-and-self-remove:
    if: ${{ !contains(github.event.head_commit.message, 'apply locked formatter and remove bootstrap') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-m0-m2-remediation
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply locked formatter
        run: |
          pnpm exec prettier --write \
            scripts/audit-remediation-policy.mjs \
            apps/desktop/renderer/src/audit-trash-reference-guard.ts \
            packages/contracts/src/project-structure.ts \
            packages/core-service/src/checkpoint-aware-recovery.ts \
            packages/core-service/src/reference-aware-structure-operations.ts \
            packages/core-service/src/utility-entry.ts
      - name: Restore permanent workflow and remove bootstrap authorization
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/quality.yml
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const file = '.github/audit-remediations/m0-m2-2026-07-20.json';
          const manifest = JSON.parse(await readFile(file, 'utf8'));
          manifest.governancePaths = manifest.governancePaths.filter(
            (value) =>
              value !== '.github/workflows/audit-format-remediation.yml' &&
              value !== '.github/workflows/quality.yml',
          );
          await writeFile(file, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          NODE
          rm .github/workflows/audit-format-remediation.yml
      - name: Commit exact formatter output
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'style(audit): apply locked formatter and remove bootstrap'
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
