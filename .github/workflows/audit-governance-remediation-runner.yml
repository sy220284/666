name: Audit Governance Remediation Runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'fix/governance-m3-stage-close' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-m3-stage-close
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Execute embedded remediation source
        shell: bash
        run: |
          python - <<'BOOTSTRAP'
          from pathlib import Path
          import textwrap

          taskctl = Path('scripts/taskctl.mjs')
          taskctl_source = taskctl.read_text(encoding='utf-8')
          actual = "      pending: [\n        'standard evidence package and screenshots',\n        'manual acceptance and exhaustive quality matrix',\n        'final traceability verification status',\n        'Verified closure',\n      ],"
          normalized = "      pending: [\n      'standard evidence package and screenshots',\n      'manual acceptance and exhaustive quality matrix',\n      'final traceability verification status',\n      'Verified closure',\n      ],"
          if taskctl_source.count(actual) != 1:
              raise SystemExit('scripts/taskctl.mjs deferred ledger source block changed')
          taskctl.write_text(taskctl_source.replace(actual, normalized), encoding='utf-8')

          source = Path('.github/workflows/audit-governance-remediation.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n      - name: Format", start)
          script = textwrap.dedent(source[start:end])
          script = script.replace(
              "raise SystemExit(f'{path}: expected one match, found {count}')",
              "raise SystemExit(f'{path}: expected one match, found {count}: {before[:120]!r}')",
          )
          Path('/tmp/audit-governance-remediation.py').write_text(script, encoding='utf-8')
          BOOTSTRAP
          set +e
          python /tmp/audit-governance-remediation.py > remediation-error.txt 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 80 remediation-error.txt
            exit "$status"
          fi
          rm remediation-error.txt
      - name: Upload remediation failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: audit-governance-remediation-error
          path: remediation-error.txt
          if-no-files-found: error
          retention-days: 2
      - name: Format and run focused tests
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec prettier --write scripts/task-control-lib.mjs scripts/taskctl.mjs .github/governance/task-transition-policy.mjs tests/unit/task-control.test.ts tests/integration/task-lifecycle.test.ts docs/process/DEVELOPMENT_AUTOMATION.md
          pnpm test:unit -- tests/unit/task-control.test.ts tests/unit/evidence-policy.test.ts
          pnpm test:integration -- tests/integration/task-lifecycle.test.ts
      - name: Commit remediation and remove helpers
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/audit-governance-remediation.yml .github/workflows/audit-governance-remediation-runner.yml
          git add scripts/task-control-lib.mjs scripts/taskctl.mjs .github/governance/task-transition-policy.mjs tests/unit/task-control.test.ts tests/integration/task-lifecycle.test.ts docs/process/DEVELOPMENT_AUTOMATION.md
          git commit -m "fix(governance): close M3 before M4 activation"
          git push origin HEAD:fix/governance-m3-stage-close
