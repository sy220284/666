name: Audit Governance Remediation

on:
  push:
    branches:
      - fix/governance-m3-stage-close

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-m3-stage-close
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply audited governance changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, before, after):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(before)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              p.write_text(text.replace(before, after), encoding='utf-8')

          def replace_range(path, start_marker, end_marker, replacement):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              p.write_text(text[:start] + replacement + text[end:], encoding='utf-8')

          stage_block = r'''function taskStageNumber(taskId) {
            const match = /^M(\d+)-\d{2}$/u.exec(taskId ?? '');
            return match?.[1] ? Number(match[1]) : null;
          }

          function dependencyStageNumbers(dependencyText) {
            const stages = new Set();
            for (const match of dependencyText.matchAll(/M(\d+)(?!-)/gu)) {
              if (match[1]) stages.add(Number(match[1]));
            }
            for (const match of dependencyText.matchAll(/M(\d+)\s*[—–]\s*M?(\d+)(?!\d)/gu)) {
              const start = Number(match[1]);
              const end = Number(match[2]);
              for (let stage = start; stage <= end; stage += 1) stages.add(stage);
            }
            return stages;
          }

          export function stageCloseDependencyStages(task) {
            const targetStage = taskStageNumber(task?.id);
            if (targetStage === null || !/-01$/u.test(task?.id ?? '')) return [];
            const stages = dependencyStageNumbers(task.dependencyText.trim());
            for (const requiredId of task.dependencyText.match(/M\d+-\d{2}/gu) ?? []) {
              const stage = taskStageNumber(requiredId);
              if (stage !== null) stages.add(stage);
            }
            return [...stages].filter((stage) => stage < targetStage).sort((left, right) => left - right);
          }

          export function stageClosureErrors(task, taskIndex, state = {}) {
            const errors = [];
            for (const stage of stageCloseDependencyStages(task)) {
              const prefix = `M${stage}-`;
              const stageTasks = [...taskIndex.values()].filter(({ id }) => id.startsWith(prefix));
              if (stageTasks.length === 0) {
                errors.push(`${task.id} activation requires indexed M${stage} tasks`);
                continue;
              }
              for (const stageTask of stageTasks) {
                if (stageTask.status !== 'Verified') {
                  errors.push(`${stageTask.id} must be Verified before ${task.id} activation`);
                }
              }
              const deferred = (state.deferredVerification ?? [])
                .map((entry) => entry?.id)
                .filter((id) => typeof id === 'string' && id.startsWith(prefix));
              if (deferred.length > 0) {
                errors.push(
                  `M${stage} deferredVerification must be empty before ${task.id}: ${deferred.join(', ')}`,
                );
              }
            }
            return errors;
          }

          export function dependenciesSatisfied(task, taskIndex, options = {}) {
            const dependencyText = task.dependencyText.trim();
            if (dependencyText === '无') return true;
            if (stageClosureErrors(task, taskIndex, options.state).length > 0) return false;

            const strictStages = new Set(stageCloseDependencyStages(task));
            const dependencyReady = (status, stage = null) =>
              status === 'Verified' ||
              (options.allowImplemented === true && !strictStages.has(stage) && status === 'Implemented');

            const requiredIds = new Set(dependencyText.match(/M\d+-\d{2}/g) ?? []);
            for (const requiredId of requiredIds) {
              if (!dependencyReady(taskIndex.get(requiredId)?.status, taskStageNumber(requiredId))) return false;
            }

            for (const stage of dependencyStageNumbers(dependencyText)) {
              const stageTasks = [...taskIndex.values()].filter(({ id }) => id.startsWith(`M${stage}-`));
              if (
                stageTasks.length === 0 ||
                stageTasks.some(({ status }) => !dependencyReady(status, stage))
              ) {
                return false;
              }
            }

            return true;
          }

          export function findNextReadyTask(taskIndex, options = {}) {
            const tasks = [...taskIndex.values()];
            let executionFrontier = -1;
            for (let index = 0; index < tasks.length; index += 1) {
              if (tasks[index]?.status !== 'Planned') executionFrontier = index;
            }

            const next = tasks.slice(executionFrontier + 1).find((task) => task.status === 'Planned');
            if (!next) return undefined;
            return dependenciesSatisfied(next, taskIndex, options) ? next : undefined;
          }

          '''
          replace_range(
              'scripts/task-control-lib.mjs',
              'export function dependenciesSatisfied',
              'export function replaceTaskIndexStatus',
              stage_block,
          )

          replace_once(
              'scripts/taskctl.mjs',
              "  renderActiveTask,\n  replaceTaskCardStatus,",
              "  renderActiveTask,\n  replaceTaskCardStatus,\n  stageCloseDependencyStages,\n  stageClosureErrors,",
          )
          replace_once(
              'scripts/taskctl.mjs',
              "import { validateTaskEvidence } from './evidence-policy.mjs';",
              "import { assertEvidenceHead, validateTaskEvidence } from './evidence-policy.mjs';\nimport { validateAllVerifiedEvidence } from './verified-evidence-scan.mjs';",
          )
          replace_once(
              'scripts/taskctl.mjs',
              "const indexPath = path.join(root, 'docs/tasks/TASK_INDEX.md');\n",
              """const indexPath = path.join(root, 'docs/tasks/TASK_INDEX.md');

          function git(argumentsList) {
            return execFileSync('git', argumentsList, {
              cwd: root,
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            }).trim();
          }

          function currentHead() {
            return git(['rev-parse', 'HEAD']);
          }

          function commitTree(commit) {
            try {
              return git(['rev-parse', `${commit}^{tree}`]);
            } catch (error) {
              throw new Error(`Cannot resolve commit tree for ${commit}`, { cause: error });
            }
          }

          function assertCommitAncestor(ancestor, descendant, label) {
            try {
              git(['merge-base', '--is-ancestor', ancestor, descendant]);
            } catch (error) {
              throw new Error(`${label} must be an ancestor of the expected Head`, { cause: error });
            }
          }
          """,
          )

          verify_task = r'''async function verifyTask(taskId) {
            const ciStatus = process.argv.find((value) => value.startsWith('--ci='))?.slice(5);
            const commit = process.argv.find((value) => value.startsWith('--commit='))?.slice(9);
            const expectedHead = process.argv
              .find((value) => value.startsWith('--expected-head='))
              ?.slice('--expected-head='.length);
            const implementationHead = process.argv
              .find((value) => value.startsWith('--implementation-head='))
              ?.slice('--implementation-head='.length);
            const mainCommit = process.argv
              .find((value) => value.startsWith('--main-commit='))
              ?.slice('--main-commit='.length);
            if (ciStatus !== 'success') throw new Error('verify-task requires --ci=success');
            if (!commit || !/^[0-9a-f]{7,40}$/iu.test(commit)) {
              throw new Error('verify-task requires --commit=<sha>');
            }
            for (const [label, value] of [
              ['--expected-head', expectedHead],
              ['--implementation-head', implementationHead],
              ['--main-commit', mainCommit],
            ]) {
              if (!/^[0-9a-f]{40}$/iu.test(value ?? '')) {
                throw new Error(`verify-task requires ${label}=<full-sha>`);
              }
            }
            assertEvidenceHead(expectedHead, root);
            assertCommitAncestor(mainCommit, expectedHead, 'mainCommit');
            const implementationTree = commitTree(implementationHead);
            const mainTree = commitTree(mainCommit);
            if (implementationTree !== mainTree) {
              throw new Error('Squash provenance requires identical implementation and main trees');
            }

            const { state, taskIndex } = await load();
            const target = taskIndex.get(taskId);
            if (!target || !['In Progress', 'Implemented'].includes(target.status)) {
              throw new Error(`${taskId} must be In Progress or Implemented before verification`);
            }
            const active = state.activeTask?.id === taskId;
            if (target.status === 'In Progress' && !active) {
              throw new Error(`${taskId} is In Progress but is not the active task`);
            }
            if (target.status === 'Implemented') {
              const deferred = (state.deferredVerification ?? []).some((entry) => entry.id === taskId);
              if (!deferred) throw new Error(`${taskId} is not in deferredVerification`);
            }

            await validateTaskEvidence(taskId, root, { final: true, expectedHead });
            const evidenceManifest = JSON.parse(
              await readFile(path.join(root, 'docs/test-evidence', taskId, 'manifest.json'), 'utf8'),
            );
            if (evidenceManifest.commit !== mainCommit) {
              throw new Error(`${taskId} evidence manifest must bind the reachable main commit`);
            }
            const indexSource = await readFile(indexPath, 'utf8');
            const verifiedIndex = replaceTaskIndexStatus(indexSource, taskId, 'Verified');
            const cardPath = path.join(root, target.source);
            const card = await readFile(cardPath, 'utf8');
            const verifiedCard = replaceTaskCardStatus(card, target.status, 'Verified');
            if (verifiedCard === card) throw new Error(`${taskId} card is not ${target.status}`);
            await writeFile(cardPath, verifiedCard, 'utf8');

            state.deferredVerification = (state.deferredVerification ?? []).filter(
              (entry) => entry.id !== taskId,
            );
            state.lastVerifiedTask = {
              id: taskId,
              commit,
              verifiedAt: new Date().toISOString(),
              evidenceHead: expectedHead,
              squashProvenance: {
                implementationHead,
                mainCommit,
                implementationTree,
                mainTree,
              },
            };

            if (!active) {
              await writeActiveState(state, verifiedIndex);
              console.log(`Verified deferred task ${taskId}; active task remains ${state.activeTask.id}.`);
              return;
            }

            const refreshedIndex = parseTaskIndex(verifiedIndex);
            const next = findNextReadyTask(refreshedIndex, {
              allowImplemented: true,
              state,
            });
            if (!next) throw new Error('No implementation-ready Planned task remains');
            state.activeTask = null;
            await Promise.all([
              writeFile(indexPath, verifiedIndex, 'utf8'),
              writeFile(statePath, `${JSON.stringify(state, null, 2)}\n`, 'utf8'),
            ]);
            await activate(next.id);
            console.log(`Verified active task ${taskId}; advanced to ${next.id}.`);
          }

          '''
          replace_range('scripts/taskctl.mjs', 'async function verifyTask', 'async function sync', verify_task)

          activate_block = r'''async function activate(taskId, additionalAllowedPaths = []) {
            const { state, taskIndex } = await load();
            if (state.activeTask) {
              throw new Error(`Cannot activate ${taskId} while ${state.activeTask.id} is still active`);
            }
            const task = taskIndex.get(taskId);
            if (!task) throw new Error(`Unknown task: ${taskId}`);
            if (task.status !== 'Planned') throw new Error(`${taskId} must be Planned, found ${task.status}`);
            const allowImplemented = ['implementation-mainline', 'implementation-pr'].includes(
              state.authorization.mode,
            );
            const stageErrors = stageClosureErrors(task, taskIndex, state);
            if (stageErrors.length > 0) throw new Error(stageErrors.join('\n'));
            if (!dependenciesSatisfied(task, taskIndex, { allowImplemented, state })) {
              throw new Error(
                `${taskId} dependencies are not ${allowImplemented ? 'Implemented or Verified' : 'Verified'}`,
              );
            }
            if (stageCloseDependencyStages(task).length > 0) {
              await validateAllVerifiedEvidence(root, currentHead());
            }

            const card = await readFile(path.join(root, task.source), 'utf8');
            const allowedPaths = extractBacktickBullets(card, '主要影响范围');
            const requiredDocs = extractBacktickBullets(card, '必读文档');
            if (allowedPaths.length === 0 || requiredDocs.length === 0) {
              throw new Error(`${taskId} card lacks machine-readable paths or required documents`);
            }

            const controlPaths = [
              'package.json',
              'pnpm-lock.yaml',
              'pnpm-workspace.yaml',
              'docs/tasks/ACTIVE_TASK.json',
              'docs/tasks/ACTIVE_TASK.md',
              'docs/tasks/TASK_INDEX.md',
              task.source,
              'docs/product/V1.0_TRACEABILITY_MATRIX.md',
              `docs/test-evidence/${taskId}/`,
            ];
            const taskBranch =
              state.authorization.mode === 'implementation-pr'
                ? taskBranchFor(task)
                : state.authorization.branch;
            state.activeTask = {
              id: taskId,
              status: 'IN_PROGRESS',
              source: task.source,
              branch: taskBranch,
              startedAt: new Date().toISOString().slice(0, 10),
              allowedPaths: [...new Set([...allowedPaths, ...controlPaths, ...additionalAllowedPaths])],
              forbiddenPaths: [],
              requiredDocs,
              verification: verificationForTask(card),
            };

            const indexSource = await readFile(indexPath, 'utf8');
            const updatedIndex = replaceTaskIndexStatus(indexSource, taskId, 'In Progress');
            const updatedCard = replaceTaskCardStatus(card, 'Planned', 'In Progress');
            if (updatedCard === card) throw new Error(`${taskId} card status is not Planned`);
            await writeFile(path.join(root, task.source), updatedCard, 'utf8');
            await writeActiveState(state, updatedIndex);
            console.log(`Activated ${taskId} on ${taskBranch}.`);
          }

          '''
          replace_range('scripts/taskctl.mjs', 'async function activate', 'async function close', activate_block)
          replace_once(
              'scripts/taskctl.mjs',
              'const next = findNextReadyTask(refreshedIndex);',
              'const next = findNextReadyTask(refreshedIndex, { state });',
          )
          replace_once(
              'scripts/taskctl.mjs',
              'const next = findNextReadyTask(refreshedIndex, { allowImplemented: true });',
              'const next = findNextReadyTask(refreshedIndex, { allowImplemented: true, state });',
          )
          replace_once(
              'scripts/taskctl.mjs',
              """      pending: [
                'standard evidence package and screenshots',
                'manual acceptance and exhaustive quality matrix',
                'final traceability verification status',
                'Verified closure',
              ],""",
              """      pending: [
                'four-file evidence package and real automated run records',
                'necessary manual review conclusions recorded in summary.md',
                'risk-based screenshots, full logs, or independent quality matrix when warranted',
                'final traceability verification status',
                'Verified closure',
              ],""",
          )

          replace_once(
              '.github/governance/task-transition-policy.mjs',
              "import { fileURLToPath } from 'node:url';\n",
              "import { fileURLToPath } from 'node:url';\n\nimport { stageClosureErrors } from '../../scripts/task-control-lib.mjs';\n",
          )
          transition_parse = r'''export function parseTaskRows(markdown) {
            const tasks = new Map();
            const pattern =
              /^\|\s*(M\d-\d{2})\s*\|\s*\[[^\]]+\]\(([^)]+)\)\s*\|\s*([^|]+?)\s*\|\s*([^|]+?)\s*\|\s*$/gmu;
            for (const match of markdown.matchAll(pattern)) {
              tasks.set(match[1], {
                id: match[1],
                source: path.posix.join('docs/tasks', match[2]),
                dependencyText: match[3].trim(),
                status: match[4].trim(),
              });
            }
            return tasks;
          }

          '''
          replace_range(
              '.github/governance/task-transition-policy.mjs',
              'export function parseTaskRows',
              'function taskBranchFor',
              transition_parse,
          )
          replace_once(
              '.github/governance/task-transition-policy.mjs',
              """  errors.push(...activeNextTaskErrors(headState, headTasks, previous.id));
            return errors;
          }

          export function revalidationReopenErrors""",
              """  errors.push(...activeNextTaskErrors(headState, headTasks, previous.id));
            const nextTask = headTasks.get(headState?.activeTask?.id);
            if (nextTask) errors.push(...stageClosureErrors(nextTask, headTasks, headState));
            return errors;
          }

          export function revalidationReopenErrors""",
          )
          replace_once(
              '.github/governance/task-transition-policy.mjs',
              """  if (nextId && baseTasks.get(nextId)?.status !== 'Planned') {
              errors.push(`Restored task ${nextId} must be Planned in the base TASK_INDEX`);
            }
            return errors;
          }

          function governanceBranch""",
              """  if (nextId && baseTasks.get(nextId)?.status !== 'Planned') {
              errors.push(`Restored task ${nextId} must be Planned in the base TASK_INDEX`);
            }
            const nextTask = headTasks.get(nextId);
            if (nextTask) errors.push(...stageClosureErrors(nextTask, headTasks, headState));
            return errors;
          }

          function governanceBranch""",
          )
          replace_once(
              '.github/governance/task-transition-policy.mjs',
              'function task(id, source, status) {\n  return { id, source, status };\n}',
              "function task(id, source, status, dependencyText = '无') {\n  return { id, source, status, dependencyText };\n}",
          )

          replace_once(
              'tests/unit/task-control.test.ts',
              '  replaceTaskIndexStatus,\n  validateActiveState,',
              '  replaceTaskIndexStatus,\n  stageClosureErrors,\n  validateActiveState,',
          )
          unit_test = r'''
            it('requires a verified, debt-free stage before activating its successor', () => {
              const implemented = parseTaskIndex(`
          | ID | 任务卡 | 依赖 | 状态 |
          |---|---|---|---|
          | M3-01 | [一](M3/M3-01.md) | M2 | Implemented |
          | M3-10 | [十](M3/M3-10.md) | M3-09 | Implemented |
          | M4-01 | [四](M4/M4-01.md) | M3 | Planned |
          `);
              const m4 = implemented.get('M4-01')!;
              expect(
                dependenciesSatisfied(m4, implemented, {
                  allowImplemented: true,
                  state: { deferredVerification: [{ id: 'M3-01' }] },
                }),
              ).toBe(false);
              expect(
                stageClosureErrors(m4, implemented, {
                  deferredVerification: [{ id: 'M3-01' }],
                }),
              ).toEqual(
                expect.arrayContaining([
                  'M3-01 must be Verified before M4-01 activation',
                  'M3-10 must be Verified before M4-01 activation',
                  'M3 deferredVerification must be empty before M4-01: M3-01',
                ]),
              );
              expect(
                findNextReadyTask(implemented, {
                  allowImplemented: true,
                  state: { deferredVerification: [] },
                }),
              ).toBeUndefined();

              const verified = parseTaskIndex(
                `
          | ID | 任务卡 | 依赖 | 状态 |
          |---|---|---|---|
          | M3-01 | [一](M3/M3-01.md) | M2 | Verified |
          | M3-10 | [十](M3/M3-10.md) | M3-09 | Verified |
          | M4-01 | [四](M4/M4-01.md) | M3 | Planned |
          `,
              );
              expect(
                dependenciesSatisfied(m4, verified, {
                  allowImplemented: true,
                  state: { deferredVerification: [] },
                }),
              ).toBe(true);
              expect(
                findNextReadyTask(verified, {
                  allowImplemented: true,
                  state: { deferredVerification: [] },
                })?.id,
              ).toBe('M4-01');
            });

          '''
          replace_once(
              'tests/unit/task-control.test.ts',
              "  it('updates exactly one task index status', () => {",
              unit_test + "  it('updates exactly one task index status', () => {",
          )

          lifecycle_append = r'''

          describe('M3 stage closure lifecycle', () => {
            it('blocks implementation advance from M3-10 to M4-01 until M3 is Verified', async () => {
              const root = await mkdtemp(path.join(os.tmpdir(), 'worldforge-m3-close-'));
              temporaryDirectories.push(root);
              await mkdir(path.join(root, 'docs/tasks/M3'), { recursive: true });
              const state = {
                schemaVersion: 1,
                authorization: {
                  mode: 'implementation-mainline',
                  branch: 'main',
                  deferVerificationUntilBatch: true,
                },
                activeTask: {
                  id: 'M3-10',
                  status: 'IN_PROGRESS',
                  source: 'docs/tasks/M3/M3-10.md',
                  branch: 'main',
                  startedAt: '2026-07-21',
                  allowedPaths: ['apps/desktop/renderer/'],
                  forbiddenPaths: [],
                  requiredDocs: [],
                  verification: ['pnpm test'],
                },
                deferredVerification: [{ id: 'M3-01' }],
              };
              const index = `| ID | 任务卡 | 依赖 | 状态 |\n|---|---|---|---|\n| M3-01 | [一](M3/M3-01.md) | M2 | Implemented |\n| M3-10 | [十](M3/M3-10.md) | M3-09 | In Progress |\n| M4-01 | [四](M4/M4-01.md) | M3 | Planned |\n`;
              await Promise.all([
                writeFile(path.join(root, 'docs/tasks/ACTIVE_TASK.json'), JSON.stringify(state), 'utf8'),
                writeFile(path.join(root, 'docs/tasks/ACTIVE_TASK.md'), renderActiveTask(state), 'utf8'),
                writeFile(path.join(root, 'docs/tasks/TASK_INDEX.md'), index, 'utf8'),
                writeFile(path.join(root, 'docs/tasks/M3/M3-10.md'), '# M3-10\n\n> 状态：In Progress  \n', 'utf8'),
              ]);

              expect(() =>
                execFileSync(
                  process.execPath,
                  [path.resolve('scripts/taskctl.mjs'), 'advance', '--ci=success', '--commit=abcdef1'],
                  { cwd: root, stdio: 'pipe' },
                ),
              ).toThrow();
              expect(
                JSON.parse(await readFile(path.join(root, 'docs/tasks/ACTIVE_TASK.json'), 'utf8')),
              ).toEqual(state);
              expect(await readFile(path.join(root, 'docs/tasks/TASK_INDEX.md'), 'utf8')).toBe(index);
            });

            it('requires an explicit expected Head and squash provenance for verify-task', async () => {
              const root = await mkdtemp(path.join(os.tmpdir(), 'worldforge-verify-head-'));
              temporaryDirectories.push(root);
              expect(() =>
                execFileSync(
                  process.execPath,
                  [
                    path.resolve('scripts/taskctl.mjs'),
                    'verify-task',
                    'M3-01',
                    '--ci=success',
                    '--commit=abcdef1',
                  ],
                  { cwd: root, stdio: 'pipe' },
                ),
              ).toThrow(/--expected-head/);
            });
          });
          '''
          p = Path('tests/integration/task-lifecycle.test.ts')
          p.write_text(p.read_text(encoding='utf-8') + lifecycle_append, encoding='utf-8')

          replace_once(
              'tests/integration/task-lifecycle.test.ts',
              """    expect(updatedState.deferredVerification).toEqual([
                expect.objectContaining({ id: 'M1-01', implementationCommit: 'abcdef1' }),
              ]);""",
              """    expect(updatedState.deferredVerification).toEqual([
                expect.objectContaining({
                  id: 'M1-01',
                  implementationCommit: 'abcdef1',
                  pending: [
                    'four-file evidence package and real automated run records',
                    'necessary manual review conclusions recorded in summary.md',
                    'risk-based screenshots, full logs, or independent quality matrix when warranted',
                    'final traceability verification status',
                    'Verified closure',
                  ],
                }),
              ]);""",
          )

          replace_once(
              'docs/process/DEVELOPMENT_AUTOMATION.md',
              '''M3-10完成后统一执行一次M3批次复验，集中关闭M3-01、M3-03、M3-05及其他延期项。M4开始前必须完成M3阶段闭环。''',
              '''M3-10完成后统一执行一次M3批次复验，集中关闭M3-01、M3-03、M3-05及其他延期项。`taskctl`不得把`Implemented`视为跨阶段依赖已满足：激活M4-01前，M3全部任务必须为`Verified`，`deferredVerification`不得包含M3任务，并同步执行全量Verified Evidence扫描。任一条件失败时，`dependenciesSatisfied`、`findNextReadyTask`、`activate`和`advance`均必须阻断。''',
          )
          replace_once(
              'docs/process/DEVELOPMENT_AUTOMATION.md',
              '''- `summary.md`集中记录实现范围、实际测试结果、人工复核、质量结论和必要说明；
          - `commands.txt`只记录真实执行过的命令、退出码和必要上下文；
          - `known-risks.md`记录剩余风险，无风险时明确写“无”；
          - `manifest.json`只负责文件完整性和来源提交绑定；
