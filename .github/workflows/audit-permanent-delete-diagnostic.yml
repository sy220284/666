name: Audit Permanent Delete Diagnostic

on:
  push:
    branches: [fix/governance-audit-m0-m2-remediation]

permissions:
  contents: write

env:
  CI: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:prepare
      - name: Create routed permanent-delete diagnostic
        shell: bash
        run: |
          cat > tests/integration/__audit-permanent-delete-diagnostic.test.ts <<'TEST'
          import { createHash, randomUUID } from 'node:crypto';
          import { mkdir, mkdtemp, rm } from 'node:fs/promises';
          import { tmpdir } from 'node:os';
          import path from 'node:path';

          import { afterEach, describe, expect, it } from 'vitest';
          import { PROJECT_STRUCTURE_COMMANDS, RequestIdSchema } from '@worldforge/contracts';

          import { openAppRuntime } from '../../packages/core-service/src/app-runtime.js';
          import { CheckpointAwareRecoveryService } from '../../packages/core-service/src/checkpoint-aware-recovery.js';
          import { ProjectStructureService } from '../../packages/core-service/src/project-structure.js';
          import { ProjectWorkspaceService } from '../../packages/core-service/src/project-workspace.js';
          import { ReferenceAwareStructureOperationService } from '../../packages/core-service/src/reference-aware-structure-operations.js';
          import { routeStructureProjectOperation } from '../../packages/core-service/src/utility-project-structure-router.js';
          import type { UtilityProjectServices } from '../../packages/core-service/src/utility-project-services.js';

          const roots: string[] = [];
          const clock = { now: () => new Date('2026-07-20T13:30:00.000Z') };

          function checkpointRequestId(requestId: string): string {
            const hex = createHash('sha256')
              .update(`${requestId}:checkpoint`, 'utf8')
              .digest('hex')
              .slice(0, 32);
            return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-5${hex.slice(13, 16)}-8${hex.slice(17, 20)}-${hex.slice(20)}`;
          }

          afterEach(async () => {
            await Promise.all(roots.splice(0).map((root) => rm(root, { recursive: true, force: true })));
          });

          describe('routed permanent delete diagnostic', () => {
            it('creates the checkpoint and deletes after a TimelineEvent anchor is cleared', async () => {
              const root = await mkdtemp(path.join(tmpdir(), 'worldforge-permanent-delete-diagnostic-'));
              roots.push(root);
              const projects = path.join(root, 'projects');
              const backups = path.join(root, 'operation-recovery');
              await Promise.all([mkdir(projects, { recursive: true }), mkdir(backups, { recursive: true })]);
              const appRuntime = await openAppRuntime({
                databasePath: path.join(root, 'app.sqlite'),
                migrationsDirectory: 'migrations/app',
                recoveryDirectory: path.join(root, 'app-recovery'),
                appVersion: '0.1.0',
                clock,
              });
              const workspace = new ProjectWorkspaceService({
                projectMigrationsDirectory: 'migrations/project',
                projectMigrationRecoveryDirectory: path.join(root, 'migration-recovery'),
                appVersion: '0.1.0',
                recentProjects: appRuntime.recentProjects,
                clock,
              });
              try {
                const structure = new ProjectStructureService(workspace, { clock });
                const recovery = new CheckpointAwareRecoveryService(workspace, {
                  backupRootDirectory: backups,
                  clock,
                });
                const operations = new ReferenceAwareStructureOperationService(workspace);
                const project = await workspace.create(
                  randomUUID(),
                  { name: '永久删除诊断', channel: '长篇' },
                  projects,
                );
                const chapter = structure.list(project.projectId).volumes[0]!.chapters[0]!;
                const eventId = randomUUID();
                await workspace.writeProject(randomUUID(), project.projectId, (database) => {
                  database
                    .prepare(
                      `INSERT INTO timeline_events(
                         id, project_id, title, start_value, end_value, precision, chapter_id,
                         location_id, description, status, archived_at, created_at, updated_at
                       ) VALUES(?, ?, ?, ?, NULL, 'day', ?, NULL, ?, 'active', NULL, ?, ?)`,
                    )
                    .run(
                      eventId,
                      project.projectId,
                      '诊断锚点',
                      '2026-07-20',
                      chapter.id,
                      '先绑定后解除。',
                      clock.now().toISOString(),
                      clock.now().toISOString(),
                    );
                });
                await structure.deleteChapter(randomUUID(), {
                  projectId: project.projectId,
                  chapterId: chapter.id,
                });
                const trashEntry = structure.listTrash(project.projectId).entries[0]!;
                const blocked = operations.previewPermanentDelete({
                  projectId: project.projectId,
                  trashEntryId: trashEntry.id,
                });
                console.log('DIAG blocked', JSON.stringify(blocked));
                expect(blocked.canDelete).toBe(false);
                await workspace.writeProject(randomUUID(), project.projectId, (database) => {
                  database.prepare('UPDATE timeline_events SET chapter_id = NULL WHERE id = ?').run(eventId);
                });
                const clear = operations.previewPermanentDelete({
                  projectId: project.projectId,
                  trashEntryId: trashEntry.id,
                });
                console.log('DIAG clear', JSON.stringify(clear));
                expect(clear.canDelete).toBe(true);
                const outerRequestId = randomUUID();
                const derived = checkpointRequestId(outerRequestId);
                console.log('DIAG requestIds', outerRequestId, derived, RequestIdSchema.safeParse(derived));
                const services = {
                  recovery,
                  structureOperations: operations,
                  checkpointRequestId,
                } as unknown as UtilityProjectServices;
                const result = await routeStructureProjectOperation(services, outerRequestId, {
                  operation: PROJECT_STRUCTURE_COMMANDS.permanentDelete,
                  input: {
                    projectId: project.projectId,
                    trashEntryId: trashEntry.id,
                    planHash: clear.planHash,
                    confirmationTitle: trashEntry.title,
                  },
                });
                console.log('DIAG routed result', JSON.stringify(result));
                console.log(
                  'DIAG persisted',
                  workspace.readProject(project.projectId, (database) => ({
                    chapterCount: String(
                      database.prepare('SELECT COUNT(*) AS count FROM chapters WHERE id = ?').get(chapter.id)?.count,
                    ),
                    trashCount: String(
                      database.prepare('SELECT COUNT(*) AS count FROM trash_entries WHERE id = ?').get(trashEntry.id)?.count,
                    ),
                    backupCount: String(
                      database
                        .prepare("SELECT COUNT(*) AS count FROM backup_records WHERE operation = 'permanent-delete'")
                        .get()?.count,
                    ),
                  })),
                );
                expect(result).toMatchObject({
                  ok: true,
                  operation: PROJECT_STRUCTURE_COMMANDS.permanentDelete,
                  data: { deleted: true, trashEntryId: trashEntry.id },
                });
              } finally {
                await workspace.shutdown();
                await appRuntime.close();
              }
            });
          });
          TEST
      - name: Run routed diagnostic
        id: diagnostic
        shell: bash
        run: |
          set +e
          pnpm exec vitest run tests/integration/__audit-permanent-delete-diagnostic.test.ts --reporter=verbose 2>&1 | tee /tmp/permanent-delete-diagnostic.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: permanent-delete-diagnostic
          path: /tmp/permanent-delete-diagnostic.log
          if-no-files-found: error
          retention-days: 7
      - name: Remove diagnostic workflow
        if: always()
        shell: bash
        run: |
          rm -f tests/integration/__audit-permanent-delete-diagnostic.test.ts
          git rm .github/workflows/audit-permanent-delete-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore(audit): remove permanent delete diagnostic"
          git push origin HEAD:fix/governance-audit-m0-m2-remediation
      - name: Fail when diagnostic failed
        if: steps.diagnostic.outputs.status != '0'
        run: exit 1
