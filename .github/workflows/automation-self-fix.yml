name: M1-05 Automation Self Fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/automation-self-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply deterministic source and workflow fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              content = file.read_text()
              if old not in content:
                  raise SystemExit(f'Anchor not found in {path}: {old[:120]!r}')
              file.write_text(content.replace(old, new, 1))

          utility = Path('packages/core-service/src/utility-entry.ts')
          source = utility.read_text()
          if "case 'DRAFT_REVISION_CONFLICT':" not in source:
              pattern = re.compile(
                  r"  if \(error instanceof DraftServiceError\) \{.*?\n  \}\n  if \(error instanceof ProjectStructureError\)",
                  re.DOTALL,
              )
              replacement = """  if (error instanceof DraftServiceError) {
              switch (error.code) {
                case 'DRAFT_NOT_FOUND':
                  return 'DRAFT_NO_ACTIVE_005';
                case 'DRAFT_BLOCK_NOT_FOUND':
                  return 'COMMON_NOT_FOUND_002';
                case 'DRAFT_REVISION_CONFLICT':
                  return 'DRAFT_REVISION_CONFLICT_001';
                case 'DRAFT_BLOCK_HASH_CONFLICT':
                  return 'DRAFT_BLOCK_HASH_CONFLICT_002';
                case 'DRAFT_PATCH_INVALID':
                  return 'DRAFT_PATCH_INVALID_004';
                case 'DRAFT_INVARIANT_FAILED':
                  return 'COMMON_CONFLICT_003';
              }
            }
            if (error instanceof ProjectStructureError)"""
              source, count = pattern.subn(replacement, source, count=1)
              if count != 1:
                  raise SystemExit('Draft error mapping block was not found exactly once')

          if 'case DRAFT_COMMANDS.applyPatch:' not in source:
              pattern = re.compile(
                  r"(      case DRAFT_COMMANDS\.saveDraftSnapshot:\n"
                  r"        return CoreProjectResultSchema\.parse\(\{\n"
                  r"          ok: true,\n"
                  r"          operation: operation\.operation,\n"
                  r"          data: await drafts\.saveSnapshot\(requestId, operation\.input\),\n"
                  r"        \}\);\n)"
              )
              addition = """      case DRAFT_COMMANDS.applyPatch:
                  return CoreProjectResultSchema.parse({
                    ok: true,
                    operation: operation.operation,
                    data: await drafts.applyPatch(requestId, operation.input),
                  });
          """
              source, count = pattern.subn(lambda match: match.group(1) + addition, source, count=1)
              if count != 1:
                  raise SystemExit('Draft saveSnapshot switch case was not found exactly once')
          utility.write_text(source)

          release_tool = Path('scripts/release-tool.mjs')
          release_source = release_tool.read_text()
          if "Release workflow is missing the release acceptance gate" not in release_source:
              old = """  for (const token of ['workflow_dispatch:', 'pnpm release:gate', 'gh release create']) {
              if (!workflowSource.includes(token)) errors.push('Release workflow is missing: ' + token);
            }
          """
              new = """  for (const token of ['workflow_dispatch:', 'gh release create']) {
              if (!workflowSource.includes(token)) errors.push('Release workflow is missing: ' + token);
            }
            const hasReleaseGate =
              workflowSource.includes('pnpm release:gate') ||
              (workflowSource.includes('uses: ./.github/workflows/quality-core.yml') &&
                workflowSource.includes('enforce_release_gate: true'));
            if (!hasReleaseGate) errors.push('Release workflow is missing the release acceptance gate');
          """
              if old not in release_source:
                  raise SystemExit('Release validator token loop was not found')
              release_tool.write_text(release_source.replace(old, new, 1))

          quality = Path('.github/workflows/quality-core.yml')
          quality_source = quality.read_text()
          old_package = '          pnpm package 2>&1 | tee test-results/ci/package-smoke.log\n'
          if old_package in quality_source:
              quality_source = quality_source.replace(
                  old_package,
                  """          {
                    pnpm build
                    pnpm package
                  } 2>&1 | tee test-results/ci/package-smoke.log
          """,
                  1,
              )
              quality.write_text(quality_source)
          elif 'pnpm build\n                    pnpm package' not in quality_source:
              raise SystemExit('Package smoke command was not found')

          for workflow in ['.github/workflows/release.yml', '.github/workflows/nightly-quality.yml']:
              file = Path(workflow)
              content = file.read_text()
              anchor = '      - run: pnpm install --frozen-lockfile\n      - name:'
              if anchor in content:
                  content = content.replace(
                      anchor,
                      '      - run: pnpm install --frozen-lockfile\n      - run: pnpm build\n      - name:',
                      1,
                  )
                  file.write_text(content)
              elif '      - run: pnpm build\n      - name:' not in content:
                  raise SystemExit(f'Package build insertion point not found in {workflow}')
          PY
      - name: Format and validate affected automation
        shell: bash
        run: |
          pnpm exec prettier --write \
            packages/core-service/src/utility-entry.ts \
            scripts/release-tool.mjs \
            .github/workflows/quality-core.yml \
            .github/workflows/release.yml \
            .github/workflows/nightly-quality.yml
          pnpm release:check
          pnpm --filter @worldforge/domain build
          pnpm --filter @worldforge/contracts build
          pnpm --filter @worldforge/core-service build
      - name: Commit fixes and remove one-time workflow
        shell: bash
        run: |
          rm .github/workflows/automation-self-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/core-service/src/utility-entry.ts \
            scripts/release-tool.mjs \
            .github/workflows/quality-core.yml \
            .github/workflows/release.yml \
            .github/workflows/nightly-quality.yml \
            .github/workflows/automation-self-fix.yml
          git commit -m "fix(M1-05): complete automated quality pipeline"
          git push origin HEAD:main
