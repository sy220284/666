name: CI Documentation Sync

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci-doc-sync.yml

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.head_ref == 'policy/pr-only-workflow' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Update quality architecture text
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/process/DEVELOPMENT_AUTOMATION.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '→ Task Governance与Quality门禁': '→ PR Policy、Task Governance、Security与Quality门禁',
              '5. PR必须通过`Task Governance`和聚合`quality`门；任一必要检查失败即禁止合并。': '5. PR必须通过`pr-policy`、`task-governance`、`security`和聚合`quality / quality`门；任一必要检查失败即禁止合并。',
              '- GitHub `Task Governance`：按需拉取比较基准，验证任务状态、镜像、修改范围和证据结构。\n- GitHub `Quality`：调用`.github/workflows/quality-core.yml`，以聚合检查`quality`作为合并判据。': '- GitHub `PR Policy`：验证真实PR头分支、治理白名单及永久工作流策略。\n- GitHub `Task Governance`：验证任务状态、镜像、修改范围和证据结构。\n- GitHub `Security`：执行高危依赖审计和仓库凭据扫描。\n- GitHub `Quality`：调用`.github/workflows/quality-core.yml`，以聚合检查`quality / quality`作为合并判据。',
              'PR产生新提交时，旧的Quality和Task Governance运行会自动取消。': 'PR产生新提交时，旧的四类门禁运行会自动取消。',
              'tests（并行矩阵）\n├─ unit\n├─ integration\n├─ migration\n└─ security\n\ndesktop-e2e': 'tests（并行矩阵）\n├─ unit\n├─ integration\n├─ migration\n└─ security\n\nperformance-eval\n├─ 性能预算\n└─ AI输出协议与评估基线\n\ndesktop-e2e',
              '所有测试、E2E、构建和打包作业都会上传独立诊断产物。': '所有测试、性能、E2E、构建和打包作业都会上传独立诊断产物。',
              'PR使用并行专项测试；`pnpm test`保留为本地完整回归命令，不再作为CI中混合所有故障域的单一步骤。': 'Quality永久执行`test:perf`，其范围同时覆盖性能目录和AI输出协议基线；任务卡仍应在`verification`中明确专项命令，便于本地复现和证据登记。`pnpm test`保留为本地完整回归命令，不再作为CI中混合所有故障域的单一步骤。',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing documentation anchor: {old[:80]}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/process/DEVELOPMENT_AUTOMATION.md
          git commit -m 'docs(ci): synchronize permanent quality gates'
          git push origin HEAD:${{ github.head_ref }}
