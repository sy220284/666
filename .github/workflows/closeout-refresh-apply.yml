name: Closeout Refresh Apply

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - docs/tasks/CLOSEOUT_REFRESH_REQUEST.md

permissions:
  contents: write

concurrency:
  group: closeout-refresh-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.event.pull_request.number == 59 && github.head_ref == 'work/m1-08-recovery-readonly-foundation' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - id: guard
        name: Check exact refresh request
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          if [ -f docs/tasks/CLOSEOUT_REFRESH_REQUEST.md ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild validated closeout commit
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          EXPECTED_BRANCH_HEAD: ${{ github.event.pull_request.head.sha }}
          TARGET_BRANCH: ${{ github.head_ref }}
          PLAN_OUTPUT_DIR: ${{ runner.temp }}/closeout-refresh-apply
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PLAN_OUTPUT_DIR" .github/governance
          git fetch origin main
          git show origin/main:.github/governance/closeout-refresh-plan.mjs \
            > .github/governance/closeout-refresh-plan.mjs
          node .github/governance/closeout-refresh-plan.mjs

          BASE_MAIN_SHA="$(node -p "require('$PLAN_OUTPUT_DIR/plan.json').baseMainSha")"
          DESIRED_TREE_SHA="$(node -p "require('$PLAN_OUTPUT_DIR/plan.json').desiredTreeSha")"
          test "$(git rev-parse HEAD)" = "$BASE_MAIN_SHA"
          test "$(git write-tree)" = "$DESIRED_TREE_SHA"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(verification): rebuild closeout on current main'

          test "$(git rev-parse HEAD^)" = "$BASE_MAIN_SHA"
          test "$(git rev-parse HEAD^{tree})" = "$DESIRED_TREE_SHA"
          git push \
            --force-with-lease="refs/heads/$TARGET_BRANCH:$EXPECTED_BRANCH_HEAD" \
            origin "HEAD:refs/heads/$TARGET_BRANCH"

      - name: Upload applied plan
        if: ${{ steps.guard.outputs.run == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: closeout-refresh-applied-plan
          path: ${{ runner.temp }}/closeout-refresh-apply/plan.json
          if-no-files-found: error
          retention-days: 7
