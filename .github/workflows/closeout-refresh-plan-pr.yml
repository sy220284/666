name: Closeout Refresh Plan PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - docs/tasks/CLOSEOUT_REFRESH_REQUEST.md

permissions:
  contents: read
  statuses: write

concurrency:
  group: closeout-refresh-plan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    if: ${{ github.head_ref == 'work/m1-08-recovery-readonly-foundation' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build validated refresh plan
        env:
          EXPECTED_BRANCH_HEAD: ${{ github.event.pull_request.head.sha }}
          PLAN_OUTPUT_DIR: ${{ runner.temp }}/closeout-refresh-plan
        run: node .github/governance/closeout-refresh-plan.mjs

      - name: Upload refresh plan
        uses: actions/upload-artifact@v7
        with:
          name: closeout-refresh-plan
          path: ${{ runner.temp }}/closeout-refresh-plan/plan.json
          if-no-files-found: error
          retention-days: 7

      - name: Publish refresh plan status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          const url = new URL(
            `/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.HEAD_SHA}`,
            'https://api.github.com',
          );
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
            },
            body: JSON.stringify({
              state: 'success',
              context: 'closeout-refresh-plan',
              description: 'Validated closeout refresh plan is ready',
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }),
          });
          if (!response.ok) throw new Error(`Status publish failed: ${response.status}`);
          NODE
