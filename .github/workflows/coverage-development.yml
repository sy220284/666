name: 产品源码覆盖率开发门禁

on:
  pull_request:
    branches:
      - main
    paths:
      - vitest.coverage.config.ts
      - apps/desktop/main/src/**
      - apps/desktop/preload/src/**
      - apps/desktop/renderer/src/**
      - packages/contracts/src/**
      - packages/core-service/src/**
      - packages/domain/src/**
      - packages/editor-core/src/**
      - packages/prompts/src/**
      - tests/**
      - package.json
      - pnpm-lock.yaml
  push:
    branches:
      - fix/governance-audit-coverage-75-2026-07-23

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: 临时安装覆盖率 Provider
        run: pnpm add --workspace-root --save-dev @vitest/coverage-v8@4.1.10 --lockfile=false
      - run: pnpm test:prepare
      - name: 执行产品源码覆盖率
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vitest run --config vitest.coverage.config.ts 2>&1 | tee coverage-run.log
      - name: 输出机器摘要
        if: always()
        run: |
          test -f coverage/coverage-summary.json && cat coverage/coverage-summary.json || true
          tail -n 160 coverage-run.log || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: product-source-coverage
          path: |
            coverage/
            coverage-run.log
          if-no-files-found: error
          retention-days: 7
