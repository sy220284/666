name: main 当前测试覆盖率诊断

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/coverage-diagnostic.yml
  push:
    branches:
      - diagnostic/coverage-main-2026-07-23

permissions:
  contents: read

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: 检出诊断分支
        uses: actions/checkout@v6
      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: 安装项目依赖
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: 临时安装覆盖率 Provider
        run: pnpm add --workspace-root --save-dev @vitest/coverage-v8@4.1.10 --lockfile=false
      - name: 构建测试依赖
        run: pnpm test:prepare
      - name: 生成临时覆盖率配置
        shell: bash
        run: |
          cat > vitest.coverage.config.ts <<'EOF'
          import { defineConfig } from 'vitest/config';

          export default defineConfig({
            test: {
              environment: 'node',
              include: [
                'tests/unit/**/*.test.ts',
                'tests/integration/**/*.test.ts',
                'tests/migration/**/*.test.ts',
                'tests/security/**/*.test.ts',
              ],
              coverage: {
                enabled: true,
                provider: 'v8',
                reporter: ['text', 'json-summary', 'json'],
                reportsDirectory: 'coverage',
                include: ['apps/**/*.{ts,mjs}', 'packages/**/*.ts', 'scripts/**/*.mjs'],
                exclude: ['**/*.d.ts', '**/dist/**', '**/node_modules/**'],
              },
            },
          });
          EOF
      - name: 执行可插桩测试并统计覆盖率
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vitest run --config vitest.coverage.config.ts 2>&1 | tee coverage-run.log
      - name: 汇总覆盖率与低覆盖文件
        if: ${{ always() }}
        shell: bash
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '覆盖率摘要未生成。'
            exit 1
          fi
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const total = report.total;
          const rows = Object.entries(report)
            .filter(([name]) => name !== 'total')
            .map(([name, metrics]) => ({
              file: name.replace(`${process.cwd()}/`, ''),
              statements: metrics.statements.pct,
              branches: metrics.branches.pct,
              functions: metrics.functions.pct,
              lines: metrics.lines.pct,
            }))
            .sort((a, b) => a.lines - b.lines || a.branches - b.branches);
          const output = {
            baseline: '4538660ebf3d0c4f5889bdc1f18c25c34937ca09',
            scope: ['apps/**/*.{ts,mjs}', 'packages/**/*.ts', 'scripts/**/*.mjs'],
            tests: ['unit', 'integration', 'migration', 'security'],
            excludedTestTypes: {
              performance: '覆盖率插桩会扭曲性能预算，不纳入统计',
              electronE2E: '独立 Electron 进程未接入 V8 覆盖率采集，不纳入统计',
            },
            excludes: ['**/*.d.ts', '**/dist/**', '**/node_modules/**'],
            total,
            lowestCoverageFiles: rows.slice(0, 40),
            filesMeasured: rows.length,
          };
          fs.writeFileSync('coverage/coverage-result.json', `${JSON.stringify(output, null, 2)}\n`);
          console.log('COVERAGE_RESULT_START');
          console.log(JSON.stringify(output, null, 2));
          console.log('COVERAGE_RESULT_END');
          NODE
      - name: 上传覆盖率结果
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: main-coverage-diagnostic
          path: |
            coverage/
            coverage-run.log
            vitest.coverage.config.ts
          if-no-files-found: warn
          retention-days: 7
