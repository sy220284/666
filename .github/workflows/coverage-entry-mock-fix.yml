name: 修正Core入口测试Mock

on:
  push:
    branches:
      - fix/governance-audit-coverage-75-2026-07-23

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == '测试：启动Core入口Mock修正'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-coverage-75-2026-07-23
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: 替换动态Mock为显式Mock
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const file = 'tests/unit/core-utility-entry-coverage.test.ts';
          let source = fs.readFileSync(file, 'utf8');
          source = source.replace(
            /for \(const path of \[[\s\S]*?^}\n\nvi\.mock\('\.\.\/\.\.\/packages\/core-service\/src\/project-workspace\.js'/m,
            `vi.mock('../../packages/core-service/src/candidate-apply.js', () => ({\n  CandidateApplyService: class {},\n}));\nvi.mock('../../packages/core-service/src/candidate.js', () => ({\n  CandidateService: class {},\n}));\nvi.mock('../../packages/core-service/src/checkpoint-aware-recovery.js', () => ({\n  CheckpointAwareRecoveryService: class {},\n}));\nvi.mock('../../packages/core-service/src/continuity.js', () => ({\n  ContinuityService: class {},\n}));\nvi.mock('../../packages/core-service/src/coordinated-import-export.js', () => ({\n  CoordinatedImportExportService: class {},\n}));\nvi.mock('../../packages/core-service/src/draft.js', () => ({\n  DraftService: class {},\n}));\nvi.mock('../../packages/core-service/src/entity-canon.js', () => ({\n  EntityCanonService: class {},\n}));\nvi.mock('../../packages/core-service/src/project-planning.js', () => ({\n  ProjectPlanningService: class {},\n}));\nvi.mock('../../packages/core-service/src/project-structure.js', () => ({\n  ProjectStructureService: class {},\n}));\nvi.mock('../../packages/core-service/src/reference-aware-structure-operations.js', () => ({\n  ReferenceAwareStructureOperationService: class {},\n}));\nvi.mock('../../packages/core-service/src/scene-beat.js', () => ({\n  SceneBeatService: class {},\n}));\nvi.mock('../../packages/core-service/src/version.js', () => ({\n  VersionService: class {},\n}));\n\nvi.mock('../../packages/core-service/src/project-workspace.js'`,
          );
          fs.writeFileSync(file, source);
          NODE
      - run: pnpm exec prettier --write tests/unit/core-utility-entry-coverage.test.ts tests/unit/prompts-coverage.test.ts
      - name: 提交修正
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/unit/core-utility-entry-coverage.test.ts tests/unit/prompts-coverage.test.ts
          git diff --cached --quiet && exit 1
          git commit -m '测试：修正Core入口Mock并格式化新增测试'
          git push origin HEAD:fix/governance-audit-coverage-75-2026-07-23
