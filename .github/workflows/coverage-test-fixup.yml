name: 覆盖率测试修正与格式化

on:
  push:
    branches:
      - fix/governance-audit-coverage-75-2026-07-23

permissions:
  contents: write

jobs:
  fixup:
    if: github.event.head_commit.message == '测试：启动覆盖率测试修正'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-coverage-75-2026-07-23
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: 修正测试同步与断言
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const ipcPath = 'tests/unit/ipc-handlers-branch-coverage.test.ts';
          let ipc = fs.readFileSync(ipcPath, 'utf8');
          ipc = ipc.replace(
            'expect(settings.error.retryable).toBe(true);',
            'expect(settings.error.retryable).toBe(false);',
          );
          fs.writeFileSync(ipcPath, ipc);

          const electronPath = 'tests/unit/electron-main-bootstrap-coverage.test.ts';
          let electron = fs.readFileSync(electronPath, 'utf8');
          electron = electron.replace(
            `async function flush(): Promise<void> {\n  await Promise.resolve();\n  await Promise.resolve();\n  await Promise.resolve();\n}`,
            `async function flush(): Promise<void> {\n  for (let index = 0; index < 25; index += 1) await Promise.resolve();\n}`,
          );
          fs.writeFileSync(electronPath, electron);
          NODE
      - name: 使用仓库Prettier统一格式
        run: >-
          pnpm exec prettier --write
          vitest.coverage.config.ts
          .github/workflows/coverage-development.yml
          .github/workflows/coverage-test-fixup.yml
          tests/unit/editor-core-diff-coverage.test.ts
          tests/unit/preload-bridge-coverage.test.ts
          tests/unit/ipc-handlers-branch-coverage.test.ts
          tests/unit/editor-core-draft-document-coverage.test.ts
          tests/unit/core-utility-errors-coverage.test.ts
          tests/unit/core-project-routers-coverage.test.ts
          tests/unit/electron-window-state-coverage.test.ts
          tests/unit/electron-main-bootstrap-coverage.test.ts
      - name: 提交修正
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vitest.coverage.config.ts .github/workflows/coverage-development.yml .github/workflows/coverage-test-fixup.yml tests/unit
          git diff --cached --quiet && exit 0
          git commit -m '测试：修正覆盖率回归测试同步与格式'
          git push origin HEAD:fix/governance-audit-coverage-75-2026-07-23
