name: 修正Candidate Worker测试Mock

on:
  push:
    branches:
      - fix/governance-audit-coverage-75-2026-07-23

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == '测试：启动Candidate Worker Mock修正'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/governance-audit-coverage-75-2026-07-23
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: 修正Worker Mock提升顺序
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const file = 'tests/unit/core-candidate-diff-coverage.test.ts';
          let source = fs.readFileSync(file, 'utf8');
          source = source.replace(
            `const workerState = vi.hoisted(() => ({\n  instances: [] as FakeWorker[],\n}));\n\nclass FakeWorker {\n  readonly listeners = new Map<string, (value: unknown) => void>();\n  readonly terminate = vi.fn(async () => 0);\n  readonly url: URL;\n  readonly options: unknown;\n\n  constructor(url: URL, options: unknown) {\n    this.url = url;\n    this.options = options;\n    workerState.instances.push(this);\n  }\n\n  once(name: string, listener: (value: unknown) => void): this {\n    this.listeners.set(name, listener);\n    return this;\n  }\n\n  emit(name: string, value: unknown): void {\n    this.listeners.get(name)?.(value);\n  }\n}\n\nvi.mock('node:worker_threads', () => ({ Worker: FakeWorker }));`,
            `interface FakeWorkerInstance {\n  readonly listeners: Map<string, (value: unknown) => void>;\n  readonly terminate: ReturnType<typeof vi.fn>;\n  readonly url: URL;\n  readonly options: unknown;\n  emit(name: string, value: unknown): void;\n}\n\nconst workerState = vi.hoisted(() => ({\n  instances: [] as FakeWorkerInstance[],\n}));\n\nvi.mock('node:worker_threads', () => ({\n  Worker: class {\n    readonly listeners = new Map<string, (value: unknown) => void>();\n    readonly terminate = vi.fn(async () => 0);\n    readonly url: URL;\n    readonly options: unknown;\n\n    constructor(url: URL, options: unknown) {\n      this.url = url;\n      this.options = options;\n      workerState.instances.push(this);\n    }\n\n    once(name: string, listener: (value: unknown) => void): this {\n      this.listeners.set(name, listener);\n      return this;\n    }\n\n    emit(name: string, value: unknown): void {\n      this.listeners.get(name)?.(value);\n    }\n  },\n}));`,
          );
          fs.writeFileSync(file, source);
          NODE
      - run: pnpm exec prettier --write tests/unit/core-candidate-diff-coverage.test.ts tests/unit/core-recovery-supervisor-branch-coverage.test.ts tests/unit/core-utility-router-coverage.test.ts tests/unit/renderer-layout-model-coverage.test.ts
      - name: 提交修正
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/unit
          git diff --cached --quiet && exit 1
          git commit -m '测试：修正Candidate Worker Mock并格式化分支测试'
          git push origin HEAD:fix/governance-audit-coverage-75-2026-07-23
