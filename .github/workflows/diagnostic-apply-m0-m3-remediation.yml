name: Diagnostic Apply M0-M3 Remediation

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'diagnostic/apply-m0-m3-remediation' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Download verified remediation artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output remediation.zip \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8538037808/zip"
          echo "cb91468984a1d2c799514f2cc36d5810309332348e9005cb7713ed495929fbf6  remediation.zip" | sha256sum --check
          unzip -oq remediation.zip -d .
          rm remediation.zip
      - name: Materialize clean remediation tree
        shell: bash
        run: |
          rm .github/workflows/diagnostic-apply-m0-m3-remediation.yml
          git config user.name "WorldForge Remediation Materializer"
          git config user.email "worldforge-remediation@users.noreply.github.com"
          git add --all
          git diff --cached --check -- ':!*.md'
          git commit -m "fix(M0-M3): materialize integrated coordination remediation"
          git push origin HEAD:diagnostic/apply-m0-m3-remediation
