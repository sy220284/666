name: PR172 格式诊断

on:
  push:
    branches:
      - diagnostic/format-pr172

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出诊断分支
        uses: actions/checkout@v6
      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
      - name: 配置 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: 生成标准格式
        run: >-
          pnpm exec prettier --write
          packages/core-service/src/app-settings.ts
          .github/audit-remediations/full-code-recheck-2026-07-23.json
      - name: 上传标准格式文件
        uses: actions/upload-artifact@v7
        with:
          name: pr172-formatted-files
          path: |
            packages/core-service/src/app-settings.ts
            .github/audit-remediations/full-code-recheck-2026-07-23.json
          if-no-files-found: error
