name: Diagnostic M0-M3 Security

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-log:
    if: ${{ github.head_ref == 'diagnostic/m0-m3-security-log' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:prepare
      - name: Capture application security result
        shell: bash
        run: |
          set +e
          pnpm test:security 2>&1 | tee security.log
          status=${PIPESTATUS[0]}
          echo "exit=${status}" >> security.log
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: m0-m3-security-log
          path: security.log
          retention-days: 1
