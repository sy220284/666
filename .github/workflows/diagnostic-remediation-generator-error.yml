name: Diagnostic Remediation Generator Error

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    if: ${{ github.head_ref == 'diagnostic/export-integrated-remediation' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Capture generator exception
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          import traceback

          report = Path('generator-error.txt')
          try:
              workflow = Path('.github/workflows/diagnostic-export-integrated-remediation-v2.yml').read_text()
              script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
              exec(compile(textwrap.dedent(script), 'remediation-v2', 'exec'))
              report.write_text('success\n')
          except BaseException:
              report.write_text(traceback.format_exc())
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: remediation-generator-error
          path: generator-error.txt
          retention-days: 1
