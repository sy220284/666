name: Evidence

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  evidence:
    name: evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      EVIDENCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Validate every changed task evidence package
        run: node scripts/evidence-policy.mjs
