name: Fix M3-01 Lint

on:
  push:
    branches:
      - work/m3-01-project-brief-outline

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply lint fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          renderer = Path('apps/desktop/renderer/src/index.ts')
          text = renderer.read_text(encoding='utf-8')
          for target in [
              "let planningMode: 'beginner' | 'professional' = 'beginner';\n",
              "  planningMode = mode;\n",
          ]:
              if text.count(target) != 1:
                  raise SystemExit(f'expected one renderer lint target: {target!r}')
              text = text.replace(target, '', 1)
          renderer.write_text(text, encoding='utf-8')

          service = Path('packages/core-service/src/project-planning.ts')
          text = service.read_text(encoding='utf-8')
          target = '  type PlotNode,\n'
          if text.count(target) != 1:
              raise SystemExit('expected one unused PlotNode type import')
          service.write_text(text.replace(target, '', 1), encoding='utf-8')

          test = Path('tests/integration/project-planning.test.ts')
          text = test.read_text(encoding='utf-8')
          before = "import {\n  ProjectPlanningError,\n  ProjectPlanningService,\n} from '../../packages/core-service/src/project-planning.js';"
          after = "import { ProjectPlanningService } from '../../packages/core-service/src/project-planning.js';\nimport type { ProjectPlanningError } from '../../packages/core-service/src/project-planning.js';"
          if text.count(before) != 1:
              raise SystemExit('expected one planning test import block')
          test.write_text(text.replace(before, after, 1), encoding='utf-8')
          PY
          pnpm exec prettier --write \
            apps/desktop/renderer/src/index.ts \
            packages/core-service/src/project-planning.ts \
            tests/integration/project-planning.test.ts
          pnpm lint
      - name: Commit lint fixes
        run: |
          git rm .github/workflows/fix-m3-01-lint.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix(M3-01): resolve planning lint violations"
          git push
