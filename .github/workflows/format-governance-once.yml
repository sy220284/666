name: Format Governance Once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/format-governance-once.yml

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.head_ref == 'policy/pr-only-workflow' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: |
          pnpm format
          rm .github/workflows/format-governance-once.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style(ci): format final governance files'
          git push origin HEAD:${{ github.head_ref }}
