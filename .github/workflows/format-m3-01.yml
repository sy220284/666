name: Format M3-01 Implementation

on:
  push:
    branches:
      - work/m3-01-project-brief-outline

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Format M3-01 files
        run: |
          pnpm exec prettier --write \
            apps/desktop/preload/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/index.ts \
            packages/contracts/src/project-planning.ts \
            packages/core-service/src/project-planning.ts
      - name: Commit formatting
        run: |
          git rm .github/workflows/format-m3-01.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "style(M3-01): format planning implementation"
          git push
