name: M1-05 Governance Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Remove diagnostic file from the local comparison tree
        run: |
          git config user.name diagnostic
          git config user.email diagnostic@local.invalid
          git rm .github/workflows/m1-05-governance-diagnostic.yml
          git commit -m "diagnostic: exclude workflow from comparison"
      - name: Capture effective governance inputs
        shell: bash
        env:
          TASK_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          {
            echo "BASE=$TASK_BASE_REF"
            echo "HEAD=$(git rev-parse HEAD)"
            echo "--- CHANGED FILES ---"
            git diff --name-only "$TASK_BASE_REF" HEAD
            echo "--- PREFLIGHT ---"
            node scripts/taskctl.mjs preflight
          } > governance.log 2>&1 || true
          cat governance.log
      - uses: actions/upload-artifact@v4
        with:
          name: m1-05-effective-governance-log
          path: governance.log
          if-no-files-found: error
