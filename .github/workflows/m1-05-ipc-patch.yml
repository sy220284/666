name: M1-05 IPC Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: python .github/m1-05-ipc-patch.py
      - run: pnpm exec prettier --write packages/contracts/src/index.ts apps/desktop/main/src/ipc-handlers.ts apps/desktop/preload/src/index.ts apps/desktop/renderer/src/index.ts
      - name: Commit IPC chain
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/contracts/src/index.ts apps/desktop/main/src/ipc-handlers.ts apps/desktop/preload/src/index.ts apps/desktop/renderer/src/index.ts
          git commit -m "feat(M1-05): route editor writes through Block Patch"
          git push origin HEAD:validate/m1-05-core-20260716
