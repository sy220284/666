name: M1-05 IPC Canonicalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  canonicalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Canonicalize Patch imports and handlers
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          def keep_first_line(content: str, line: str) -> str:
              seen = False
              output = []
              for current in content.splitlines():
                  if current == line:
                      if seen:
                          continue
                      seen = True
                  output.append(current)
              return '\n'.join(output) + '\n'

          contracts = Path('packages/contracts/src/index.ts')
          contracts_content = keep_first_line(
              contracts.read_text(), '  DraftApplyPatchCommandSchema,'
          )
          contracts.write_text(contracts_content)

          main = Path('apps/desktop/main/src/ipc-handlers.ts')
          main_content = keep_first_line(
              main.read_text(), '  DraftApplyPatchCommandSchema,'
          )
          main_content = re.sub(
              r"\n  register\(IPC_CHANNELS\.applyPatch, async \(event, raw\) => \{\n.*?\n  \}\);\n",
              '\n',
              main_content,
              flags=re.DOTALL,
          )
          canonical_handler = """
          register(IPC_CHANNELS.applyPatch, async (event, raw) => {
            const rejected = rejectUntrusted(event, raw);
            if (rejected) return rejected;
            const parsed = DraftApplyPatchCommandSchema.safeParse(raw);
            if (!parsed.success) return invalidRequest(raw);
            return invokeProject(parsed.data.requestId, {
              operation: DRAFT_COMMANDS.applyPatch,
              input: parsed.data.payload,
            });
          });

          """
          anchor = '  register(IPC_CHANNELS.saveDraftSnapshot, async (event, raw) => {'
          if anchor not in main_content:
              raise SystemExit('Main saveSnapshot handler anchor not found')
          main_content = main_content.replace(anchor, canonical_handler + anchor, 1)
          main.write_text(main_content)

          preload = Path('apps/desktop/preload/src/index.ts')
          preload_content = keep_first_line(
              preload.read_text(), '  DraftApplyPatchCommandSchema,'
          )
          method_pattern = re.compile(
              r"    applyPatch: \(input\) =>\n"
              r"      invoke\(\n"
              r"        IPC_CHANNELS\.applyPatch,\n"
              r"        DraftApplyPatchCommandSchema\.parse\(envelope\(APP_COMMANDS\.applyPatch, input\)\),\n"
              r"        DraftDocumentResultSchema,\n"
              r"      \),\n"
          )
          preload_content = method_pattern.sub('', preload_content)
          canonical_method = """    applyPatch: (input) =>
              invoke(
                IPC_CHANNELS.applyPatch,
                DraftApplyPatchCommandSchema.parse(envelope(APP_COMMANDS.applyPatch, input)),
                DraftDocumentResultSchema,
              ),
          """
          preload_anchor = '    saveSnapshot: (input) =>\n'
          if preload_anchor not in preload_content:
              raise SystemExit('Preload saveSnapshot method anchor not found')
          preload_content = preload_content.replace(
              preload_anchor, canonical_method + preload_anchor, 1
          )
          preload.write_text(preload_content)
          PY
      - run: pnpm exec prettier --write packages/contracts/src/index.ts apps/desktop/main/src/ipc-handlers.ts apps/desktop/preload/src/index.ts
      - name: Commit canonical Patch surface
        run: |
          if git diff --quiet -- packages/contracts/src/index.ts apps/desktop/main/src/ipc-handlers.ts apps/desktop/preload/src/index.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/contracts/src/index.ts apps/desktop/main/src/ipc-handlers.ts apps/desktop/preload/src/index.ts
          git commit -m "fix(M1-05): canonicalize Block Patch IPC surface"
          git push origin HEAD:validate/m1-05-core-20260716
