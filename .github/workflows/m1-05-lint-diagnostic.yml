name: M1-05 Lint Fix

on:
  pull_request:
    branches:
      - main

concurrency:
  group: m1-05-lint-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Canonicalize import and register Patch schema
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/contracts/src/index.ts')
          content = path.read_text()

          lines = content.splitlines()
          seen = False
          normalized = []
          for line in lines:
              if line == '  DraftApplyPatchCommandSchema,':
                  if seen:
                      continue
                  seen = True
              normalized.append(line)
          content = '\n'.join(normalized) + '\n'

          start_marker = "export const RegisteredCommandSchema = z.discriminatedUnion('command', ["
          start = content.index(start_marker)
          end = content.index('\n]);', start)
          registered = content[start:end]
          if '  DraftApplyPatchCommandSchema,' not in registered:
              anchor = '  DraftOpenCommandSchema,\n'
              if anchor not in registered:
                  raise SystemExit('RegisteredCommandSchema DraftOpen anchor not found')
              registered = registered.replace(
                  anchor,
                  anchor + '  DraftApplyPatchCommandSchema,\n',
                  1,
              )
              content = content[:start] + registered + content[end:]

          path.write_text(content)
          PY
      - run: pnpm exec prettier --write packages/contracts/src/index.ts
      - run: pnpm lint
      - name: Commit lint fix
        run: |
          if git diff --quiet -- packages/contracts/src/index.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/contracts/src/index.ts
          git commit -m "fix(M1-05): register Block Patch command schema"
          git fetch origin validate/m1-05-core-20260716
          git rebase origin/validate/m1-05-core-20260716
          git push origin HEAD:validate/m1-05-core-20260716
