name: M1-05 Test Baseline Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Advance migration baselines to schema v4
        run: |
          python - <<'PY'
          from pathlib import Path

          foundation = Path('tests/migration/sqlite-foundation.test.ts')
          content = foundation.read_text()
          if "      'draft_patch_log'," not in content:
              content = content.replace(
                  "      'draft_blocks',\n      'drafts',",
                  "      'draft_blocks',\n      'draft_patch_log',\n      'drafts',",
                  1,
              )
          content = content.replace('    ).toBe(3n);', '    ).toBe(4n);', 1)
          foundation.write_text(content)

          faults = Path('tests/migration/testkit-faults.test.ts')
          faults_content = faults.read_text().replace(
              'expect(workspace.projectDatabase.schemaVersion).toBe(3);',
              'expect(workspace.projectDatabase.schemaVersion).toBe(4);',
              1,
          )
          faults.write_text(faults_content)
          PY
      - run: pnpm exec prettier --write tests/migration/sqlite-foundation.test.ts tests/migration/testkit-faults.test.ts
      - name: Commit baselines
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/migration/sqlite-foundation.test.ts tests/migration/testkit-faults.test.ts
          git commit -m "test(M1-05): advance migration baselines to v4"
          git push origin HEAD:validate/m1-05-core-20260716
