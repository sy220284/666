name: M1-05 Test Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb
      - name: Capture full test output
        id: test
        shell: bash
        run: |
          set +e
          xvfb-run -a -s "-screen 0 3840x2160x24" pnpm test > test.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 200 test.log
          exit 0
        env:
          WORLDFORGE_CAPTURE_MATRIX_DIR: test-results/display-matrix
      - uses: actions/upload-artifact@v4
        with:
          name: m1-05-test-log
          path: |
            test.log
            test-results/
          if-no-files-found: warn
      - name: Preserve failure status
        if: steps.test.outputs.exit_code != '0'
        run: exit 1
