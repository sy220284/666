name: M1-05 Utility Patch

on:
  push:
    branches:
      - validate/m1-05-core-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Patch Core dispatch and v4 expectations
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          utility = Path('packages/core-service/src/utility-entry.ts')
          content = utility.read_text()

          error_pattern = re.compile(
              r"  if \(error instanceof DraftServiceError\) \{\n.*?^  \}\n(?=  if \(error instanceof ProjectStructureError\))",
              re.MULTILINE | re.DOTALL,
          )
          error_replacement = """  if (error instanceof DraftServiceError) {
            switch (error.code) {
              case 'DRAFT_NOT_FOUND':
                return 'DRAFT_NO_ACTIVE_005';
              case 'DRAFT_BLOCK_NOT_FOUND':
                return 'COMMON_NOT_FOUND_002';
              case 'DRAFT_REVISION_CONFLICT':
                return 'DRAFT_REVISION_CONFLICT_001';
              case 'DRAFT_BLOCK_HASH_CONFLICT':
                return 'DRAFT_BLOCK_HASH_CONFLICT_002';
              case 'DRAFT_PATCH_INVALID':
                return 'DRAFT_PATCH_INVALID_004';
              case 'DRAFT_INVARIANT_FAILED':
                return 'COMMON_CONFLICT_003';
            }
          }
          """
          content, error_count = error_pattern.subn(error_replacement, content, count=1)

          dispatch_pattern = re.compile(
              r"(      case DRAFT_COMMANDS\.saveDraftSnapshot:\n.*?data: await drafts\.saveSnapshot\(requestId, operation\.input\),\n        \}\);)\n(?=    \})",
              re.DOTALL,
          )
          dispatch_replacement = r"""\1
              case DRAFT_COMMANDS.applyPatch:
                return CoreProjectResultSchema.parse({
                  ok: true,
                  operation: operation.operation,
                  data: await drafts.applyPatch(requestId, operation.input),
                });
          """
          content, dispatch_count = dispatch_pattern.subn(dispatch_replacement, content, count=1)

          if error_count != 1:
              raise SystemExit(f'Draft error mapping replacements: {error_count}')
          if dispatch_count != 1:
              raise SystemExit(f'Draft dispatch replacements: {dispatch_count}')
          utility.write_text(content)

          security = Path('tests/security/project-workspace.test.ts')
          security_content = security.read_text()
          security_content, summary_count = re.subn(
              r"(compatibility: 'current',\n\s+schemaVersion: )3,",
              r"\g<1>4,",
              security_content,
              count=1,
          )
          security_content, manifest_count = re.subn(
              r"projectSchemaVersion: 3,",
              "projectSchemaVersion: 4,",
              security_content,
              count=1,
          )
          security_content, db_count = re.subn(
              r"schema_version: 3,",
              "schema_version: 4,",
              security_content,
              count=1,
          )
          if (summary_count, manifest_count, db_count) != (1, 1, 1):
              raise SystemExit(
                  f'v4 expectation replacements: summary={summary_count}, manifest={manifest_count}, db={db_count}'
              )
          security.write_text(security_content)
          PY
      - run: pnpm exec prettier --write packages/core-service/src/utility-entry.ts tests/security/project-workspace.test.ts
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core-service/src/utility-entry.ts tests/security/project-workspace.test.ts
          git commit -m "fix(M1-05): dispatch Patch and advance schema checks [skip ci]"
          git push origin HEAD:validate/m1-05-core-20260716
