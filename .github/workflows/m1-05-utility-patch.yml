name: M1-05 Utility Patch

on:
  push:
    branches:
      - validate/m1-05-core-20260716
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validate/m1-05-core-20260716
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Patch Core dispatch and v4 expectations
        run: |
          python - <<'PY'
          from pathlib import Path

          utility = Path('packages/core-service/src/utility-entry.ts')
          lines = utility.read_text().splitlines()

          draft_start = lines.index('  if (error instanceof DraftServiceError) {')
          structure_start = lines.index('  if (error instanceof ProjectStructureError) {', draft_start)
          replacement = [
              '  if (error instanceof DraftServiceError) {',
              '    switch (error.code) {',
              "      case 'DRAFT_NOT_FOUND':",
              "        return 'DRAFT_NO_ACTIVE_005';",
              "      case 'DRAFT_BLOCK_NOT_FOUND':",
              "        return 'COMMON_NOT_FOUND_002';",
              "      case 'DRAFT_REVISION_CONFLICT':",
              "        return 'DRAFT_REVISION_CONFLICT_001';",
              "      case 'DRAFT_BLOCK_HASH_CONFLICT':",
              "        return 'DRAFT_BLOCK_HASH_CONFLICT_002';",
              "      case 'DRAFT_PATCH_INVALID':",
              "        return 'DRAFT_PATCH_INVALID_004';",
              "      case 'DRAFT_INVARIANT_FAILED':",
              "        return 'COMMON_CONFLICT_003';",
              '    }',
              '  }',
          ]
          lines[draft_start:structure_start] = replacement

          save_case = lines.index('      case DRAFT_COMMANDS.saveDraftSnapshot:')
          switch_end = next(
              index for index in range(save_case + 1, len(lines)) if lines[index] == '    }'
          )
          patch_case = [
              '      case DRAFT_COMMANDS.applyPatch:',
              '        return CoreProjectResultSchema.parse({',
              '          ok: true,',
              '          operation: operation.operation,',
              '          data: await drafts.applyPatch(requestId, operation.input),',
              '        });',
          ]
          lines[switch_end:switch_end] = patch_case
          utility.write_text('\n'.join(lines) + '\n')

          security = Path('tests/security/project-workspace.test.ts')
          security_content = security.read_text()
          if security_content.count('projectSchemaVersion: 3,') != 1:
              raise SystemExit('Expected one projectSchemaVersion: 3 assertion')
          if security_content.count('schema_version: 3,') != 1:
              raise SystemExit('Expected one schema_version: 3 assertion')
          security_content = security_content.replace(
              'projectSchemaVersion: 3,', 'projectSchemaVersion: 4,', 1
          )
          security_content = security_content.replace('schema_version: 3,', 'schema_version: 4,', 1)
          security.write_text(security_content)
          PY
      - run: pnpm exec prettier --write packages/core-service/src/utility-entry.ts tests/security/project-workspace.test.ts
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core-service/src/utility-entry.ts tests/security/project-workspace.test.ts
          git commit -m "fix(M1-05): dispatch Patch and advance schema checks [skip ci]"
          git push origin HEAD:validate/m1-05-core-20260716
