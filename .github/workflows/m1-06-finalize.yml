name: M1-06 Finalize

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/m1-06-finalize.yml
      - scripts/m1-06-finalize.py

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'work/m1-06-autosave' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preserve executors and switch to main
        run: |
          cp scripts/m1-06-implement.py /tmp/m1-06-implement.py
          cp scripts/m1-06-finalize.py /tmp/m1-06-finalize.py
          git fetch --no-tags origin main
          git checkout -B main origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Activate M1-06
        run: pnpm task:advance -- --ci=success --commit=5902c140ff2be1a0cdd0b7fec6cd40c3902d0ba4
      - name: Apply M1-06
        run: |
          python /tmp/m1-06-finalize.py prepare /tmp/m1-06-implement.py
          python /tmp/m1-06-implement.py
          python /tmp/m1-06-finalize.py finish
      - name: Format
        run: |
          pnpm exec prettier --write \
            packages/contracts/src/draft.ts \
            packages/core-service/src/draft.ts \
            packages/editor-core/src/autosave.ts \
            packages/editor-core/src/writing-tools.ts \
            packages/editor-core/src/draft-patch.ts \
            packages/editor-core/src/index.ts \
            apps/desktop/main/src/electron-main.ts \
            apps/desktop/renderer/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/styles.css \
            tests/unit/autosave-writing-tools.test.ts \
            tests/unit/editor-draft-patch.test.ts \
            tests/performance/writing-tools-performance.test.ts \
            tests/e2e/electron-shell.spec.ts \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md
      - name: Install E2E display dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb
      - name: Validate task state
        run: pnpm task:validate
      - name: Validate workspaces
        run: pnpm check:workspaces
      - name: Validate boundaries
        run: pnpm check:boundaries
      - name: Validate formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test:unit
      - name: Integration tests
        run: pnpm test:integration
      - name: Security tests
        run: pnpm test:security
      - name: Performance tests
        run: pnpm test:perf
      - name: Electron E2E
        env:
          WORLDFORGE_E2E_OUTPUT_DIR: ${{ github.workspace }}/test-results/electron
          WORLDFORGE_CAPTURE_MATRIX_DIR: ${{ github.workspace }}/test-results/display-matrix
        run: pnpm test:e2e
      - name: Build
        run: pnpm build
      - name: Commit M1-06
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/contracts/src/draft.ts \
            packages/core-service/src/draft.ts \
            packages/editor-core/src/autosave.ts \
            packages/editor-core/src/writing-tools.ts \
            packages/editor-core/src/draft-patch.ts \
            packages/editor-core/src/index.ts \
            apps/desktop/main/src/electron-main.ts \
            apps/desktop/renderer/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/styles.css \
            tests/unit/autosave-writing-tools.test.ts \
            tests/unit/editor-draft-patch.test.ts \
            tests/performance/writing-tools-performance.test.ts \
            tests/e2e/electron-shell.spec.ts \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md \
            docs/tasks/TASK_INDEX.md \
            docs/tasks/M1/M1-05_BLOCK_PATCH_REVISION.md \
            docs/tasks/M1/M1-06_AUTOSAVE_STATS_FIND.md
          git commit -m "feat(M1-06): add autosave statistics and chapter find"
          git push origin HEAD:main
