name: M1-06 Implement

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/m1-06-implement.yml

permissions:
  contents: write

jobs:
  implement:
    if: ${{ github.head_ref == 'work/m1-06-autosave' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preserve implementation script and switch to main
        run: |
          cp scripts/m1-06-implement.py /tmp/m1-06-implement.py
          git fetch --no-tags origin main
          git checkout -B main origin/main
      - name: Normalize multiline hint anchor
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/m1-06-implement.py')
          source = path.read_text()
          start = source.index('replace_once(html, "当前任务提供显式保存')
          end = source.index('\n\nstyles =', start)
          replacement = '''html_path = Path(html)
          html_source = html_path.read_text()
          old_hint_start = html_source.index("当前任务提供显式保存；800ms 自动保存将在 M1-06")
          old_hint_end = html_source.index("</p>", old_hint_start)
          old_hint = html_source[old_hint_start:old_hint_end]
          html_path.write_text(
              html_source.replace(
                  old_hint,
                  "正文修改空闲800ms后自动保存；切换章节、返回项目与关闭应用前会强制刷新。中文输入组合期间暂停保存。",
                  1,
              )
          )'''
          path.write_text(source[:start] + replacement + source[end:])
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Activate M1-06
        run: pnpm task:advance -- --ci=success --commit=5902c140ff2be1a0cdd0b7fec6cd40c3902d0ba4
      - name: Apply M1-06 implementation
        shell: bash
        run: |
          set +e
          python /tmp/m1-06-implement.py > /tmp/m1-06-apply.log 2>&1
          code=$?
          cat /tmp/m1-06-apply.log
          echo "$code" > /tmp/m1-06-apply-code
          exit 0
      - name: Upload implementation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m1-06-implementation-diagnostics
          path: |
            /tmp/m1-06-apply.log
            /tmp/m1-06-apply-code
          if-no-files-found: error
          retention-days: 1
      - name: Enforce implementation result
        run: test "$(cat /tmp/m1-06-apply-code)" = "0"
      - name: Format
        run: |
          pnpm exec prettier --write \
            packages/editor-core/src/autosave.ts \
            packages/editor-core/src/writing-tools.ts \
            packages/editor-core/src/index.ts \
            apps/desktop/main/src/electron-main.ts \
            apps/desktop/renderer/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/styles.css \
            tests/unit/autosave-writing-tools.test.ts \
            tests/performance/writing-tools-performance.test.ts \
            tests/e2e/electron-shell.spec.ts \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md
      - name: Install Electron display dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb
      - name: Validate M1-06
        env:
          WORLDFORGE_E2E_OUTPUT_DIR: ${{ github.workspace }}/test-results/electron
          WORLDFORGE_CAPTURE_MATRIX_DIR: ${{ github.workspace }}/test-results/display-matrix
        run: |
          pnpm task:validate
          pnpm check:workspaces
          pnpm check:boundaries
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test:unit
          pnpm test:integration
          pnpm test:security
          pnpm test:perf
          pnpm test:e2e
          pnpm build
      - name: Commit M1-06 implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/editor-core/src/autosave.ts \
            packages/editor-core/src/writing-tools.ts \
            packages/editor-core/src/index.ts \
            apps/desktop/main/src/electron-main.ts \
            apps/desktop/renderer/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/styles.css \
            tests/unit/autosave-writing-tools.test.ts \
            tests/performance/writing-tools-performance.test.ts \
            tests/e2e/electron-shell.spec.ts \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md \
            docs/tasks/TASK_INDEX.md \
            docs/tasks/M1/M1-05_BLOCK_PATCH_REVISION.md \
            docs/tasks/M1/M1-06_AUTOSAVE_STATS_FIND.md
          git commit -m "feat(M1-06): add autosave statistics and chapter find"
          git push origin HEAD:main
