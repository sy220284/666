name: M1-09 Implementation

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/m1-09-implementation.yml
      - packages/contracts/src/import-export.ts
      - packages/core-service/src/import-export.ts
      - tests/integration/import-export-service.test.ts
      - tests/e2e/m1-09-import-export.spec.ts
      - scripts/m1-09-apply.py
      - scripts/m1-09-fix.py
      - scripts/m1-09-finalize.py

concurrency:
  group: m1-09-implementation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  implement-verify-close:
    if: ${{ github.head_ref == 'work/m1-09-import-export' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/m1-09-import-export
          fetch-depth: 0

      - name: Preserve implementation sources and switch to main
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/m1-09 test-results/m1-09/logs test-results/m1-09/screenshots test-results/m1-09/playwright
          : > test-results/m1-09/commands.tsv
          cp packages/contracts/src/import-export.ts /tmp/m1-09/contracts-import-export.ts
          cp packages/core-service/src/import-export.ts /tmp/m1-09/core-import-export.ts
          cp tests/integration/import-export-service.test.ts /tmp/m1-09/import-export-service.test.ts
          cp tests/e2e/m1-09-import-export.spec.ts /tmp/m1-09/m1-09-import-export.spec.ts
          cp scripts/m1-09-apply.py /tmp/m1-09/apply.py
          cp scripts/m1-09-fix.py /tmp/m1-09/fix.py
          cp scripts/m1-09-finalize.py /tmp/m1-09/finalize.py
          git fetch --no-tags origin main work/m1-09-import-export
          git checkout -B main origin/main
          cp /tmp/m1-09/contracts-import-export.ts packages/contracts/src/import-export.ts
          cp /tmp/m1-09/core-import-export.ts packages/core-service/src/import-export.ts
          cp /tmp/m1-09/import-export-service.test.ts tests/integration/import-export-service.test.ts
          cp /tmp/m1-09/m1-09-import-export.spec.ts tests/e2e/m1-09-import-export.spec.ts
          {
            python /tmp/m1-09/apply.py
            python /tmp/m1-09/fix.py
          } 2>&1 | tee test-results/m1-09/logs/00-prepare.log

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies and display support
        run: |
          pnpm install --frozen-lockfile
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb

      - name: Format implementation
        run: pnpm format

      - name: Run exhaustive M1-09 verification
        shell: bash
        run: |
          set -euo pipefail
          index=0
          run_step() {
            local display="$1"
            local fixtures="$2"
            shift 2
            index=$((index + 1))
            local log="test-results/m1-09/logs/$(printf '%02d' "$index").log"
            local started ended code
            started=$(date +%s%3N)
            set +e
            "$@" >"$log" 2>&1
            code=$?
            set -e
            ended=$(date +%s%3N)
            cat "$log"
            printf '%s\t%s\t%s\t%s\n' "$display" "$code" "$((ended - started))" "$fixtures" >> test-results/m1-09/commands.tsv
            if [ "$code" -ne 0 ]; then return "$code"; fi
          }

          all='M1-09,P0-048,P0-050'
          run_step 'pnpm task:validate' "$all" pnpm task:validate
          run_step 'pnpm check:workspaces' "$all" pnpm check:workspaces
          run_step 'pnpm check:boundaries' "$all" pnpm check:boundaries
          run_step 'pnpm format:check' "$all" pnpm format:check
          run_step 'pnpm lint' "$all" pnpm lint
          run_step 'pnpm typecheck' "$all" pnpm typecheck
          run_step 'pnpm test:unit' 'M1-09-regression' pnpm test:unit
          run_step 'pnpm test:integration' "$all" pnpm test:integration
          run_step 'pnpm test:migration' 'M1-09-schema-regression' pnpm test:migration
          run_step 'pnpm test:security' 'M1-09-path-boundary' pnpm test:security
          run_step 'pnpm test:perf' 'M1-09-regression' pnpm test:perf
          run_step 'pnpm test:e2e' 'M1-09-regression' env WORLDFORGE_CAPTURE_MATRIX_DIR="$GITHUB_WORKSPACE/test-results/m1-09/display-matrix" pnpm test:e2e
          run_step 'M1-09 desktop acceptance' "$all" env WORLDFORGE_RUN_M1_09_ACCEPTANCE=1 WORLDFORGE_M1_09_SCREENSHOT_DIR="$GITHUB_WORKSPACE/test-results/m1-09/screenshots" WORLDFORGE_E2E_OUTPUT_DIR="$GITHUB_WORKSPACE/test-results/m1-09/playwright" xvfb-run -a pnpm exec playwright test tests/e2e/m1-09-import-export.spec.ts --config tests/e2e/playwright.config.ts
          run_step 'pnpm build' "$all" pnpm build
          run_step 'pnpm package' 'M1-09-package-smoke' pnpm package

      - name: Commit tested implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            packages/contracts/src/import-export.ts \
            packages/contracts/src/project-workspace.ts \
            packages/contracts/src/index.ts \
            packages/core-service/src/import-export.ts \
            packages/core-service/src/index.ts \
            packages/core-service/src/utility-entry.ts \
            apps/desktop/main/src/electron-main.ts \
            apps/desktop/main/src/ipc-handlers.ts \
            apps/desktop/preload/src/index.ts \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/index.ts \
            apps/desktop/renderer/src/styles.css \
            tests/integration/import-export-service.test.ts \
            tests/e2e/m1-09-import-export.spec.ts
          git commit -m 'feat(M1-09): add TXT and Markdown import export'
          git rev-parse HEAD > /tmp/m1-09/implementation-sha

      - name: Generate evidence and affected documentation
        shell: bash
        run: |
          implementation_sha="$(cat /tmp/m1-09/implementation-sha)"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python /tmp/m1-09/finalize.py evidence \
            --commit="$implementation_sha" \
            --generated-at="$generated_at" \
            --run-url="$run_url" \
            --commands=test-results/m1-09/commands.tsv \
            --screenshot=test-results/m1-09/screenshots/m1-09-import-export.png
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('docs/tasks/ACTIVE_TASK.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          additions = [
              'docs/contracts/IPC_CONTRACTS.md',
              'docs/database/DATABASE_SCHEMA.md',
              'docs/security/THREAT_MODEL.md',
              'docs/ui/SCREEN_SPECIFICATIONS.md',
              'docs/testing/P0_ACCEPTANCE_MATRIX.md',
          ]
          allowed = state['activeTask']['allowedPaths']
          for item in additions:
              if item not in allowed: allowed.append(item)
          path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          pnpm task:sync
          pnpm exec prettier --write \
            docs/test-evidence/M1-09 \
            docs/contracts/IPC_CONTRACTS.md \
            docs/database/DATABASE_SCHEMA.md \
            docs/security/THREAT_MODEL.md \
            docs/ui/SCREEN_SPECIFICATIONS.md \
            docs/testing/P0_ACCEPTANCE_MATRIX.md \
            docs/product/V1.0_TRACEABILITY_MATRIX.md \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md
          pnpm task:validate
          git add \
            docs/test-evidence/M1-09 \
            docs/contracts/IPC_CONTRACTS.md \
            docs/database/DATABASE_SCHEMA.md \
            docs/security/THREAT_MODEL.md \
            docs/ui/SCREEN_SPECIFICATIONS.md \
            docs/testing/P0_ACCEPTANCE_MATRIX.md \
            docs/product/V1.0_TRACEABILITY_MATRIX.md \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md
          git commit -m 'test(M1-09): add verified acceptance evidence'

      - name: Close M1 and activate M2-01
        shell: bash
        run: |
          implementation_sha="$(cat /tmp/m1-09/implementation-sha)"
          python /tmp/m1-09/finalize.py close --commit="$implementation_sha"
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('docs/tasks/ACTIVE_TASK.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          item = 'docs/tasks/M1_TASKS.md'
          if item not in state['activeTask']['allowedPaths']:
              state['activeTask']['allowedPaths'].append(item)
          path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          pnpm task:sync
          pnpm exec prettier --write \
            docs/tasks/M1/M1-09_TEXT_IMPORT_EXPORT_MVP.md \
            docs/tasks/M2/M2-01_LOCK_GUARD.md \
            docs/tasks/TASK_INDEX.md \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md \
            docs/tasks/M1_TASKS.md
          pnpm task:validate
          pnpm format:check
          pnpm lint
          pnpm typecheck
          git add \
            docs/tasks/M1/M1-09_TEXT_IMPORT_EXPORT_MVP.md \
            docs/tasks/M2/M2-01_LOCK_GUARD.md \
            docs/tasks/TASK_INDEX.md \
            docs/tasks/ACTIVE_TASK.json \
            docs/tasks/ACTIVE_TASK.md \
            docs/tasks/M1_TASKS.md
          git commit -m 'chore(M1): verify M1-09 and activate M2-01'
          git push origin HEAD:main

      - name: Upload M1-09 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m1-09-implementation-evidence
          path: |
            test-results/m1-09/
            artifacts/
          if-no-files-found: warn
          retention-days: 14
