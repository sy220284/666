name: M2-04 Hardening Diagnostic

on:
  push:
    branches:
      - work/m2-04-quality-hardening

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[m2-04-hardening-done]') && !contains(github.event.head_commit.message, '[m2-04-diagnostic]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Execute embedded patch and capture result
        id: patch
        shell: bash
        run: |
          set +e
          python3 <<'PY' > .m2-04-hardening-log 2>&1
          from pathlib import Path
          import re
          import traceback

          workflow = Path('.github/workflows/m2-04-hardening-bot.yml').read_text(encoding='utf-8')
          match = re.search(r"python3 <<'PY'\n(.*?)\n          PY", workflow, re.S)
          if not match:
              raise SystemExit('embedded patch script not found')
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in match.group(1).splitlines()
          )
          try:
              exec(compile(script, '<m2-04-hardening>', 'exec'), {'__name__': '__main__'})
              print('PATCH_OK')
          except BaseException:
              traceback.print_exc()
              raise
          PY
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Install and format successful patch
        if: steps.patch.outputs.status == '0'
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          node scripts/taskctl.mjs sync
          pnpm exec prettier --write AGENTS.md packages/core-service/src/candidate-state.ts packages/core-service/src/structure-operations.ts apps/desktop/main/src/ipc-handlers.ts tests/integration/structure-operations.test.ts tests/e2e/structure-recovery.spec.ts docs/tasks/ACTIVE_TASK.json docs/tasks/ACTIVE_TASK.md docs/tasks/TASK_INDEX.md docs/tasks/M2/M2-04_TRASH_STRUCTURE_RECOVERY.md docs/tasks/M3/M3-01_PROJECT_BRIEF_OUTLINE.md docs/test-evidence/M2-04/*.md docs/test-evidence/M2-04/*.json
      - name: Commit result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if [ "${{ steps.patch.outputs.status }}" = "0" ]; then
            git commit -m "fix(M2-04): apply audited hardening patch [m2-04-hardening-done]"
          else
            git commit -m "chore: record M2-04 hardening failure [m2-04-diagnostic]"
          fi
          git push
