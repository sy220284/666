name: M2-04 Branch Automation Ping

on:
  push:
    branches:
      - work/m2-04-quality-hardening

permissions:
  contents: write

jobs:
  ping:
    if: ${{ !contains(github.event.head_commit.message, '[m2-04-ping]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Commit ping marker
        run: |
          printf 'actions-write-ok\n' > .m2-04-ping
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .m2-04-ping
          git commit -m "chore: confirm branch automation [m2-04-ping]"
          git push
