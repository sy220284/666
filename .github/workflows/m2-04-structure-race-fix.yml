name: M2-04 Structure Refresh Race Fix

on:
  push:
    branches:
      - work/m2-04-quality-hardening

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Apply refresh generation guard
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('apps/desktop/renderer/src/index.ts')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "let activeStructure: ProjectStructure | null = null;\nlet activeChapter: Chapter | null = null;",
                  "let activeStructure: ProjectStructure | null = null;\nlet structureRefreshGeneration = 0;\nlet activeChapter: Chapter | null = null;",
              ),
              (
                  "    if (result.ok && result.data) {\n      renderProjectStructure(result.data);",
                  "    if (result.ok && result.data) {\n      structureRefreshGeneration += 1;\n      renderProjectStructure(result.data);",
              ),
              (
                  "function showStructureOperationResult(\n  result: StructureOperationResult,\n  preferredChapterId: string,\n): void {\n  renderProjectStructure(result.structure);",
                  "function showStructureOperationResult(\n  result: StructureOperationResult,\n  preferredChapterId: string,\n): void {\n  structureRefreshGeneration += 1;\n  renderProjectStructure(result.structure);",
              ),
              (
                  "async function refreshProjectStructure(): Promise<void> {\n  const project = activeProject;\n  if (!project) {",
                  "async function refreshProjectStructure(): Promise<void> {\n  const generation = ++structureRefreshGeneration;\n  const project = activeProject;\n  if (!project) {",
              ),
              (
                  "    const result = await window.worldforge.planning.listStructure(project.projectId);\n    if (activeProject?.projectId !== project.projectId) return;",
                  "    const result = await window.worldforge.planning.listStructure(project.projectId);\n    if (\n      generation !== structureRefreshGeneration ||\n      activeProject?.projectId !== project.projectId\n    )\n      return;",
              ),
              (
                  "  } catch {\n    if (activeProject?.projectId !== project.projectId) return;\n    renderProjectStructure(null);",
                  "  } catch {\n    if (\n      generation !== structureRefreshGeneration ||\n      activeProject?.projectId !== project.projectId\n    )\n      return;\n    renderProjectStructure(null);",
              ),
          ]

          for before, after in replacements:
              count = text.count(before)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {before[:80]!r}')
              text = text.replace(before, after, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Format and verify focused paths
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm exec prettier --write apps/desktop/renderer/src/index.ts tests/e2e/structure-recovery.spec.ts
          pnpm --filter @worldforge/desktop-renderer build
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/m2-04-structure-race-fix.yml
          git add apps/desktop/renderer/src/index.ts tests/e2e/structure-recovery.spec.ts
          git commit -m "fix(M2-04): prevent stale structure refresh overwrite"
          git push
