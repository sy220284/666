name: Finalize M2-04 Transition

on:
  push:
    branches:
      - chore/m2-04-hardening-transition

permissions:
  contents: write

jobs:
  transition:
    if: ${{ !contains(github.event.head_commit.message, '[m2-04-transition-done]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Synchronize task index
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('docs/tasks/TASK_INDEX.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '| M2-04 | [`回收站、拆章、并章与结构恢复`](M2/M2-04_TRASH_STRUCTURE_RECOVERY.md) | M2-03、M1-08 | In Progress |':
            '| M2-04 | [`回收站、拆章、并章与结构恢复`](M2/M2-04_TRASH_STRUCTURE_RECOVERY.md) | M2-03、M1-08 | Implemented |',
            '| M3-01 | [`作品任务书与大纲树`](M3/M3-01_PROJECT_BRIEF_OUTLINE.md)                 | M2                         | Planned |':
            '| M3-01 | [`作品任务书与大纲树`](M3/M3-01_PROJECT_BRIEF_OUTLINE.md)                 | M2                         | In Progress |',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing task index row: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/m2-04-transition-bot.yml
      - name: Commit transition
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/tasks/TASK_INDEX.md
          git commit -m "chore(M2-04): complete hardening transition [m2-04-transition-done]"
          git push
