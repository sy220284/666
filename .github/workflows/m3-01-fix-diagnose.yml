name: M3-01 Fix And Diagnose

on:
  push:
    branches:
      - work/m3-01-project-brief-outline
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-lint:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Capture lint diagnostics
        run: pnpm lint > m3-01-lint.log 2>&1 || true
      - uses: actions/upload-artifact@v7
        with:
          name: m3-01-lint-diagnostics
          path: m3-01-lint.log
          if-no-files-found: error
          retention-days: 1

  update-migration-baseline:
    if: ${{ github.event_name == 'push' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Update schema foundation expectation
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('tests/migration/sqlite-foundation.test.ts')
          text = path.read_text(encoding='utf-8')
          before = "      'migration_journal',\n      'projects',"
          after = "      'migration_journal',\n      'plot_nodes',\n      'project_briefs',\n      'projects',"
          if text.count(before) != 1:
              raise SystemExit('expected exactly one project table-list insertion point')
          text = text.replace(before, after, 1)
          if text.count(').toBe(9n);') != 1:
              raise SystemExit('expected exactly one project migration count')
          text = text.replace(').toBe(9n);', ').toBe(10n);', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit migration baseline update
        run: |
          git rm .github/workflows/m3-01-fix-diagnose.yml
          git add tests/migration/sqlite-foundation.test.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "test(M3-01): update project migration foundation baseline"
          git push
