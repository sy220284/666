name: M3-01 Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Package repository source
        run: |
          tar --exclude=.git --exclude=node_modules --exclude='*.zip' -czf /tmp/m3-01-source.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: m3-01-source
          path: /tmp/m3-01-source.tar.gz
          if-no-files-found: error
          retention-days: 1
