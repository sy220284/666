name: M3-03 Backend Apply

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - docs/m3-03-wire-backend.mjs
      - docs/m3-03-wire-desktop.mjs
      - docs/m3-03-fix-async.mjs
      - docs/m3-03-fix-migration-baselines.mjs
      - .github/workflows/m3-03-backend-apply.yml

permissions:
  contents: write

concurrency:
  group: m3-03-backend-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.head_ref == 'work/m3-03-entity-canon' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply M3-03 wiring and migration baselines
        shell: bash
        run: |
          set -o pipefail
          {
            node docs/m3-03-wire-backend.mjs
            node docs/m3-03-wire-desktop.mjs
            node docs/m3-03-fix-async.mjs
            node docs/m3-03-fix-migration-baselines.mjs
          } 2>&1 | tee docs/m3-03-apply.log
      - name: Format and validate M3-03 slice
        shell: bash
        run: |
          set -o pipefail
          pnpm format
          {
            pnpm typecheck
            pnpm exec vitest run tests/integration/entity-canon.test.ts
            pnpm test:migration
          } 2>&1 | tee docs/m3-03-validation.log
      - name: Upload M3-03 diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: m3-03-backend-diagnostics
          path: |
            docs/m3-03-apply.log
            docs/m3-03-validation.log
          if-no-files-found: error
          retention-days: 7
      - name: Commit audited M3-03 foundation
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git rm docs/m3-03-wire-backend.mjs docs/m3-03-wire-desktop.mjs docs/m3-03-fix-async.mjs docs/m3-03-fix-migration-baselines.mjs .github/workflows/m3-03-backend-apply.yml
          rm -f docs/m3-03-apply.log docs/m3-03-validation.log docs/.m3-03-pr-trigger*
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(M3-03): implement Entity and static Canon foundation'
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
