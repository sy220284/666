name: M3-03 Closeout

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - docs/m3-03-closeout.mjs
      - .github/workflows/m3-03-closeout.yml

permissions:
  contents: write

concurrency:
  group: m3-03-closeout-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  closeout:
    if: ${{ github.head_ref == 'work/m3-03-entity-canon' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Prepare documentation and deferred evidence
        run: node docs/m3-03-closeout.mjs
      - name: Revalidate implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm lint
          pnpm typecheck
          pnpm --filter @worldforge/renderer build
          pnpm exec vitest run tests/integration/entity-canon.test.ts
          pnpm test:migration
          node --input-type=module <<'NODE'
          import { validateTaskEvidence } from './scripts/evidence-policy.mjs';
          await validateTaskEvidence('M3-03', process.cwd(), { final: false });
          NODE
      - name: Record M3-03 implementation and activate M3-04
        run: |
          pnpm task:sync
          pnpm task:validate
          pnpm task:advance --ci=success --commit=78dfdbcab4e981379f6455c8ecb23c16b653139a
          pnpm task:validate
      - name: Commit audited M3-03 closeout
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          git rm docs/m3-03-closeout.mjs .github/workflows/m3-03-closeout.yml
          git add docs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(M3): record M3-03 and activate M3-04'
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
