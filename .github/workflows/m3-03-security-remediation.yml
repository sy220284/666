name: M3-03 Security Remediation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - docs/m3-03-security-remediation.mjs
      - .github/workflows/m3-03-security-remediation.yml
      - .github/workflows/m3-03-security-diagnostic.yml
      - tests/security/project-workspace.test.ts

permissions:
  contents: write

concurrency:
  group: m3-03-security-remediation-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  remediate:
    if: ${{ github.head_ref == 'work/m3-03-entity-canon' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Reopen M3-03 and align Schema 12 security baseline
        run: node docs/m3-03-security-remediation.mjs
      - name: Format
        run: pnpm format
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build Renderer
        run: pnpm --filter @worldforge/renderer build
      - name: Entity Canon integration
        run: pnpm exec vitest run tests/integration/entity-canon.test.ts
      - name: Migration suite
        run: pnpm test:migration
      - name: Prepare security suite
        run: pnpm test:prepare
      - name: Full application security suite
        shell: bash
        run: |
          set -o pipefail
          pnpm test:security 2>&1 | tee m3-03-security-remediation.log
      - name: Validate deferred evidence
        run: |
          node --input-type=module <<'NODE'
          import { validateTaskEvidence } from './scripts/evidence-policy.mjs';
          await validateTaskEvidence('M3-03', process.cwd(), { final: false });
          NODE
      - name: Validate reopened task state
        run: pnpm task:validate
      - name: Upload remediation diagnostic
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: m3-03-security-remediation-diagnostic
          path: m3-03-security-remediation.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Commit security remediation implementation
        id: implementation
        shell: bash
        run: |
          set -euo pipefail
          git add \
            tests/security/project-workspace.test.ts \
            docs/tasks \
            docs/test-evidence/M3-03
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(M3-03): align Schema 12 security baseline'
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Close M3-03 again and restore M3-04 frontier
        env:
          IMPLEMENTATION_SHA: ${{ steps.implementation.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm task:advance --ci=success --commit="$IMPLEMENTATION_SHA"
          pnpm task:validate
      - name: Commit governed task transition and remove temporary runners
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/m3-03-security-diagnostic.yml \
            .github/workflows/m3-03-security-remediation.yml \
            docs/m3-03-security-remediation.mjs
          rm -f m3-03-security-remediation.log
          git add docs/tasks docs/test-evidence/M3-03
          git commit -m 'chore(M3): record M3-03 security remediation'
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
