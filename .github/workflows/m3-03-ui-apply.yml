name: M3-03 UI Apply

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - apps/desktop/renderer/src/canon-ui.ts
      - docs/m3-03-wire-ui.mjs
      - docs/m3-03-fix-ui-type.mjs
      - .github/workflows/m3-03-ui-apply.yml

permissions:
  contents: write

concurrency:
  group: m3-03-ui-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.head_ref == 'work/m3-03-entity-canon' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply Canon workspace wiring
        shell: bash
        run: |
          set -o pipefail
          {
            node docs/m3-03-wire-ui.mjs
            node docs/m3-03-fix-ui-type.mjs
          } 2>&1 | tee docs/m3-03-ui-apply.log
      - name: Format and validate Canon workspace
        shell: bash
        run: |
          set -o pipefail
          pnpm format
          {
            pnpm typecheck
            pnpm --filter @worldforge/renderer build
            pnpm exec vitest run tests/integration/entity-canon.test.ts
            pnpm test:migration
          } 2>&1 | tee docs/m3-03-ui-validation.log
      - name: Upload Canon UI diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: m3-03-ui-diagnostics
          path: |
            docs/m3-03-ui-apply.log
            docs/m3-03-ui-validation.log
          if-no-files-found: error
          retention-days: 7
      - name: Commit audited Canon workspace
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          git rm docs/m3-03-wire-ui.mjs docs/m3-03-fix-ui-type.mjs .github/workflows/m3-03-ui-apply.yml
          rm -f docs/m3-03-ui-apply.log docs/m3-03-ui-validation.log
          git add apps/desktop/renderer
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(M3-03): add Entity and Canon workspace'
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
