name: M3-04 Generator Diagnostic

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'work/m3-04-state-timeline-knowledge' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Reproduce generator and publish exact failure branch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/m3-04-implementation-runner.yml').read_text()
          start = source.index('          from __future__ import annotations')
          end = source.index('          PY\n', start)
          lines = source[start:end].splitlines()
          Path('/tmp/m3-04-generator.py').write_text('\n'.join(line[10:] for line in lines) + '\n')
          PY
          git fetch origin main
          git reset --hard origin/main
          set +e
          python3 /tmp/m3-04-generator.py > /tmp/m3-04-generator.log 2>&1
          status=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B automation/m3-04-diagnostic-output origin/main
          cp /tmp/m3-04-generator.log m3-04-generator.log
          git add m3-04-generator.log
          git commit -m 'chore: publish M3-04 generator diagnostic'
          git push --force origin automation/m3-04-diagnostic-output
          exit "$status"
