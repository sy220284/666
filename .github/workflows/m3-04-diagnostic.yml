name: M3-04 Generator Diagnostic

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.head_ref == 'work/m3-04-state-timeline-knowledge' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Reproduce generator and publish exact failure through API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/m3-04-implementation-runner.yml').read_text()
          start = source.index('          from __future__ import annotations')
          end = source.index('          PY\n', start)
          lines = source[start:end].splitlines()
          Path('/tmp/m3-04-generator.py').write_text('\n'.join(line[10:] for line in lines) + '\n')
          PY
          git fetch origin main
          git reset --hard origin/main
          set +e
          python3 /tmp/m3-04-generator.py > /tmp/m3-04-generator.log 2>&1
          status=$?
          set -e
          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref='refs/heads/automation/m3-04-diagnostic-output' \
            -f sha="$main_sha" >/dev/null 2>&1 || true
          encoded="$(base64 -w0 /tmp/m3-04-generator.log)"
          existing_sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/m3-04-generator.log?ref=automation/m3-04-diagnostic-output" --jq .sha 2>/dev/null || true)"
          args=(--method PUT "repos/$GITHUB_REPOSITORY/contents/m3-04-generator.log" -f message='chore: publish M3-04 generator diagnostic' -f content="$encoded" -f branch='automation/m3-04-diagnostic-output')
          if [ -n "$existing_sha" ]; then args+=(-f sha="$existing_sha"); fi
          gh api "${args[@]}" >/dev/null
          exit "$status"
