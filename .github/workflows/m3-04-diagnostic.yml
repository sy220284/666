name: M3-04 Generator Diagnostic

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ github.head_ref == 'work/m3-04-state-timeline-knowledge' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Extract generator
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/m3-04-implementation-runner.yml').read_text()
          start = source.index('          from __future__ import annotations')
          end = source.index('          PY\n', start)
          lines = source[start:end].splitlines()
          Path('/tmp/m3-04-generator.py').write_text('\n'.join(line[10:] for line in lines) + '\n')
          PY
          git fetch origin main
          git reset --hard origin/main
      - name: Reproduce generator
        id: reproduce
        continue-on-error: true
        run: python3 /tmp/m3-04-generator.py > /tmp/m3-04-generator.log 2>&1
      - name: Upload exact generator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m3-04-generator-log
          path: /tmp/m3-04-generator.log
          if-no-files-found: error
      - name: Preserve failure result
        if: steps.reproduce.outcome == 'failure'
        run: exit 1
