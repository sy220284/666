name: M3-04 Implementation Runner

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: m3-04-implementation-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: ${{ github.head_ref == 'work/m3-04-state-timeline-knowledge' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reset implementation workspace to latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Generate M3-04 implementation
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee /tmp/m3-04-generate.log
          from __future__ import annotations
          import base64
          import json
          from pathlib import Path
          
          ROOT = Path.cwd()
          FILES = json.loads(base64.b64decode("...174000 chars truncated...