name: M3-05 CI Repair

on:
  push:
    branches:
      - work/m3-05-foreshadowing-character-arc

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-05-foreshadowing-character-arc
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply audited repairs
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} occurrence(s), found {actual}: {old!r}')
              file.write_text(text.replace(old, new, count))

          replace(
              'apps/desktop/main/src/candidate-preview-ipc.ts',
              "import { registerContinuityIpc } from './continuity-ipc.js';\n",
              '',
          )
          replace(
              'apps/desktop/main/src/candidate-preview-ipc.ts',
              '  const unregisterContinuityIpc = registerContinuityIpc(options);\n',
              '',
          )
          replace(
              'apps/desktop/main/src/candidate-preview-ipc.ts',
              '    unregisterContinuityIpc();\n',
              '',
          )

          marker = "describe('Candidate Preview IPC authority boundary', () => {\n"
          regression = """describe('Candidate Preview IPC authority boundary', () => {\n  it('registers only Candidate channels and leaves continuity composition to Electron main', () => {\n    const { handlers } = register();\n    expect([...handlers.keys()].sort()).toEqual(\n      Object.values(CANDIDATE_APPLY_IPC_CHANNELS).sort(),\n    );\n  });\n\n"""
          replace('tests/security/candidate-preview-ipc.test.ts', marker, regression)

          replace('tests/migration/project-planning-migration.test.ts', 'toBe(13)', 'toBe(14)')
          replace('tests/migration/project-planning-migration.test.ts', 'schema_version: 13n', 'schema_version: 14n')
          replace('tests/migration/recovery-migration.test.ts', 'schemaVersion: 13', 'schemaVersion: 14')
          replace('tests/migration/scene-beat-migration.test.ts', 'project schema version 13', 'project schema version 14')
          replace('tests/migration/scene-beat-migration.test.ts', 'toBe(13)', 'toBe(14)')
          replace('tests/migration/testkit-faults.test.ts', 'projectDatabase.schemaVersion).toBe(13)', 'projectDatabase.schemaVersion).toBe(14)')

          replace(
              'tests/migration/sqlite-foundation.test.ts',
              "    ).toEqual([\n      'backup_records',",
              "    ).toEqual([\n      'arc_milestone_dependencies',\n      'arc_milestone_timeline_dependencies',\n      'arc_milestones',\n      'backup_records',",
          )
          replace(
              'tests/migration/sqlite-foundation.test.ts',
              "      'canon_facts',\n      'chapters',",
              "      'canon_facts',\n      'character_arcs',\n      'chapters',",
          )
          replace(
              'tests/migration/sqlite-foundation.test.ts',
              "      'entity_states',\n      'knowledge_states',",
              "      'entity_states',\n      'foreshadowing_chapters',\n      'foreshadowing_relations',\n      'foreshadowings',\n      'knowledge_states',",
          )

          replace(
              'tests/integration/narrative-foreshadowing.test.ts',
              "      expect(search.foreshadowings.map((item) => item.title)).toEqual(['旧钥匙']);",
              "      expect(search.foreshadowings.map((item) => item.title)).toEqual(['旧钥匙', '密室真相']);",
          )
          replace(
              'tests/integration/narrative-character-arc.test.ts',
              "    const harness = await createContinuityHarness();\n    try {\n      const seeded = await seedContinuity(harness);\n      const foreign = await seedContinuity(harness);",
              "    const harness = await createContinuityHarness();\n    const foreignHarness = await createContinuityHarness();\n    try {\n      const seeded = await seedContinuity(harness);\n      const foreign = await seedContinuity(foreignHarness);",
          )
          replace(
              'tests/integration/narrative-character-arc.test.ts',
              '      const foreignEventCatalog = await harness.continuity.saveTimelineEvent(',
              '      const foreignEventCatalog = await foreignHarness.continuity.saveTimelineEvent(',
          )
          old_finally = """    } finally {\n      await closeContinuityHarness(harness);\n    }\n  });\n});\n"""
          new_finally = """    } finally {\n      await closeContinuityHarness(foreignHarness);\n      await closeContinuityHarness(harness);\n    }\n  });\n});\n"""
          replace('tests/integration/narrative-character-arc.test.ts', old_finally, new_finally)
          PY
      - name: Format repaired files
        run: >-
          pnpm exec prettier --write
          apps/desktop/main/src/candidate-preview-ipc.ts
          tests/security/candidate-preview-ipc.test.ts
          tests/migration/project-planning-migration.test.ts
          tests/migration/recovery-migration.test.ts
          tests/migration/scene-beat-migration.test.ts
          tests/migration/testkit-faults.test.ts
          tests/migration/sqlite-foundation.test.ts
          tests/integration/narrative-foreshadowing.test.ts
          tests/integration/narrative-character-arc.test.ts
      - name: Verify repaired paths
        run: |
          pnpm test:prepare
          pnpm exec vitest run \
            tests/migration/project-planning-migration.test.ts \
            tests/migration/recovery-migration.test.ts \
            tests/migration/scene-beat-migration.test.ts \
            tests/migration/testkit-faults.test.ts \
            tests/migration/sqlite-foundation.test.ts \
            tests/integration/narrative-foreshadowing.test.ts \
            tests/integration/narrative-character-arc.test.ts \
            tests/security/candidate-preview-ipc.test.ts
      - name: Commit repaired implementation and tests
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/desktop/main/src/candidate-preview-ipc.ts \
            tests/security/candidate-preview-ipc.test.ts \
            tests/migration/project-planning-migration.test.ts \
            tests/migration/recovery-migration.test.ts \
            tests/migration/scene-beat-migration.test.ts \
            tests/migration/testkit-faults.test.ts \
            tests/migration/sqlite-foundation.test.ts \
            tests/integration/narrative-foreshadowing.test.ts \
            tests/integration/narrative-character-arc.test.ts
          git commit -m "fix(M3-05): repair IPC composition and schema 14 regressions"
          git push origin HEAD:work/m3-05-foreshadowing-character-arc
