name: M3-05 Format Artifact

on:
  push:
    branches:
      - work/m3-05-foreshadowing-character-arc

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Format audited files
        run: >-
          pnpm exec prettier --write
          packages/core-service/src/narrative-planning.ts
          tests/integration/narrative-character-arc.test.ts
      - uses: actions/upload-artifact@v7
        with:
          name: m3-05-formatted-files
          path: |
            packages/core-service/src/narrative-planning.ts
            tests/integration/narrative-character-arc.test.ts
          if-no-files-found: error
