name: M3-05 Deterministic Format

on:
  push:
    branches:
      - work/m3-05-foreshadowing-character-arc

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-05-foreshadowing-character-arc
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Format audited files
        run: >-
          pnpm exec prettier --write
          packages/core-service/src/narrative-planning.ts
          tests/integration/narrative-character-arc.test.ts
      - name: Commit deterministic formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core-service/src/narrative-planning.ts tests/integration/narrative-character-arc.test.ts
          git commit -m "style(M3-05): apply repository prettier output"
          git push origin HEAD:work/m3-05-foreshadowing-character-arc
