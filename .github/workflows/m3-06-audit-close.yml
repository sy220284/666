name: M3-06 Audit Closure

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  close:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'work/m3-06-state-proposal-snapshot' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install frozen workspace
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Advance M3-06 through task control
        run: pnpm task:advance -- --ci=success --commit=01409dd483191764fbc05d5bb298a33f5b32f360
      - name: Normalize existing deferred acceptance ledger
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const path = 'docs/tasks/ACTIVE_TASK.json';
          const state = JSON.parse(await readFile(path, 'utf8'));
          const pending = [
            'four-file evidence package and real automated run records',
            'necessary manual review conclusions recorded in summary.md',
            'risk-based screenshots, full logs, or independent quality matrix when warranted',
            'final traceability verification status',
            'Verified closure',
          ];
          state.deferredVerification = (state.deferredVerification ?? []).map((entry) => ({
            ...entry,
            pending,
          }));
          await writeFile(path, `${JSON.stringify(state, null, 2)}\n`, 'utf8');
          NODE
          pnpm task:sync
      - name: Validate transition and focused policies
        shell: bash
        run: |
          pnpm task:validate
          pnpm test:unit -- tests/unit/task-control.test.ts tests/unit/evidence-policy.test.ts
          pnpm test:integration -- tests/integration/task-lifecycle.test.ts
      - name: Commit transition and remove helper
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/m3-06-audit-close.yml
          git add docs/tasks/ACTIVE_TASK.json docs/tasks/ACTIVE_TASK.md docs/tasks/TASK_INDEX.md docs/tasks/M3/M3-06_STATE_PROPOSAL_SNAPSHOT.md docs/tasks/M3/M3-07_RENDERER_REACT_FOUNDATION.md
          git commit -m "chore(M3-06): close audit remediation and resume M3-07"
          git push origin HEAD:work/m3-06-state-proposal-snapshot
