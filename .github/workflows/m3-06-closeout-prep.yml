name: M3-06 Closeout Prep

on:
  push:
    branches:
      - work/m3-06-state-proposal-snapshot

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Format E2E and synchronize M3-06 documentation
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec prettier --write tests/e2e/state-proposal-workflow.spec.ts
          python3 - <<'PY'
          from pathlib import Path
          import re

          schema = Path('docs/database/DATABASE_SCHEMA.md')
          text = schema.read_text()
          state_section = """#### `state_proposals`

由`0016_state_proposal_snapshot.sql`建立：

`id TEXT PK, project_id TEXT FK, chapter_id TEXT FK, source_version_id TEXT FK, proposal_type TEXT, source TEXT, entity_id TEXT NULL, state_key TEXT NULL, arc_milestone_id TEXT NULL, previous_value_json TEXT NULL, proposed_value_json TEXT, evidence_json TEXT, confidence REAL, status TEXT, resolved_value_json TEXT NULL, created_at TEXT, resolved_at TEXT NULL`

约束与语义：

- `proposal_type`为`entity_state/arc_milestone`；两类目标严格互斥。
- `source`为`rule/provider_stub`，`confidence`范围为0—1。
- `proposed_value_json`、`resolved_value_json`和Evidence必须为合法JSON；Evidence数组不能为空。
- `status`为`pending/accepted/edited/rejected`；pending必须没有解决时间和最终值。
- 同一章节、Version、Entity状态键或ArcMilestone只允许一条pending提案。
- pending只写候选账本，不修改EntityState或ArcMilestone；作者裁决与权威状态更新在单事务完成。

"""
          text, count = re.subn(
              r"#### `state_proposals`（M3-06规划）\n.*?(?=#### `foreshadowings`)",
              state_section,
              text,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'state_proposals section replacement count={count}')
          snapshot_section = """#### `ending_snapshots`

由`0016_state_proposal_snapshot.sql`建立：

`id TEXT PK, project_id TEXT FK, chapter_id TEXT FK, source_version_id TEXT FK, status TEXT, content_json TEXT, stale_reasons_json TEXT, created_at TEXT, stale_at TEXT NULL`

约束与语义：

- `status`为`valid/stale`；valid没有`stale_at`，stale必须记录失效时间。
- `(chapter_id, source_version_id)`唯一；同项目同章节最多一条valid快照。
- `content_json`保存已确认EntityState、KnowledgeState、Foreshadowing和ArcMilestone最小入口。
- 快照缺失或stale时读取返回`fallback_live_query`并直查权威当前表，不把旧快照当作有效输入。

#### `derived_invalidations`

`id TEXT PK, project_id TEXT FK, source_chapter_id TEXT FK, source_version_id TEXT FK, target_chapter_id TEXT FK NULL, scope TEXT, change_type TEXT, created_at TEXT`

`scope`为`continuity/arc/timeline/foreshadowing/validation/cache`；`change_type`为`entity_state/arc_milestone/event/timeline/foreshadowing`。旧章语义变化只记录并使后续章节派生快照失效；`prose`不写入该表，也不触发状态级联。

"""
          text, count = re.subn(
              r"#### `ending_snapshots`（M3-06规划）\n.*?(?=#### `character_arcs`)",
              snapshot_section,
              text,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'ending_snapshots section replacement count={count}')
          migration_note = "`0016_state_proposal_snapshot.sql`建立`state_proposals`、`ending_snapshots`与`derived_invalidations`，项目Schema升级为16。pending提案保持非权威；作者裁决、权威状态更新与尾快照重建使用单事务；纯文字修订不传播，语义变化只使后续派生数据stale。"
          if migration_note not in text:
              marker = "拆章和跨章移动保留被移动块的`logicalBlockId`"
              text = text.replace(marker, migration_note + "\n\n" + marker, 1)
          schema.write_text(text)

          dictionary = Path('docs/database/DATA_DICTIONARY.md')
          text = dictionary.read_text()
          marker = """StateProposal状态：

```text
pending | accepted | edited | rejected
```
"""
          addition = marker + """
StateProposal来源：

```text
rule | provider_stub
```

`pending`只表示待作者裁决的候选，不改变EntityState或ArcMilestone。`accept`使用提议值，`edit_accept`使用作者编辑后的合法JSON值，`reject`不产生权威写入；一批裁决任一失败时整批回滚。接受entity_state会结束旧current并写入新current，接受arc_milestone会以`confirmationSource=state_proposal`推进节点，并在同一事务重建章节尾快照。

EndingSnapshot状态：

```text
valid | stale
```

有效快照按章节和来源Version可追溯；缺失或stale时读取来源为`fallback_live_query`，内容来自权威当前表。DerivedInvalidation记录上游语义变化影响的后续章节与`continuity/arc/timeline/foreshadowing/validation/cache`范围；纯`prose`修改不产生失效记录。
"""
          if addition not in text:
              if marker not in text:
                  raise SystemExit('StateProposal status marker missing')
              text = text.replace(marker, addition, 1)
          dictionary.write_text(text)

          ipc = Path('docs/contracts/IPC_CONTRACTS.md')
          text = ipc.read_text()
          namespace_marker = """window.worldforgeNarrativePlanning = {
  list: {},
  saveForeshadowing: {},
  transitionForeshadowing: {},
  saveCharacterArc: {},
  saveArcMilestone: {},
  transitionArcMilestone: {},
};
"""
          namespace_addition = namespace_marker + """
window.worldforgeStateProposal = {
  list: {},
  generate: {},
  resolve: {},
  refreshSnapshot: {},
  readSnapshot: {},
  invalidateDerived: {},
};
"""
          if namespace_addition not in text:
              if namespace_marker not in text:
                  raise SystemExit('Narrative namespace marker missing')
              text = text.replace(namespace_marker, namespace_addition, 1)
          old_intro = "M3-04使用独立窄桥`window.worldforgeContinuity`接通连续性账本；M3-05使用`window.worldforgeNarrativePlanning`接通伏笔与人物弧光账本。两者均只暴露具名方法，M3-07—M3-10 Renderer架构迁移时再统一适配到正式Bridge边界。"
          new_intro = "M3-04使用独立窄桥`window.worldforgeContinuity`接通连续性账本；M3-05使用`window.worldforgeNarrativePlanning`接通伏笔与人物弧光账本；M3-06使用`window.worldforgeStateProposal`接通提案裁决、尾快照和失效传播。三者均只暴露具名方法，M3-07—M3-10 Renderer架构迁移时再统一适配到正式Bridge边界。"
          if old_intro in text:
              text = text.replace(old_intro, new_intro, 1)
          command_section = """M3-06冻结的状态提案与尾快照命令：

| 命令                              | IPC频道                                         | 输入                                                        | 输出                         |
| --------------------------------- | ----------------------------------------------- | ----------------------------------------------------------- | ---------------------------- |
| `stateProposal.list`              | `worldforge:state-proposal:list`                | projectId、可选chapterId、includeResolved                   | 提案、快照与失效记录目录     |
| `stateProposal.generate`          | `worldforge:state-proposal:generate`            | chapterId、final Version、来源、带正文证据的提案数组         | 只新增pending后的目录        |
| `stateProposal.resolve`           | `worldforge:state-proposal:resolve`             | author权限、接受/编辑接受/拒绝批量裁决                       | 权威状态与快照提交后的目录   |
| `stateProposal.refreshSnapshot`   | `worldforge:state-proposal:refresh-snapshot`    | author权限、chapterId、final Version                         | 重建后的EndingSnapshot       |
| `stateProposal.readSnapshot`      | `worldforge:state-proposal:read-snapshot`       | projectId、chapterId                                        | snapshot或fallback_live_query |
| `stateProposal.invalidateDerived` | `worldforge:state-proposal:invalidate-derived`  | author权限、来源章节/Version、变化类型                       | 失效快照ID与排队范围         |

Main先校验可信Renderer URL和strict命令Schema，再转换为`CoreStateProposalOperationSchema`。生成只接受属于当前项目、当前章节final Version的正文Evidence；空提取合法。`resolve`、`refreshSnapshot`和`invalidateDerived`只接受author权限。批量裁决、EntityState或ArcMilestone更新和快照重建使用同一项目库事务；pending、拒绝或失败批次不得产生权威写入。`prose`变化返回空失效结果，语义变化只标记后续快照stale，不自动修改后文。
"""
          text, count = re.subn(
              r"M3-06后续命令包括：\n\n- `continuity\.stateProposal\.list/accept/editAndAccept/reject`\n- `continuity\.snapshot\.get/markStale/rebuild`\n",
              command_section,
              text,
          )
          if count != 1 and command_section not in text:
              raise SystemExit(f'M3-06 IPC section replacement count={count}')
          test_line = "- M3-06由`tests/security/state-proposal-ipc.test.ts`、`tests/integration/state-proposal-snapshot.test.ts`和真实Electron `tests/e2e/state-proposal-workflow.spec.ts`验证六个具名命令、作者最终裁决、事务回滚、快照回退与桌面接受链路。"
          if test_line not in text:
              text = text.rstrip() + "\n" + test_line + "\n"
          ipc.write_text(text)

          trace = Path('docs/product/V1.0_TRACEABILITY_MATRIX.md')
          text = trace.read_text()
          text = text.replace(
              '| REQ-022 | 状态提案与尾快照                   | STA-002、SNP-001         | ADR-004、DATABASE_SCHEMA                   | M3-06                      | P0-041、P0-042         | In Progress |',
              '| REQ-022 | 状态提案与尾快照                   | STA-002、SNP-001         | ADR-004、DATABASE_SCHEMA                   | M3-06                      | P0-041、P0-042         | Implemented |',
              1,
          )
          closure = """## M3-06实现闭环

- 新增Schema 16、StateProposal/EndingSnapshot/DerivedInvalidation权威模型、六个具名IPC和作者裁决界面。
- pending提案零权威写入；接受、编辑接受、拒绝、EntityState或ArcMilestone更新及快照重建遵循单事务和作者最终裁决。
- 旧章纯文字修订不传播；位置、事件、时间线、伏笔和弧光语义变化只使后续派生快照stale，读取自动回退权威当前表。
- Unit、Integration、Migration、Build、Package Smoke和静态门已通过；真实Electron `state-proposal-workflow.spec.ts`纳入最终Ready矩阵。
- M3-06转Implemented后进入延期最终验收；REQ-022同步为Implemented。REQ-045仍依赖M6-02一致性校验，保持In Progress。

"""
          if closure not in text:
              marker = '## M3-04验收闭环'
              if marker not in text:
                  text = text.rstrip() + "\n\n" + closure
              else:
                  text = text.replace(marker, closure + marker, 1)
          trace.write_text(text)
          PY
          rm .github/workflows/m3-06-closeout-prep.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/e2e/state-proposal-workflow.spec.ts \
            docs/database/DATABASE_SCHEMA.md \
            docs/database/DATA_DICTIONARY.md \
            docs/contracts/IPC_CONTRACTS.md \
            docs/product/V1.0_TRACEABILITY_MATRIX.md \
            .github/workflows/m3-06-closeout-prep.yml
          git commit -m 'docs(M3-06): synchronize schema IPC and traceability'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
