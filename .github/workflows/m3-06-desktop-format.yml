name: M3-06 Desktop Format

on:
  push:
    branches:
      - work/m3-06-state-proposal-snapshot

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply locked formatter and remove bootstrap
        run: |
          pnpm exec prettier --write \
            apps/desktop/main/src/narrative-planning-ipc.ts \
            apps/desktop/preload/src/state-proposal-bridge.ts \
            apps/desktop/renderer/src/state-proposal-ui.ts \
            packages/contracts/src/state-proposal-ipc.ts \
            tests/security/narrative-planning-ipc.test.ts \
            tests/security/state-proposal-ipc.test.ts
          rm .github/workflows/m3-06-desktop-format.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/desktop/main/src/narrative-planning-ipc.ts \
            apps/desktop/preload/src/state-proposal-bridge.ts \
            apps/desktop/renderer/src/state-proposal-ui.ts \
            packages/contracts/src/state-proposal-ipc.ts \
            tests/security/narrative-planning-ipc.test.ts \
            tests/security/state-proposal-ipc.test.ts \
            .github/workflows/m3-06-desktop-format.yml
          git commit -m 'style(M3-06): format desktop proposal workflow'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
