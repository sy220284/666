name: M3-06 Format Bootstrap

on:
  push:
    branches: [work/m3-06-state-proposal-snapshot]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply locked formatter and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec prettier --write \
            packages/contracts/src/state-proposal.ts \
            packages/core-service/src/state-proposal.ts \
            tests/integration/state-proposal-snapshot.test.ts
          rm .github/workflows/m3-06-format-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/contracts/src/state-proposal.ts \
            packages/core-service/src/state-proposal.ts \
            tests/integration/state-proposal-snapshot.test.ts \
            .github/workflows/m3-06-format-bootstrap.yml
          git commit -m 'style(M3-06): apply locked formatter'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
