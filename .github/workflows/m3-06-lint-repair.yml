name: M3-06 Lint Repair

on:
  push:
    branches: [work/m3-06-state-proposal-snapshot]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
      - name: Remove unused import and bootstrap
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/core-service/src/state-proposal.ts')
          text = path.read_text()
          needle = '  ProposedArcMilestoneStatusSchema,\n'
          if needle not in text:
              raise SystemExit('unused import not found')
          path.write_text(text.replace(needle, '', 1))
          PY
          rm .github/workflows/m3-06-lint-repair.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/core-service/src/state-proposal.ts .github/workflows/m3-06-lint-repair.yml
          git commit -m 'fix(M3-06): remove unused proposal schema import'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
