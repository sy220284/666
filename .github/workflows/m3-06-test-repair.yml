name: M3-06 Test Repair

on:
  push:
    branches:
      - work/m3-06-state-proposal-snapshot

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply confirmed expectation changes
        run: |
          sed -i '0,/await expect(/s//expect(() =>/' tests/integration/state-proposal-snapshot.test.ts
          sed -i '0,/).rejects.toBeDefined();/s//).toThrow();/' tests/integration/state-proposal-snapshot.test.ts
          sed -i 's/expect(database.schemaVersion).toBe(15);/expect(database.schemaVersion).toBe(16);/' tests/migration/scene-beat-entity-truth-migration.test.ts
          sed -i 's/NULL, 15, ?, ?)/NULL, 16, ?, ?)/' tests/migration/scene-beat-entity-truth-migration.test.ts
          sed -i "/'character_arcs',/a\      'derived_invalidations'," tests/migration/sqlite-foundation.test.ts
          sed -i "/'drafts',/a\      'ending_snapshots'," tests/migration/sqlite-foundation.test.ts
          sed -i "/'schema_migrations',/a\      'state_proposals'," tests/migration/sqlite-foundation.test.ts
          pnpm exec prettier --write tests/integration/state-proposal-snapshot.test.ts tests/migration/scene-beat-entity-truth-migration.test.ts tests/migration/sqlite-foundation.test.ts
          rm .github/workflows/m3-06-test-repair.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/integration/state-proposal-snapshot.test.ts tests/migration/scene-beat-entity-truth-migration.test.ts tests/migration/sqlite-foundation.test.ts .github/workflows/m3-06-test-repair.yml
          git commit -m 'test(M3-06): align synchronous validation and schema 16 expectations'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
