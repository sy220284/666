name: M3-06 Test Repair

on:
  push:
    branches: [work/m3-06-state-proposal-snapshot]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work/m3-06-state-proposal-snapshot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Repair confirmed integration and migration expectations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          integration = Path('tests/integration/state-proposal-snapshot.test.ts')
          text = integration.read_text()
          old = """      await expect(
                harness.proposals.generate(randomUUID(), {
                  projectId: seeded.project.projectId,
                  chapterId: seeded.chapter1.id,
                  sourceVersionId: seeded.version.versionId,
                  source: 'rule',
                  proposals: [
                    {
                      proposalType: 'entity_state',
                      entityId: seeded.character.id,
                      stateKey: 'location',
                      proposedValue: seeded.south.id,
                      validUntilChapterId: null,
                      evidence: [],
                      confidence: 0.8,
                    },
                  ],
                }),
              ).rejects.toBeDefined();
          """
          new = """      expect(() =>
                harness.proposals.generate(randomUUID(), {
                  projectId: seeded.project.projectId,
                  chapterId: seeded.chapter1.id,
                  sourceVersionId: seeded.version.versionId,
                  source: 'rule',
                  proposals: [
                    {
                      proposalType: 'entity_state',
                      entityId: seeded.character.id,
                      stateKey: 'location',
                      proposedValue: seeded.south.id,
                      validUntilChapterId: null,
                      evidence: [],
                      confidence: 0.8,
                    },
                  ],
                }),
              ).toThrow();
          """
          if old not in text:
              raise SystemExit('integration assertion block not found')
          integration.write_text(text.replace(old, new, 1))

          migration = Path('tests/migration/scene-beat-entity-truth-migration.test.ts')
          text = migration.read_text()
          text = text.replace('expect(database.schemaVersion).toBe(15);', 'expect(database.schemaVersion).toBe(16);', 1)
          text = text.replace("NULL, 15, ?, ?)", "NULL, 16, ?, ?)", 1)
          migration.write_text(text)

          foundation = Path('tests/migration/sqlite-foundation.test.ts')
          text = foundation.read_text()
          text = text.replace(
              "      'character_arcs',\n      'draft_blocks',",
              "      'character_arcs',\n      'derived_invalidations',\n      'draft_blocks',",
              1,
          )
          text = text.replace(
              "      'drafts',\n      'entities',",
              "      'drafts',\n      'ending_snapshots',\n      'entities',",
              1,
          )
          text = text.replace(
              "      'schema_migrations',\n      'timeline_event_dependencies',",
              "      'schema_migrations',\n      'state_proposals',\n      'timeline_event_dependencies',",
              1,
          )
          foundation.write_text(text)
          PY
          pnpm exec prettier --write \
            tests/integration/state-proposal-snapshot.test.ts \
            tests/migration/scene-beat-entity-truth-migration.test.ts \
            tests/migration/sqlite-foundation.test.ts
          rm .github/workflows/m3-06-test-repair.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/integration/state-proposal-snapshot.test.ts \
            tests/migration/scene-beat-entity-truth-migration.test.ts \
            tests/migration/sqlite-foundation.test.ts \
            .github/workflows/m3-06-test-repair.yml
          git commit -m 'test(M3-06): align synchronous validation and schema 16 expectations'
          git push origin HEAD:work/m3-06-state-proposal-snapshot
