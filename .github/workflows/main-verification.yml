name: Main Verification

run-name: Main Verification ${{ inputs.expected_sha }}

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact main commit SHA produced by the controlled merge
        required: true
        type: string
      source_pr:
        description: Pull request number that produced the main commit
        required: true
        type: string
      source_head_sha:
        description: Pull request head SHA whose permanent checks passed
        required: true
        type: string

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: main-verification-${{ inputs.expected_sha }}
  cancel-in-progress: false

jobs:
  validate-main:
    name: validate-main
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      SOURCE_PR: ${{ inputs.source_pr }}
      SOURCE_HEAD_SHA: ${{ inputs.source_head_sha }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assert clean final main checkout
        run: node .github/governance/assert-clean-tree.mjs
      - name: Verify final main commit and source PR checks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          node scripts/main-verification.mjs
      - name: Assert main provenance validation did not mutate tracked files
        if: always()
        run: node .github/governance/assert-clean-tree.mjs

  quality:
    name: Main static verification
    needs: validate-main
    uses: ./.github/workflows/quality-core.yml
    with:
      checkout_ref: ${{ inputs.expected_sha }}
      draft_mode: true
      package_smoke: false
      security_suite: false
      performance_eval: false

  main-verification:
    name: main-verification
    if: always()
    needs:
      - validate-main
      - quality
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      VALIDATE_RESULT: ${{ needs.validate-main.result }}
      QUALITY_RESULT: ${{ needs.quality.result }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.expected_sha }}
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assert clean status publisher checkout
        run: node .github/governance/assert-clean-tree.mjs
      - name: Publish final main verification status
        run: node scripts/main-verification.mjs publish-status
      - name: Assert status publication did not mutate tracked files
        if: always()
        run: node .github/governance/assert-clean-tree.mjs
