name: Manual Merge Policy Restore

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/manual-merge-revert.yml

permissions:
  contents: write

jobs:
  restore:
    if: ${{ github.head_ref == 'policy/pr-only-workflow' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Restore explicit manual merge policy
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'docs/tasks/ACTIVE_TASK.json';
          const state = JSON.parse(fs.readFileSync(file, 'utf8'));
          delete state.authorization.autoMergeAfterChecks;
          delete state.activeTask.phase;
          delete state.activeTask.requireEvidence;
          const unexpected = new Set([
            '.github/CODEOWNERS',
            '.github/governance/',
            '.github/pull_request_template.md',
            '.github/workflows/',
            'scripts/automerge.mjs',
            'scripts/branch-hygiene.mjs',
            'scripts/ci-policy.mjs',
            'scripts/evidence-policy.mjs',
            'scripts/ruleset-policy.mjs',
            'scripts/scan-secrets.mjs',
            'scripts/taskctl.mjs',
            'docs/process/CI_WORKFLOW_ARCHITECTURE.md',
            'docs/process/MAIN_BRANCH_PROTECTION.md',
          ]);
          state.activeTask.allowedPaths = state.activeTask.allowedPaths.filter(
            (entry) => !unexpected.has(entry),
          );
          fs.writeFileSync(file, `${JSON.stringify(state, null, 2)}\n`);
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/tasks/ACTIVE_TASK.json
          git commit -m 'revert(governance): require manual PR merges'
          git push origin HEAD:${{ github.head_ref }}
