name: Performance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  performance:
    name: performance
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Draft pull request fast path
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == true }}
        run: echo "Performance baseline is deferred until the pull request is ready for review."
      - uses: actions/checkout@v6
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before performance validation
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
      - name: Run performance budgets
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm test:perf 2>&1 | tee test-results/ci/performance.log
      - name: Assert clean working tree after performance validation
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload performance evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: performance-evidence
          path: |
            test-results/ci/performance.log
            test-results/performance/
          if-no-files-found: warn
          retention-days: 7
