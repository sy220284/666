name: Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  performance:
    name: performance
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run performance budgets
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm test:perf 2>&1 | tee test-results/ci/performance.log
      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-evidence
          path: |
            test-results/ci/performance.log
            test-results/performance/
          if-no-files-found: warn
          retention-days: 30
