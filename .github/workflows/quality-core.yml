name: Quality Core

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Exact commit SHA or ref to validate
        required: false
        type: string
        default: ''
      draft_mode:
        description: Run only static checks for draft pull requests
        required: false
        type: boolean
        default: false
      full_suite:
        description: Run product tests, Electron E2E and build for code-bearing Ready PRs
        required: false
        type: boolean
        default: true
      package_smoke:
        description: Run the Linux package smoke job
        required: false
        type: boolean
        default: true
      security_suite:
        description: Run application security tests inside the reusable release gate
        required: false
        type: boolean
        default: false
      performance_eval:
        description: Run performance baselines inside the reusable release gate
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CI: true

jobs:
  static-checks:
    name: static-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before static checks
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Validate active task and mirror
        run: pnpm task:validate
      - run: pnpm check:workspaces
      - run: pnpm check:boundaries
      - name: Check formatting
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm format:check 2>&1 | tee test-results/ci/format-check.log
      - name: Run lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee test-results/ci/lint.log
      - name: Run typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee test-results/ci/typecheck.log
      - name: Assert clean working tree after static checks
        if: always()
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload static diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-check-diagnostics
          path: test-results/ci/
          if-no-files-found: warn
          retention-days: 7

  tests:
    name: tests-${{ matrix.suite }}
    if: ${{ inputs.draft_mode == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration, migration]
    steps:
      - name: Skip product tests for documentation-only Ready PR
        if: ${{ inputs.full_suite == false }}
        run: echo "Product tests are not required because only Markdown or docs/ files changed."
      - uses: actions/checkout@v6
        if: ${{ inputs.full_suite }}
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.full_suite }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ inputs.full_suite }}
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before test suite
        if: ${{ inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ inputs.full_suite }}
      - run: pnpm test:prepare
        if: ${{ inputs.full_suite }}
      - name: Run ${{ matrix.suite }} tests
        if: ${{ inputs.full_suite }}
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm exec vitest run "tests/${{ matrix.suite }}" 2>&1 | tee "test-results/ci/${{ matrix.suite }}.log"
      - name: Assert clean working tree after test suite
        if: ${{ always() && inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload ${{ matrix.suite }} test diagnostics
        if: ${{ failure() && inputs.full_suite }}
        uses: actions/upload-artifact@v7
        with:
          name: test-${{ matrix.suite }}-diagnostics
          path: |
            test-results/ci/${{ matrix.suite }}.log
            test-results/${{ matrix.suite }}/
          if-no-files-found: warn
          retention-days: 7

  security-tests:
    name: security-tests
    if: ${{ inputs.draft_mode == false && inputs.security_suite }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before security suite
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:prepare
      - name: Run application security tests
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm test:security 2>&1 | tee test-results/ci/security.log
      - name: Assert clean working tree after security suite
        if: always()
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload security diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-security-diagnostics
          path: |
            test-results/ci/security.log
            test-results/security/
          if-no-files-found: warn
          retention-days: 7

  performance-eval:
    name: performance-eval
    if: ${{ inputs.draft_mode == false && inputs.performance_eval }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before performance suite
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run performance and AI protocol baselines
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm test:perf 2>&1 | tee test-results/ci/performance-eval.log
      - name: Assert clean working tree after performance suite
        if: always()
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload performance and eval diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-performance-eval-diagnostics
          path: |
            test-results/ci/performance-eval.log
            test-results/performance/
          if-no-files-found: warn
          retention-days: 7

  desktop-e2e:
    name: desktop-e2e
    if: ${{ inputs.draft_mode == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Skip Electron E2E for documentation-only Ready PR
        if: ${{ inputs.full_suite == false }}
        run: echo "Electron E2E is not required because only Markdown or docs/ files changed."
      - uses: actions/checkout@v6
        if: ${{ inputs.full_suite }}
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.full_suite }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ inputs.full_suite }}
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before desktop E2E
        if: ${{ inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ inputs.full_suite }}
      - name: Install Electron display dependencies
        if: ${{ inputs.full_suite }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb
          fc-match "Noto Serif CJK SC"
      - name: Run Electron E2E and capture diagnostics
        if: ${{ inputs.full_suite }}
        shell: bash
        env:
          WORLDFORGE_E2E_OUTPUT_DIR: ${{ github.workspace }}/test-results/electron
          WORLDFORGE_CAPTURE_MATRIX_DIR: ${{ github.workspace }}/test-results/display-matrix
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm test:e2e 2>&1 | tee test-results/ci/desktop-e2e.log
      - name: Assert clean working tree after desktop E2E
        if: ${{ always() && inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload Electron and display evidence
        if: ${{ always() && inputs.full_suite }}
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-evidence
          path: |
            test-results/ci/desktop-e2e.log
            test-results/electron/
            test-results/display-matrix/
          if-no-files-found: warn
          retention-days: 7

  build:
    name: build
    if: ${{ inputs.draft_mode == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Skip build for documentation-only Ready PR
        if: ${{ inputs.full_suite == false }}
        run: echo "Build is not required because only Markdown or docs/ files changed."
      - uses: actions/checkout@v6
        if: ${{ inputs.full_suite }}
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.full_suite }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ inputs.full_suite }}
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before build
        if: ${{ inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ inputs.full_suite }}
      - name: Build all workspaces
        if: ${{ inputs.full_suite }}
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm build 2>&1 | tee test-results/ci/build.log
      - name: Assert clean working tree after build
        if: ${{ always() && inputs.full_suite }}
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload build diagnostics
        if: ${{ failure() && inputs.full_suite }}
        uses: actions/upload-artifact@v7
        with:
          name: build-diagnostics
          path: test-results/ci/build.log
          if-no-files-found: warn
          retention-days: 7

  package-smoke:
    name: package-smoke
    if: ${{ inputs.draft_mode == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Package smoke not required for this route
        if: ${{ inputs.package_smoke == false }}
        run: echo "Package smoke is reserved for Release or an explicitly enabled reusable gate."
      - uses: actions/checkout@v6
        if: ${{ inputs.package_smoke }}
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.package_smoke }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ inputs.package_smoke }}
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean working tree before package smoke
        if: ${{ inputs.package_smoke }}
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ inputs.package_smoke }}
      - name: Run package smoke test
        if: ${{ inputs.package_smoke }}
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm build 2>&1 | tee test-results/ci/package-smoke.log
          pnpm package 2>&1 | tee -a test-results/ci/package-smoke.log
      - name: Assert clean working tree after package smoke
        if: ${{ always() && inputs.package_smoke }}
        run: node .github/governance/assert-clean-tree.mjs
      - name: Upload package smoke diagnostics
        if: ${{ failure() && inputs.package_smoke }}
        uses: actions/upload-artifact@v7
        with:
          name: package-smoke-diagnostics
          path: |
            test-results/ci/package-smoke.log
            artifacts/
          if-no-files-found: warn
          retention-days: 7

  quality:
    name: quality
    if: always()
    needs:
      - static-checks
      - tests
      - security-tests
      - performance-eval
      - desktop-e2e
      - build
      - package-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      DRAFT_MODE: ${{ inputs.draft_mode }}
      PACKAGE_REQUIRED: ${{ inputs.package_smoke }}
      SECURITY_REQUIRED: ${{ inputs.security_suite }}
      PERFORMANCE_REQUIRED: ${{ inputs.performance_eval }}
      STATIC_RESULT: ${{ needs.static-checks.result }}
      TEST_RESULT: ${{ needs.tests.result }}
      SECURITY_RESULT: ${{ needs.security-tests.result }}
      PERFORMANCE_RESULT: ${{ needs.performance-eval.result }}
      E2E_RESULT: ${{ needs.desktop-e2e.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      PACKAGE_RESULT: ${{ needs.package-smoke.result }}
    steps:
      - name: Enforce aggregate quality result
        shell: bash
        run: |
          set -euo pipefail
          printf 'draft=%s\nstatic=%s\ntests=%s\nsecurity=%s\nperformance=%s\ne2e=%s\nbuild=%s\npackage=%s\n' \
            "$DRAFT_MODE" "$STATIC_RESULT" "$TEST_RESULT" "$SECURITY_RESULT" \
            "$PERFORMANCE_RESULT" "$E2E_RESULT" "$BUILD_RESULT" "$PACKAGE_RESULT"
          test "$STATIC_RESULT" = success
          if [ "$DRAFT_MODE" = true ]; then
            for result in "$TEST_RESULT" "$SECURITY_RESULT" "$PERFORMANCE_RESULT" \
              "$E2E_RESULT" "$BUILD_RESULT" "$PACKAGE_RESULT"; do
              case "$result" in
                success|skipped) ;;
                *) exit 1 ;;
              esac
            done
            exit 0
          fi

          for result in "$TEST_RESULT" "$E2E_RESULT" "$BUILD_RESULT"; do
            test "$result" = success
          done

          require_optional_job() {
            required="$1"
            result="$2"
            label="$3"
            if [ "$required" = true ]; then
              test "$result" = success || {
                echo "$label was enabled but did not succeed: $result" >&2
                exit 1
              }
              return
            fi
            case "$result" in
              success|skipped) ;;
              *)
                echo "$label produced an invalid disabled result: $result" >&2
                exit 1
                ;;
            esac
          }

          require_optional_job "$SECURITY_REQUIRED" "$SECURITY_RESULT" security-tests
          require_optional_job "$PERFORMANCE_REQUIRED" "$PERFORMANCE_RESULT" performance-eval
          require_optional_job "$PACKAGE_REQUIRED" "$PACKAGE_RESULT" package-smoke
