name: Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    uses: ./.github/workflows/quality-core.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      draft_mode: ${{ github.event.pull_request.draft == true }}
      package_smoke: true
      security_suite: false
      performance_eval: false

  static-failure-diagnostics:
    name: static-failure-diagnostics
    if: ${{ always() && needs.quality.result == 'failure' }}
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean diagnostic checkout
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Capture format, lint and typecheck output
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm format:check 2>&1 | tee test-results/ci/format-check.log || true
          pnpm lint 2>&1 | tee test-results/ci/lint.log || true
          pnpm typecheck 2>&1 | tee test-results/ci/typecheck.log || true
      - name: Upload complete static diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: static-failure-diagnostics
          path: |
            test-results/ci/format-check.log
            test-results/ci/lint.log
            test-results/ci/typecheck.log
          if-no-files-found: error
          retention-days: 7
