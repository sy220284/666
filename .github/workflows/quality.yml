name: Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: write

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  m3-05-repair:
    name: m3-05-repair
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: node .github/scripts/m3-05-ci-repair.mjs
      - run: >-
          pnpm exec prettier --write
          apps/desktop/main/src/candidate-preview-ipc.ts
          tests/security/candidate-preview-ipc.test.ts
          tests/migration/project-planning-migration.test.ts
          tests/migration/recovery-migration.test.ts
          tests/migration/scene-beat-migration.test.ts
          tests/migration/testkit-faults.test.ts
          tests/migration/sqlite-foundation.test.ts
          tests/integration/narrative-foreshadowing.test.ts
          tests/integration/narrative-character-arc.test.ts
      - run: pnpm test:prepare
      - run: >-
          pnpm exec vitest run
          tests/migration/project-planning-migration.test.ts
          tests/migration/recovery-migration.test.ts
          tests/migration/scene-beat-migration.test.ts
          tests/migration/testkit-faults.test.ts
          tests/migration/sqlite-foundation.test.ts
          tests/integration/narrative-foreshadowing.test.ts
          tests/integration/narrative-character-arc.test.ts
          tests/security/candidate-preview-ipc.test.ts
      - name: Commit verified repairs
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/desktop/main/src/candidate-preview-ipc.ts \
            tests/security/candidate-preview-ipc.test.ts \
            tests/migration/project-planning-migration.test.ts \
            tests/migration/recovery-migration.test.ts \
            tests/migration/scene-beat-migration.test.ts \
            tests/migration/testkit-faults.test.ts \
            tests/migration/sqlite-foundation.test.ts \
            tests/integration/narrative-foreshadowing.test.ts \
            tests/integration/narrative-character-arc.test.ts
          git commit -m "fix(M3-05): repair IPC composition and schema 14 regressions"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

  quality:
    needs: m3-05-repair
    uses: ./.github/workflows/quality-core.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      draft_mode: ${{ github.event.pull_request.draft == true }}
      package_smoke: true
      security_suite: false
      performance_eval: false

  static-failure-diagnostics:
    name: static-failure-diagnostics
    if: ${{ always() && needs.quality.result == 'failure' }}
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Assert clean diagnostic checkout
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Capture format, lint and typecheck output
        shell: bash
        run: |
          mkdir -p test-results/ci
          set -o pipefail
          pnpm format:check 2>&1 | tee test-results/ci/format-check.log || true
          pnpm lint 2>&1 | tee test-results/ci/lint.log || true
          pnpm typecheck 2>&1 | tee test-results/ci/typecheck.log || true
      - name: Upload complete static diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: static-failure-diagnostics
          path: |
            test-results/ci/format-check.log
            test-results/ci/lint.log
            test-results/ci/typecheck.log
          if-no-files-found: error
          retention-days: 7
