name: Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: write

concurrency:
  group: diagnostic-selection-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit-patch:
    if: ${{ github.head_ref == 'diagnostic/patch-m0-m3-round2' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_BRANCH: fix/governance-audit-m0-m3-integrated-coordination
      EXPECTED_HEAD: 76e30be8f2eaa8eadd64b4235d09d7f896986b0a
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Preserve patch script and check out formal remediation Head
        shell: bash
        run: |
          cp .github/diagnostics/patch-m0-m3-round2.py "$RUNNER_TEMP/patch-m0-m3-round2.py"
          git fetch --quiet origin "${TARGET_BRANCH}"
          actual="$(git rev-parse FETCH_HEAD)"
          test "${actual}" = "${EXPECTED_HEAD}"
          git checkout -B remediation-target "${actual}"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply and format selection restore fix
        shell: bash
        run: |
          python3 "$RUNNER_TEMP/patch-m0-m3-round2.py"
          pnpm exec prettier --write apps/desktop/renderer/src/features/writing/writing-core-workbench.tsx
      - name: Install Electron display dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk xvfb
      - name: Run focused Electron regression
        shell: bash
        env:
          WORLDFORGE_E2E_OUTPUT_DIR: ${{ github.workspace }}/test-results/electron-selection
        run: |
          mkdir -p test-results/selection-ci
          pnpm build
          set -o pipefail
          node scripts/run-electron-e2e.mjs \
            tests/e2e/electron-shell.spec.ts \
            --grep "edits, sanitizes, saves, and rebuilds a four-block Draft through the desktop UI" \
            2>&1 | tee test-results/selection-ci/selection.log
      - name: Upload focused Electron diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: selection-regression-diagnostics
          path: |
            test-results/selection-ci/selection.log
            test-results/electron-selection/
          if-no-files-found: warn
          retention-days: 1
      - name: Commit exact fix to formal remediation branch
        shell: bash
        run: |
          git config user.name "WorldForge Audit Remediation"
          git config user.email "worldforge-audit@users.noreply.github.com"
          git add apps/desktop/renderer/src/features/writing/writing-core-workbench.tsx
          git diff --cached --check
          git commit -m "fix(M3-10): preserve native selection before editor teardown"
          git push origin HEAD:"${TARGET_BRANCH}"
