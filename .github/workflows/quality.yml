name: Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: write

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  route:
    name: route
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      full_suite: ${{ steps.route.outputs.full_suite }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Determine Ready quality route
        id: route
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          full_suite=false
          changed_files="$(git diff --name-only "$BASE_SHA" HEAD)"
          if [ -z "$changed_files" ]; then
            full_suite=true
          else
            while IFS= read -r file; do
              case "$file" in
                *.md|docs/*)
                  ;;
                *)
                  full_suite=true
                  break
                  ;;
              esac
            done <<< "$changed_files"
          fi
          echo "full_suite=$full_suite" >> "$GITHUB_OUTPUT"
          echo "Ready quality full suite: $full_suite"

  quality:
    needs: route
    uses: ./.github/workflows/quality-core.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      draft_mode: ${{ github.event.pull_request.draft == true }}
      full_suite: ${{ needs.route.outputs.full_suite == 'true' }}
      package_smoke: false
      security_suite: false
      performance_eval: false

  preserve-rebind-queue:
    if: ${{ github.head_ref == 'diagnostic/preserve-m0-m3-rebind-queue' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_BRANCH: fix/governance-audit-m0-m3-final-remediation
      EXPECTED_HEAD: 8b01dffcdba8c0cd67bf25cdc68c91e93b433144
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Preserve patch and check out formal remediation Head
        shell: bash
        run: |
          cp .github/diagnostics/preserve-rebind-queue.py "$RUNNER_TEMP/preserve-rebind-queue.py"
          git fetch --quiet origin "${TARGET_BRANCH}"
          actual="$(git rev-parse FETCH_HEAD)"
          test "${actual}" = "${EXPECTED_HEAD}"
          git checkout -B remediation-target "${actual}"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Patch and format
        shell: bash
        run: |
          python3 "$RUNNER_TEMP/preserve-rebind-queue.py"
          pnpm exec prettier --write \
            migrations/project/0019_final_coordination_remediation.sql \
            tests/migration/final-coordination-remediation.test.ts
      - name: Verify upgrade preservation
        shell: bash
        run: |
          pnpm typecheck
          pnpm test:prepare
          pnpm exec vitest run \
            tests/migration/final-coordination-remediation.test.ts \
            tests/migration/integrated-coordination-migration.test.ts
      - name: Push verified patch to formal remediation branch
        shell: bash
        run: |
          git config user.name "WorldForge Final Audit Remediation"
          git config user.email "worldforge-final-audit@users.noreply.github.com"
          git add --all
          git diff --cached --check -- ':!*.md'
          git commit -m "fix(M3-02): preserve pending rebind rows across Schema 19"
          git push origin HEAD:"${TARGET_BRANCH}"
