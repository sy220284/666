name: Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  route:
    name: route
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      full_suite: ${{ steps.route.outputs.full_suite }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Determine Ready quality route
        id: route
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          full_suite=false
          changed_files="$(git diff --name-only "$BASE_SHA" HEAD)"
          if [ -z "$changed_files" ]; then
            full_suite=true
          else
            while IFS= read -r file; do
              case "$file" in
                *.md|docs/*)
                  ;;
                *)
                  full_suite=true
                  break
                  ;;
              esac
            done <<< "$changed_files"
          fi
          echo "full_suite=$full_suite" >> "$GITHUB_OUTPUT"
          echo "Ready quality full suite: $full_suite"

  quality:
    needs: route
    uses: ./.github/workflows/quality-core.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      draft_mode: ${{ github.event.pull_request.draft == true }}
      full_suite: ${{ needs.route.outputs.full_suite == 'true' }}
      package_smoke: false
      security_suite: false
      performance_eval: false

  audit-validate:
    if: ${{ github.head_ref == 'diagnostic/patch-ending-snapshot-projection' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_BRANCH: fix/governance-audit-m0-m3-snapshot-projection
      EXPECTED_HEAD: f1be19dd5c0f41594b5a824c8f888cb9a27295b3
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Check out exact formal remediation Head
        shell: bash
        run: |
          git fetch --quiet origin "${TARGET_BRANCH}"
          actual="$(git rev-parse FETCH_HEAD)"
          test "${actual}" = "${EXPECTED_HEAD}"
          git checkout -B remediation-target "${actual}"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run focused regressions
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm test:prepare
            pnpm exec vitest run \
              tests/integration/ending-snapshot-temporal-projection.test.ts \
              tests/migration/final-coordination-remediation.test.ts
          } 2>&1 | tee "$RUNNER_TEMP/snapshot-projection-focused.log"
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-projection-focused
          path: ${{ runner.temp }}/snapshot-projection-focused.log
          if-no-files-found: warn
          retention-days: 1
