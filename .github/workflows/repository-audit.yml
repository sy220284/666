name: Repository Audit

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/repository-audit.yml

permissions:
  contents: read

jobs:
  audit:
    if: ${{ github.head_ref == 'policy/pr-only-workflow' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Collect repository audit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repository-audit
          git ls-remote --heads origin \
            | awk '{name=$2; sub("refs/heads/", "", name); print name "\t" $1}' \
            | sort > repository-audit/branches.tsv
          find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) \
            -printf '%f\n' | sort > repository-audit/workflows.txt
          {
            echo '== contents write =='
            grep -RInE 'contents:[[:space:]]*write' .github/workflows || true
            echo '== push to main =='
            grep -RInE 'git push[^\n]*(main|HEAD:main)|update-ref[^\n]*main' .github/workflows scripts || true
            echo '== auto merge =='
            grep -RInE 'auto[-_ ]?merge|gh pr merge|merge_pull_request' .github/workflows scripts || true
            echo '== risky triggers =='
            grep -RInE 'pull_request_target|workflow_run:' .github/workflows || true
            echo '== workflow permissions =='
            grep -RInE '^permissions:|^[[:space:]]+contents:' .github/workflows || true
          } > repository-audit/security-scan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: repository-audit
          path: repository-audit/
          if-no-files-found: error
          retention-days: 7
