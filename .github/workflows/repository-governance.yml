name: Repository Governance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/governance/**'
      - '.github/workflows/**'
      - 'scripts/automerge.mjs'
      - 'scripts/ci-policy.mjs'
      - 'scripts/main-verification.mjs'
      - 'scripts/ruleset-policy.mjs'
      - 'docs/process/CI_WORKFLOW_ARCHITECTURE.md'
      - 'docs/process/MAIN_BRANCH_PROTECTION.md'
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-governance-${{ github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

jobs:
  repository-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || 'main' }}
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assert clean trusted governance checkout
        shell: bash
        run: test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Audit permanent automation inventory
        run: node .github/governance/automation-layout-policy.mjs
      - name: Self-test deferred task closure
        run: node .github/governance/deferred-task-closure.mjs --self-test
      - name: Audit complete native main-branch protection
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          RULESET_REPORT: artifacts/repository-governance/report.json
          RULESET_STRICT: true
        run: node scripts/ruleset-policy.mjs check
      - name: Assert governance audit did not mutate tracked files
        if: always()
        shell: bash
        run: test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Upload ruleset drift report
        if: ${{ always() && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: repository-governance-report
          path: artifacts/repository-governance/
          if-no-files-found: error
          retention-days: 30
