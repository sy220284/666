name: Restore M3-01 Task Index

on:
  push:
    branches:
      - chore/restore-m3-01-after-m2-04

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Synchronize task index states
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('docs/tasks/TASK_INDEX.md')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '| M2-04 | [`回收站、拆章、并章与结构恢复`](M2/M2-04_TRASH_STRUCTURE_RECOVERY.md) | M2-03、M1-08 | In Progress |',
                  '| M2-04 | [`回收站、拆章、并章与结构恢复`](M2/M2-04_TRASH_STRUCTURE_RECOVERY.md) | M2-03、M1-08 | Implemented |',
              ),
              (
                  '| M3-01 | [`作品任务书与大纲树`](M3/M3-01_PROJECT_BRIEF_OUTLINE.md)                 | M2                         | Planned |',
                  '| M3-01 | [`作品任务书与大纲树`](M3/M3-01_PROJECT_BRIEF_OUTLINE.md)                 | M2                         | In Progress |',
              ),
          ]
          for before, after in replacements:
              count = text.count(before)
              if count != 1:
                  raise SystemExit(f'expected one task index match, found {count}: {before}')
              text = text.replace(before, after, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit synchronized index
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/restore-m3-01-task-index.yml
          git add docs/tasks/TASK_INDEX.md
          git commit -m "chore(tasks): synchronize M2-04 and M3-01 index states"
          git push
