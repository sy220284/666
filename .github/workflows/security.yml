name: Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Determine dependency audit route
        id: route
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          run=false
          if [ "$DRAFT" = false ] && git diff --name-only "$BASE_SHA" HEAD | grep -Eq '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/)'; then
            run=true
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        if: ${{ steps.route.outputs.run == 'true' }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ steps.route.outputs.run == 'true' }}
        with:
          node-version: 24
          cache: pnpm
      - name: Clean tree before dependency audit
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ steps.route.outputs.run == 'true' }}
      - name: Audit high-severity dependency vulnerabilities
        shell: bash
        run: |
          if [ "${{ steps.route.outputs.run }}" = true ]; then
            pnpm audit --audit-level=high
          else
            echo "Dependency audit skipped: dependency and workflow inputs are unchanged."
          fi
      - name: Clean tree after dependency audit
        if: always()
        run: node .github/governance/assert-clean-tree.mjs

  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Clean tree before tracked-file scan
        run: node .github/governance/assert-clean-tree.mjs
      - name: Scan tracked files
        run: node scripts/scan-secrets.mjs
      - name: Clean tree after tracked-file scan
        if: always()
        run: node .github/governance/assert-clean-tree.mjs

  application-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Determine application security route
        id: route
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          run=false
          if [ "$DRAFT" = false ] && node --input-type=module -e "import {readFileSync} from 'node:fs'; const state=JSON.parse(readFileSync('docs/tasks/ACTIVE_TASK.json','utf8')); process.exit(state.activeTask?.verification?.includes('pnpm test:security') ? 0 : 1);"; then
            run=true
          elif [ "$DRAFT" = false ] && git diff --name-only "$BASE_SHA" HEAD | grep -Eq '^(apps/desktop/(main|preload)/|packages/(contracts|core-service)/|migrations/|tests/security/|scripts/(scan-secrets|ci-policy)\.mjs$|\.github/workflows/security\.yml$)'; then
            run=true
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        if: ${{ steps.route.outputs.run == 'true' }}
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        if: ${{ steps.route.outputs.run == 'true' }}
        with:
          node-version: 24
          cache: pnpm
      - name: Clean tree before application checks
        run: node .github/governance/assert-clean-tree.mjs
      - run: pnpm install --frozen-lockfile --prefer-offline
        if: ${{ steps.route.outputs.run == 'true' }}
      - run: pnpm test:prepare
        if: ${{ steps.route.outputs.run == 'true' }}
      - name: Run application security tests
        shell: bash
        run: |
          if [ "${{ steps.route.outputs.run }}" = true ]; then
            pnpm test:security
          else
            echo "Application security suite skipped: no security boundary changed."
          fi
      - name: Clean tree after application checks
        if: always()
        run: node .github/governance/assert-clean-tree.mjs

  security:
    name: security
    if: always()
    needs:
      - dependency-audit
      - secret-scan
      - application-security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      AUDIT_RESULT: ${{ needs.dependency-audit.result }}
      SECRET_RESULT: ${{ needs.secret-scan.result }}
      APP_RESULT: ${{ needs.application-security.result }}
    steps:
      - name: Enforce security result
        shell: bash
        run: |
          set -euo pipefail
          printf 'audit=%s\nscan=%s\napplication=%s\n' "$AUDIT_RESULT" "$SECRET_RESULT" "$APP_RESULT"
          test "$AUDIT_RESULT" = success
          test "$SECRET_RESULT" = success
          test "$APP_RESULT" = success
