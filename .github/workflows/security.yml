name: Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-audit:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Audit high-severity dependency vulnerabilities
        run: pnpm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Scan tracked files for credentials
        run: node scripts/scan-secrets.mjs

  application-security:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:prepare
      - name: Run IPC, path, renderer and database security tests
        run: pnpm test:security

  security:
    name: security
    if: always()
    needs:
      - dependency-audit
      - secret-scan
      - application-security
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      DRAFT_MODE: ${{ github.event.pull_request.draft }}
      AUDIT_RESULT: ${{ needs.dependency-audit.result }}
      SECRET_RESULT: ${{ needs.secret-scan.result }}
      APP_RESULT: ${{ needs.application-security.result }}
    steps:
      - name: Enforce security result
        shell: bash
        run: |
          set -euo pipefail
          printf 'draft=%s\naudit=%s\nsecret=%s\napplication=%s\n' \
            "$DRAFT_MODE" "$AUDIT_RESULT" "$SECRET_RESULT" "$APP_RESULT"
          test "$SECRET_RESULT" = success
          if [ "$DRAFT_MODE" = true ]; then
            for result in "$AUDIT_RESULT" "$APP_RESULT"; do
              case "$result" in
                success|skipped) ;;
                *) exit 1 ;;
              esac
            done
            exit 0
          fi
          test "$AUDIT_RESULT" = success
          test "$APP_RESULT" = success
