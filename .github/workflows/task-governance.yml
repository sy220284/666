name: Task Governance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: task-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  task-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TASK_BASE_REF: ${{ github.event.pull_request.base.sha }}
      TASK_EVENT_NAME: ${{ github.event_name }}
      TASK_PR_HEAD_REF: ${{ github.head_ref }}
      TASK_PR_DRAFT: ${{ github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assert clean working tree before task validation
        run: node .github/governance/assert-clean-tree.mjs
      - name: Materialize base task state
        shell: bash
        run: git show "${TASK_BASE_REF}:docs/tasks/ACTIVE_TASK.json" > "$RUNNER_TEMP/base-active-task.json"
      - name: Validate active task and generated mirror
        run: node scripts/taskctl.mjs validate
      - name: Validate real PR branch
        run: node scripts/taskctl.mjs pr-policy
      - name: Validate changed paths
        run: node scripts/taskctl.mjs preflight
      - name: Validate evidence structure
        run: node scripts/taskctl.mjs verify
      - name: Validate implementation transition for Ready PRs
        env:
          TASK_BASE_STATE_PATH: ${{ runner.temp }}/base-active-task.json
        run: node .github/governance/task-transition-policy.mjs
      - name: Assert clean working tree after task validation
        run: node .github/governance/assert-clean-tree.mjs
