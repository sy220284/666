name: Task Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: task-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  task-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TASK_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Ensure task comparison base is available
        shell: bash
        run: |
          set -euo pipefail
          if git cat-file -e "$TASK_BASE_REF^{commit}" 2>/dev/null; then
            exit 0
          fi
          if git fetch --no-tags --depth=1 origin "$TASK_BASE_REF"; then
            git cat-file -e "$TASK_BASE_REF^{commit}"
            exit 0
          fi
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --unshallow origin
          else
            git fetch --no-tags origin main
          fi
          git cat-file -e "$TASK_BASE_REF^{commit}"
      - name: Validate active task and generated mirror
        run: node scripts/taskctl.mjs validate
      - name: Validate changed paths
        run: node scripts/taskctl.mjs preflight
      - name: Validate evidence structure
        run: node scripts/taskctl.mjs verify
