name: Task Governance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: task-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  task-governance:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TASK_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
      TASK_EVENT_NAME: ${{ github.event_name }}
      TASK_PR_HEAD_REF: ${{ github.head_ref }}
      TASK_PR_DRAFT: ${{ github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve effective PR base
        shell: bash
        run: |
          base_ref="$(git merge-base "origin/${TASK_BASE_BRANCH}" HEAD)"
          echo "TASK_BASE_REF=${base_ref}" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assert clean working tree before task validation
        run: node .github/governance/assert-clean-tree.mjs
      - name: Materialize base task state
        shell: bash
        run: |
          git show "${TASK_BASE_REF}:docs/tasks/ACTIVE_TASK.json" > "$RUNNER_TEMP/base-active-task.json"
          git show "${TASK_BASE_REF}:docs/tasks/TASK_INDEX.md" > "$RUNNER_TEMP/base-task-index.md"
      - name: Validate active task and generated mirror
        run: node scripts/taskctl.mjs validate
      - name: Validate changed paths
        shell: bash
        run: |
          set +e
          {
            echo "TASK_BASE_REF=${TASK_BASE_REF}"
            echo "TASK_PR_HEAD_REF=${TASK_PR_HEAD_REF}"
            echo "resolved_head=$(git rev-parse "refs/remotes/origin/${TASK_PR_HEAD_REF}")"
            echo "changed_files:"
            git diff --name-only "${TASK_BASE_REF}" "refs/remotes/origin/${TASK_PR_HEAD_REF}"
            echo "preflight:"
            node scripts/taskctl.mjs preflight
          } 2>&1 | tee "$RUNNER_TEMP/task-governance-preflight.log"
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload task governance diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: task-governance-preflight
          path: ${{ runner.temp }}/task-governance-preflight.log
          if-no-files-found: error
          retention-days: 7
      - name: Validate task transition for Ready PRs
        env:
          TASK_BASE_STATE_PATH: ${{ runner.temp }}/base-active-task.json
          TASK_BASE_INDEX_PATH: ${{ runner.temp }}/base-task-index.md
        run: node .github/governance/task-transition-policy.mjs
      - name: Assert clean working tree after task validation
        if: always()
        run: node .github/governance/assert-clean-tree.mjs
