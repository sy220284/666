name: Task Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: task-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  task-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TASK_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      TASK_EVENT_NAME: ${{ github.event_name }}
      TASK_PR_HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Validate active task and generated mirror
        run: node scripts/taskctl.mjs validate
      - name: Validate real PR branch
        if: ${{ github.event_name == 'pull_request' }}
        run: node scripts/taskctl.mjs pr-policy
      - name: Validate changed paths
        run: node scripts/taskctl.mjs preflight
      - name: Validate evidence structure
        run: node scripts/taskctl.mjs verify
