name: Task Governance

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  task-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TASK_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
      TASK_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Quiet repository checkout
        shell: bash
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --no-tags --depth=1 origin "${TASK_HEAD_SHA}"
          git checkout --quiet FETCH_HEAD
          git fetch --quiet --no-tags --unshallow origin
      - name: Diagnose milestone close
        shell: bash
        run: |
          git fetch --quiet --no-tags origin 5629f7430e58684f70b0de450b50ae330f3cdb62
          echo "CLOSURE_TREE=$(git rev-parse 12bb9b7b44d3f2adcaf63c7c6ca19cb97bada57c^{tree})"
          echo "CURRENT_MAIN_TREE=$(git rev-parse origin/main^{tree})"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          base_ref="$(git merge-base "origin/${TASK_BASE_BRANCH}" HEAD)"
          git show "${base_ref}:docs/tasks/ACTIVE_TASK.json" > "$RUNNER_TEMP/base-active-task.json"
          git show "${base_ref}:docs/tasks/TASK_INDEX.md" > "$RUNNER_TEMP/base-task-index.md"
          TASK_BASE_REF="$base_ref" \
          TASK_BASE_STATE_PATH="$RUNNER_TEMP/base-active-task.json" \
          TASK_BASE_INDEX_PATH="$RUNNER_TEMP/base-task-index.md" \
          node .github/governance/stage-close-policy.mjs
