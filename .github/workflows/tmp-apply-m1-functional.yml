name: Temporary Apply M1 Functional Repair

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/m1-08-unreadable-recovery-v2' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/m1-08-unreadable-recovery-v2
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Decode and verify patch
        run: |
          base64 -d .repair-patch/m1-functional.patch.gz.b64 | gzip -d > /tmp/m1-functional.patch
          echo "faea3b05c07145167ca8e2b91e0969bce5ad3191c1d4a5fcd4b3968fd8e3a8c7  /tmp/m1-functional.patch" | sha256sum -c -
      - name: Apply functional repair onto latest main
        run: git apply --3way --index /tmp/m1-functional.patch
      - name: Format touched sources
        run: |
          pnpm exec prettier --write \
            apps/desktop/renderer/src/index.html \
            apps/desktop/renderer/src/index.ts \
            packages/core-service/src/project-workspace.ts \
            tests/e2e/acceptance-screenshot.ts \
            tests/e2e/candidate-action.spec.ts \
            tests/e2e/candidate-preview.spec.ts \
            tests/e2e/candidate-undo.spec.ts \
            tests/e2e/electron-shell.spec.ts \
            tests/e2e/playwright.config.ts \
            tests/e2e/structure-recovery.spec.ts \
            tests/e2e/unreadable-project-recovery.spec.ts \
            tests/integration/recovery-service.test.ts
          git add apps packages tests
      - run: node scripts/taskctl.mjs validate
      - run: git rm .repair-patch/m1-functional.patch.gz.b64
      - name: Commit and push repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(M1-08): recover physically unreadable projects"
          git push origin HEAD:fix/m1-08-unreadable-recovery-v2
