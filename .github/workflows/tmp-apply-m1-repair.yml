name: Temporary Apply M1 Repair

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/m1-08-unreadable-recovery' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v6
        with:
          ref: fix/m1-08-unreadable-recovery
          fetch-depth: 0
          persist-credentials: true

      - name: Decode and verify repair payload
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .repair-patch/m1-repair.patch.gz.b64 | gzip -d > /tmp/m1-repair.patch
          echo "27a33534d0248af91a073ade7b5ecfe31f49aedb03039f29013f775a2ea87c2f  /tmp/m1-repair.patch" | sha256sum -c -

      - name: Check patch applicability
        run: git apply --check /tmp/m1-repair.patch

      - name: Apply repair patch
        run: git apply --index /tmp/m1-repair.patch

      - name: Remove repair payload
        run: git rm .repair-patch/m1-repair.patch.gz.b64

      - name: Validate task control
        run: node scripts/taskctl.mjs validate

      - name: Validate staged diff
        run: git diff --cached --check

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(M1-08): recover physically unreadable projects"

      - name: Push repair
        run: git push origin HEAD:fix/m1-08-unreadable-recovery
