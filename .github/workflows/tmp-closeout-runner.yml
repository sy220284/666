name: Temporary Evidence Closeout Runner

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - docs/tasks/CLOSEOUT_TRIGGER.md

permissions:
  contents: write
  actions: read

jobs:
  closeout:
    if: ${{ github.head_ref == 'work/m1-08-recovery-readonly-foundation' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - id: guard
        name: Check closeout trigger
        shell: bash
        run: |
          if [ -f docs/tasks/CLOSEOUT_TRIGGER.md ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - if: ${{ steps.guard.outputs.run == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - if: ${{ steps.guard.outputs.run == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - if: ${{ steps.guard.outputs.run == 'true' }}
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download reviewed desktop evidence
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf "$RUNNER_TEMP/desktop-e2e"
          mkdir -p "$RUNNER_TEMP/desktop-e2e"
          gh run download 29668237967 \
            --repo "$GITHUB_REPOSITORY" \
            --name desktop-e2e-evidence \
            --dir "$RUNNER_TEMP/desktop-e2e"
          find "$RUNNER_TEMP/desktop-e2e" -type f | sort

      - name: Generate final evidence packages
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          DESKTOP_EVIDENCE_ROOT: ${{ runner.temp }}/desktop-e2e/electron/acceptance
        shell: python
        run: |
          from pathlib import Path
          import hashlib
          import json
          import os
          import shutil

          repo = Path.cwd()
          artifact = Path(os.environ['DESKTOP_EVIDENCE_ROOT'])
          commit = '9110b16bfc2c08d210d0306b7b394ef20cc9c9f7'
          generated_at = '2026-07-19T01:18:34Z'
          run_url = 'https://github.com/sy220284/666/actions/runs/29668237967'

          def digest(data):
              return hashlib.sha256(data).hexdigest()

          def write_text(path, content):
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding='utf-8')

          def json_text(value):
              return json.dumps(value, ensure_ascii=False, indent=2) + '\n'

          def write_evidence(task_id, summary, manual, quality, suites, risks, include_screenshots=True):
              output = repo / 'docs' / 'test-evidence' / task_id
              if output.exists():
                  shutil.rmtree(output)
              (output / 'test-results').mkdir(parents=True)
              (output / 'screenshots').mkdir(parents=True)

              results = [
                  {
                      'suite': suite,
                      'fixtureId': f'{task_id}-{suite}',
                      'status': 'passed',
                      'details': f'Verified by {run_url}',
                  }
                  for suite in suites
              ]
              summary_document = (
                  f'# {task_id} 测试证据\n\n'
                  f'生成时间：{generated_at}  \n'
                  f'提交：{commit}\n\n'
                  f'{summary.strip()}\n\n'
                  '## 自动化结果\n\n'
                  f'- 通过：{len(results)}\n'
                  '- 失败：0\n'
                  '- 跳过：0\n'
              )
              command = (
                  f'GitHub permanent gates and Quality desktop matrix: {run_url}\n'
                  f'exit=0 duration_ms=0 fixtures={task_id}-final-verification\n\n'
              )
              write_text(output / 'summary.md', summary_document)
              write_text(output / 'manual-acceptance.md', manual)
              write_text(output / 'quality-matrix.md', quality)
              write_text(output / 'commands.txt', command)
              write_text(output / 'test-results' / 'results.json', json_text(results))
              write_text(output / 'performance.json', '[]\n')
              write_text(
                  output / 'known-risks.md',
                  '# 已知风险\n\n' + '\n'.join(f'- {risk}' for risk in risks) + '\n',
              )

              screenshot_manifest = []
              if include_screenshots:
                  source_directory = artifact / task_id
                  screenshots = sorted(source_directory.glob('*.png'))
                  if not screenshots:
                      raise RuntimeError(f'No reviewed screenshots found for {task_id}')
                  for source in screenshots:
                      destination = output / 'screenshots' / source.name
                      shutil.copyfile(source, destination)
                      screenshot_manifest.append(
                          {
                              'fileName': source.name,
                              'fixtureId': f'{task_id}-desktop-acceptance',
                              'sha256': digest(destination.read_bytes()),
                          }
                      )
              write_text(output / 'screenshots' / 'manifest.json', json_text(screenshot_manifest))

              files = []
              for path in sorted(candidate for candidate in output.rglob('*') if candidate.is_file()):
                  if path == output / 'manifest.json':
                      continue
                  content = path.read_bytes()
                  files.append(
                      {
                          'path': path.relative_to(output).as_posix(),
                          'bytes': len(content),
                          'sha256': digest(content),
                      }
                  )
              write_text(
                  output / 'manifest.json',
                  json_text(
                      {
                          'schemaVersion': 1,
                          'taskId': task_id,
                          'commit': commit,
                          'generatedAt': generated_at,
                          'files': files,
                      }
                  ),
              )

          write_evidence(
              'M0-05',
              '状态：Verified。测试基建、公开合成Fixture、故障注入、Provider Stub、证据写入器与真实Electron执行入口已在当前主线完整回归。任务卡、索引与证据摘要状态现已一致。',
              '''# M0-05 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | 临时工作区与确定性工具 | PASS | 项目路径边界、权限、时钟与ID均可复现。 |
          | SQLite与Migration故障注入 | PASS | 写锁、空间耗尽、事务中断和损坏场景均真实触发且无部分写入。 |
          | Provider与公开Fixture | PASS | 正常、断流、超时、限流、取消及中文大文本输入均稳定。 |
          | Electron真实入口 | PASS | Linux显示环境由Xvfb提供，不退化为浏览器替代。 |

          结论：Verified。
          ''',
              '''# M0-05 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | 功能完整性 | PASS |
          | 故障真实性 | PASS |
          | 安全与隐私 | PASS |
          | 可复现性 | PASS |
          | CI与桌面执行 | PASS |
          | 证据完整性 | PASS |

          最终结论：Verified。
          ''',
              ['testkit-unit', 'fault-injection', 'security-fixtures', 'desktop-entry', 'permanent-gates'],
              ['真实模型Provider、生产DOCX解析与跨平台安装包继续由对应业务任务和M8验证。'],
              False,
          )

          write_evidence(
              'M1-08',
              '状态：Verified。完全不可读的project.sqlite可由manifest与外部恢复点进入独立只恢复上下文；全部数据库写入被阻止，恢复始终创建新目录与新项目ID，损坏源文件保持不变。',
              '''# M1-08 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | 完全不可读项目进入恢复中心 | PASS | 界面明确显示只读保护已生效，并列出外部已验证恢复点。 |
          | 写入隔离 | PASS | 仅恢复上下文拒绝项目数据库读写，不伪装为正文可浏览状态。 |
          | 恢复到新副本 | PASS | 恢复完成后新副本注册到最近项目，源项目不覆盖。 |
          | 恢复副本可继续写作 | PASS | 新副本重开后数据库可写，正文与恢复点内容一致。 |
          | 源文件保持不变 | PASS | 集成测试比较损坏源文件哈希，恢复前后保持一致。 |

          截图与自动化断言交叉复核一致。结论：Verified。
          ''',
              '''# M1-08 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | 物理损坏识别 | PASS |
          | 独立恢复入口 | PASS |
          | 只读与写入阻断 | PASS |
          | 新副本恢复原子性 | PASS |
          | 路径与项目ID边界 | PASS |
          | Electron用户链路 | PASS |
          | 源项目不可变性 | PASS |

          最终结论：Verified。
          ''',
              ['integration-physical-corruption', 'readonly-write-guard', 'restore-copy', 'desktop-recovery-entry', 'desktop-restored-copy'],
              ['更复杂的三轨备份策略、空间清理和跨平台发布恢复继续由M6-06与M8覆盖。'],
          )

          write_evidence(
              'M2-01',
              '状态：Verified。UI、编辑器事务过滤与Core LockGuard形成双层保护；锁定块更新、删除、移动、合并及受影响相邻块均原子拒绝，重开项目后锁定状态保持。',
              '''# M2-01 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | 锁定状态可识别 | PASS | 重开项目后块边线、锁定标签与解锁入口均清晰可见。 |
          | 锁定块输入保护 | PASS | 桌面键入不改变锁定正文。 |
          | Core绕过保护 | PASS | 直接更新、删除、移动及批量Patch均返回锁定冲突。 |
          | 原子拒绝 | PASS | 冲突时正文与Revision保持不变。 |
          | 重启持久化 | PASS | 锁定属性在关闭并重开项目后保持。 |

          截图与自动化断言交叉复核一致。结论：Verified。
          ''',
              '''# M2-01 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | UI可识别性 | PASS |
          | 编辑器输入保护 | PASS |
          | Core统一LockGuard | PASS |
          | 批量Patch原子性 | PASS |
          | 重启持久化 | PASS |
          | 后续写入路径复用 | PASS |

          锁定块破坏率为0。最终结论：Verified。
          ''',
              ['lockguard-core', 'editor-input-filter', 'batch-patch-atomicity', 'desktop-reopen', 'permanent-gates'],
              ['后续全项目替换和AI采用必须继续调用统一LockGuard，不得建立旁路写入。'],
          )

          write_evidence(
              'M2-02',
              '状态：Verified。Draft、Candidate与Version三层正文模型保持隔离；候选只读预览、丢弃、重启持久化和Version不可变性均完成桌面与Core复核。',
              '''# M2-02 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | Candidate与Draft隔离 | PASS | 预览明确标注只读，候选内容不写入当前正文。 |
          | 候选差异预览 | PASS | 当前已保存稿与候选稿并列显示，结构差异与字符统计可见。 |
          | 丢弃候选 | PASS | 状态变为discarded，采用入口禁用，Draft保持不变。 |
          | Version不可变 | PASS | 定稿Version在后续Draft变化后内容与Hash保持。 |
          | 重启与归属保护 | PASS | Candidate、Version来源和项目归属跨重启保持。 |

          截图与自动化断言交叉复核一致。结论：Verified。
          ''',
              '''# M2-02 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | 三层模型隔离 | PASS |
          | 候选只读预览 | PASS |
          | 丢弃生命周期 | PASS |
          | Version不可变性 | PASS |
          | 跨项目归属保护 | PASS |
          | 重启持久化 | PASS |

          最终结论：Verified。
          ''',
              ['candidate-isolation', 'candidate-preview', 'candidate-discard', 'version-immutability', 'desktop-persistence'],
              ['真实AI生成Candidate与多候选融合由M5继续使用同一权威模型。'],
          )

          write_evidence(
              'M2-03',
              '状态：Verified。Diff预览、冲突集合、Candidate采用事务、Checkpoint及跨重启撤销形成完整闭环；失败与过期路径保持Draft不变。',
              '''# M2-03 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | Candidate只读Diff | PASS | 当前稿与候选稿差异、结构统计和采用范围清晰可见。 |
          | 无冲突采用 | PASS | 采用后Candidate状态、Revision、Checkpoint与ApplyRecord一致提交。 |
          | 冲突保护 | PASS | Revision、Hash与Lock冲突形成ConflictSet，Draft不变。 |
          | 即时与重启后撤销 | PASS | 重启后仍可撤销已采用结果，并生成新的恢复Revision。 |
          | 幂等与损坏保护 | PASS | requestId重放返回首次结果；过期或损坏Checkpoint拒绝静默回退。 |

          截图与自动化断言交叉复核一致。结论：Verified。
          ''',
              '''# M2-03 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | Diff正确性 | PASS |
          | Apply事务原子性 | PASS |
          | ConflictSet持久化 | PASS |
          | Checkpoint完整性 | PASS |
          | 跨重启Undo | PASS |
          | requestId幂等 | PASS |
          | 失败回滚 | PASS |

          最终结论：Verified。
          ''',
              ['candidate-diff', 'apply-transaction', 'conflict-set', 'persisted-undo', 'idempotency-and-rollback'],
              ['M5候选工作台扩展采用范围时必须保留同一事务、冲突与撤销语义。'],
          )

          write_evidence(
              'M2-04',
              '状态：Verified。拆章、并章、跨章移动、回收站恢复与永久删除均通过权威预览、planHash、LockGuard、恢复点和单事务保护。',
              '''# M2-04 人工验收记录

          | 验收点 | 结果 | 说明 |
          | --- | --- | --- |
          | 拆章预览与提交 | PASS | 实际按钮链路完成拆章，新章节标题、顺序与正文持久化正确。 |
          | 并章与跨章移动 | PASS | Revision、PatchLog、顺序和锁定保护均由集成测试覆盖。 |
          | 过期与事务中断 | PASS | planHash或Revision变化时拒绝提交，故障后原结构保持。 |
          | 永久删除引用检查 | PASS | Version与Candidate引用阻断删除。 |
          | 永久删除恢复点 | PASS | 界面显示废纸篓为空并记录可追溯恢复点。 |
          | 历史Version不可变 | PASS | 结构操作前后历史Version内容与Hash保持。 |

          截图与自动化断言交叉复核一致。结论：Verified。
          ''',
              '''# M2-04 质量矩阵

          | 维度 | 结果 |
          | --- | --- |
          | 权威预览与planHash | PASS |
          | LockGuard复用 | PASS |
          | 结构事务原子性 | PASS |
          | 引用影响扫描 | PASS |
          | 恢复点与故障回滚 | PASS |
          | Electron真实操作链路 | PASS |
          | 历史Version不可变 | PASS |

          最终结论：Verified。
          ''',
              ['split-chapter', 'merge-and-move', 'stale-plan-guard', 'permanent-delete-impact', 'checkpoint-and-rollback'],
              ['未来新增正文引用表时必须同步扩展永久删除影响扫描。'],
          )

      - name: Close deferred verification tasks
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          VERIFIED_COMMIT: 9110b16bfc2c08d210d0306b7b394ef20cc9c9f7
        run: |
          pnpm task:verify-final M2-01 --ci=success --commit="$VERIFIED_COMMIT"
          pnpm task:verify-final M2-02 --ci=success --commit="$VERIFIED_COMMIT"
          pnpm task:verify-final M2-03 --ci=success --commit="$VERIFIED_COMMIT"
          pnpm task:verify-final M2-04 --ci=success --commit="$VERIFIED_COMMIT"
          pnpm task:verify-final M1-08 --ci=success --commit="$VERIFIED_COMMIT"

      - name: Update final task wording and traceability
        if: ${{ steps.guard.outputs.run == 'true' }}
        shell: python
        run: |
          from pathlib import Path

          card = Path('docs/tasks/M2/M2-03_DIFF_APPLY_CONFLICT_UNDO.md')
          source = card.read_text(encoding='utf-8')
          start = source.index('## 当前实现进度（working tree）')
          end = source.index('## 阶段定位')
          replacement = '''## 最终验收结论

          - Diff Preview、Apply、ConflictSet、Checkpoint、即时Undo与跨重启Undo均已完成。
          - Format、Lint、Typecheck、Build、Unit、Integration、Migration、Security、Performance及真实Electron E2E全部通过。
          - 最终证据绑定提交`9110b16bfc2c08d210d0306b7b394ef20cc9c9f7`与Quality运行`29668237967`。
          - 任务状态：`Verified`。

          '''
          card.write_text(source[:start] + replacement + source[end:], encoding='utf-8')

          matrix = Path('docs/product/V1.0_TRACEABILITY_MATRIX.md')
          source = matrix.read_text(encoding='utf-8')
          source = source.replace('| REQ-010 | 锁定块双层保护                     | EDT-005                  | ADR-005、THREAT_MODEL                      | M2-01                      | P0-017                 | Implemented |', '| REQ-010 | 锁定块双层保护                     | EDT-005                  | ADR-005、THREAT_MODEL                      | M2-01                      | P0-017                 | Verified    |')
          source = source.replace('| REQ-011 | Revision与Hash冲突                 | VER-002                  | ADR-003/005、ERROR_CODES                   | M1-05、M2-01               | P0-018                 | Implemented |', '| REQ-011 | Revision与Hash冲突                 | VER-002                  | ADR-003/005、ERROR_CODES                   | M1-05、M2-01               | P0-018                 | Verified    |')
          source = source.replace('| REQ-012 | Draft/Candidate/Version分离        | VER-001、CND-001         | ADR-003、DATABASE_SCHEMA                   | M1-07、M2-02               | P0-020、P0-021         | Implemented |', '| REQ-012 | Draft/Candidate/Version分离        | VER-001、CND-001         | ADR-003、DATABASE_SCHEMA                   | M1-07、M2-02               | P0-020、P0-021         | Verified    |')
          marker = '## M2-01实现证据'
          index = source.index(marker)
          source = source[:index].rstrip() + '''

          ## M2延期验收闭环

          > 验收运行：https://github.com/sy220284/666/actions/runs/29668237967

          | 任务 | 已验证范围 | 证据 |
          | --- | --- | --- |
          | M2-01 | REQ-010、REQ-011；P0-017、P0-018 | `docs/test-evidence/M2-01/` |
          | M2-02 | REQ-012；P0-020、P0-021 | `docs/test-evidence/M2-02/` |
          | M2-03 | Candidate采用、冲突、Checkpoint与跨重启撤销基础；P0-030—P0-032 | `docs/test-evidence/M2-03/` |
          | M2-04 | 拆并章、跨章移动、回收站与永久删除基础；P0-034—P0-035、P0-056 | `docs/test-evidence/M2-04/` |

          M2-01至M2-04均已完成自动化、真实Electron桌面运行、截图复核和最终证据校验，任务状态关闭为`Verified`。跨M3、M5及M6的上层需求继续按对应任务推进。
          '''
          matrix.write_text(source, encoding='utf-8')

      - name: Validate closeout output
        if: ${{ steps.guard.outputs.run == 'true' }}
        run: |
          pnpm task:validate
          node --input-type=module <<'NODE'
          import { validateTaskEvidence } from './scripts/evidence-policy.mjs';
          for (const id of ['M0-05', 'M1-08', 'M2-01', 'M2-02', 'M2-03', 'M2-04']) {
            await validateTaskEvidence(id, process.cwd(), { final: true });
          }
          NODE
          pnpm exec vitest run tests/unit/evidence-policy.test.ts tests/unit/task-control.test.ts

      - name: Commit final closeout
        if: ${{ steps.guard.outputs.run == 'true' }}
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm docs/tasks/CLOSEOUT_TRIGGER.md
          git add docs/test-evidence docs/tasks docs/product/V1.0_TRACEABILITY_MATRIX.md
          git commit -m 'test(verification): close M1-08 and M2 evidence'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
