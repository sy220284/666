name: Temporary Source Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Archive source
        run: |
          tar --exclude=.git --exclude=node_modules -czf /tmp/worldforge-source.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: worldforge-source
          path: /tmp/worldforge-source.tar.gz
          retention-days: 1
