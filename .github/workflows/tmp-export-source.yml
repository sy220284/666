name: Temporary M3-02 Apply

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Reconstruct and apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/m3-02.patch.b64
          for sha in \
            c1d30c1e019362888246ede5f518ac93021d9c1b \
            71e9536a6991028a83428b76c010f69459de64f3 \
            2f039cc0e901c76c5588eb7979d070d3bd49279f \
            8d2c05deba39c24f0d3f2eb7cf03d22d34d945bd \
            204bee87bddfb0c5195ae0cd7db7373d78d4dfdb \
            9485e19cb58f0863957164d70215935e4b1d297d
          do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq .content \
              | tr -d '\n' \
              | base64 -d >> /tmp/m3-02.patch.b64
          done
          base64 -d /tmp/m3-02.patch.b64 | gzip -d > /tmp/m3-02.patch
          patch -p1 < /tmp/m3-02.patch
          rm -rf .m3-upload .m3-patch .github/workflows/tmp-export-source.yml
      - name: Format and validate governance state
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm format
          pnpm task:validate
      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(M3-02): implement SceneBeat and cross-chapter movement"
          git push origin "HEAD:${HEAD_REF}"
