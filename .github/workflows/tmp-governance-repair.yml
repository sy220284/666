name: Temporary Governance Workflow Export

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - .github/governance/tmp-workflow-export.mjs
      - .github/workflows/tmp-governance-repair.yml

permissions:
  contents: read

concurrency:
  group: temporary-governance-workflow-export-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  export:
    if: ${{ github.head_ref == 'fix/governance-controlled-merge-transition' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Generate target workflows
        run: node .github/governance/tmp-workflow-export.mjs
      - name: Format target workflows
        run: pnpm exec prettier --write .github/workflows/automerge.yml .github/workflows/evidence.yml .github/workflows/pr-policy.yml .github/workflows/task-governance.yml .github/workflows/post-merge-verification.yml
      - name: Export target workflows
        uses: actions/upload-artifact@v7
        with:
          name: controlled-merge-workflows
          path: |
            .github/workflows/automerge.yml
            .github/workflows/evidence.yml
            .github/workflows/pr-policy.yml
            .github/workflows/task-governance.yml
            .github/workflows/post-merge-verification.yml
          if-no-files-found: error
          retention-days: 7
