name: Temporary Governance Repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - .github/governance/tmp-governance-repair.mjs
      - .github/governance/tmp-governance-lint-fix.mjs
      - .github/workflows/tmp-governance-repair.yml

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: temporary-governance-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    if: ${{ github.head_ref == 'fix/governance-controlled-merge-transition' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply governance repair
        run: node .github/governance/tmp-governance-repair.mjs
      - name: Apply generated lint cleanup
        run: node .github/governance/tmp-governance-lint-fix.mjs
      - name: Synchronize task mirror
        run: node scripts/taskctl.mjs sync
      - name: Remove temporary generators before validation
        run: git rm .github/governance/tmp-governance-repair.mjs .github/governance/tmp-governance-lint-fix.mjs
      - name: Format
        run: pnpm format
      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee governance-lint.log
      - name: Upload lint diagnostic
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: governance-lint-diagnostic
          path: governance-lint.log
          if-no-files-found: error
          retention-days: 7
      - name: Typecheck
        run: pnpm typecheck
      - name: Governance unit tests
        run: pnpm exec vitest run tests/unit/task-control.test.ts tests/unit/task-ordering.test.ts
      - name: Governance self-tests
        run: |
          node .github/governance/automerge-base-gate.mjs self-test
          node .github/governance/task-transition-policy.mjs self-test
          node scripts/taskctl.mjs validate
      - name: Repair missing PR 68 Main Verification
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import { ensureMainVerification } from './scripts/automerge.mjs';
          const config = JSON.parse(await readFile('.github/governance/required-checks.json', 'utf8'));
          await ensureMainVerification(
            'sy220284',
            '666',
            config,
            '24f8dd933af008c68f143869a4661f463d1e5d0f',
            68,
            '2ec055e38b39870bfafc2d459d5bea2ca1ede541',
          );
          NODE
      - id: commit
        name: Commit final governance repair
        continue-on-error: true
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -o pipefail
          {
            set -eux
            rm -f governance-lint.log
            git rm --ignore-unmatch .github/workflows/tmp-governance-repair.yml
            git add -A
            git status --short
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'fix(governance): harden controlled merge and task transitions'
            git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          } 2>&1 | tee governance-commit.log
      - name: Upload commit diagnostic
        if: ${{ steps.commit.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: governance-commit-diagnostic
          path: governance-commit.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce commit success
        if: ${{ steps.commit.outcome == 'failure' }}
        run: exit 1
