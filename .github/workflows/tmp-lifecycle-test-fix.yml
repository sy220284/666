name: Temporary Lifecycle Snapshot Fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - .github/governance/tmp-lifecycle-test-fix.mjs
      - .github/workflows/tmp-lifecycle-test-fix.yml

permissions:
  contents: write

concurrency:
  group: temporary-lifecycle-snapshot-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/governance-controlled-merge-transition' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Apply lifecycle snapshot fix
        run: node .github/governance/tmp-lifecycle-test-fix.mjs
      - name: Remove temporary generator before validation
        run: git rm .github/governance/tmp-lifecycle-test-fix.mjs
      - name: Format
        run: pnpm format
      - name: Lint
        run: pnpm lint
      - name: Lifecycle and governance tests
        run: pnpm exec vitest run tests/integration/task-lifecycle.test.ts tests/unit/task-control.test.ts
      - name: Commit non-workflow fix
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows/tmp-lifecycle-test-fix.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(governance): verify isolated transition snapshots'
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
