name: Temporary M3-02 Diagnose

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    env:
      TASK_BASE_REF: ${{ github.event.pull_request.base.sha }}
      TASK_EVENT_NAME: pull_request
      TASK_PR_HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          node scripts/taskctl.mjs preflight > /tmp/preflight.log 2>&1
          node scripts/evidence-policy.mjs > /tmp/evidence.log 2>&1
          pnpm lint > /tmp/lint.log 2>&1
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: m3-02-diagnostics
          path: |
            /tmp/preflight.log
            /tmp/evidence.log
            /tmp/lint.log
          retention-days: 1
