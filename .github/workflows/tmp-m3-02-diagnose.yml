name: Temporary M3-02 Sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Sync current main and apply diagnosed fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          python - <<'PY'
          from pathlib import Path
          path = Path('packages/contracts/src/index.ts')
          text = path.read_text()
          target = '  type SceneBeat,\n'
          if target not in text:
              raise SystemExit('SceneBeat unused import was not found')
          path.write_text(text.replace(target, '', 1))
          PY
          rm -f .github/workflows/tmp-m3-02-diagnose.yml
      - name: Format and validate
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm format
          pnpm lint
          pnpm task:validate
      - name: Commit synchronized implementation
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "fix(M3-02): sync current main and resolve gate diagnostics"
          git push origin "HEAD:${HEAD_REF}"
