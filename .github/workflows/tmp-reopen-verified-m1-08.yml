name: Temporary Reopen Verified M1-08

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  transition:
    if: ${{ github.head_ref == 'chore/reopen-verified-m1-08' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chore/reopen-verified-m1-08
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Allow verified tasks to reopen for quality remediation
        shell: python
        run: |
          import re
          from pathlib import Path

          path = Path('scripts/taskctl.mjs')
          source = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r"  const deferred = \(state\.deferredVerification \?\? \[\]\)\.find\(\(entry\) => entry\.id === taskId\);\n"
              r"  if \(!deferred\) throw new Error\(`\$\{taskId\} is not in deferredVerification`\);\n"
              r"  const target = taskIndex\.get\(taskId\);\n"
              r"  if \(!target \|\| target\.status !== 'Implemented'\) \{\n"
              r"    throw new Error\(`\$\{taskId\} must be Implemented before reopening`\);\n"
              r"  \}\n"
          )
          replacement = """  const deferred = (state.deferredVerification ?? []).find((entry) => entry.id === taskId);
          const target = taskIndex.get(taskId);
          if (!target || !['Implemented', 'Verified'].includes(target.status)) {
            throw new Error(`${taskId} must be Implemented or Verified before reopening`);
          }
          if (target.status === 'Implemented' && !deferred) {
            throw new Error(`${taskId} is not in deferredVerification`);
          }
          """
          source, count = pattern.subn(replacement, source, count=1)
          if count != 1:
            raise SystemExit(f'reopen target guard replacement count: {count}')
          old_card = "const reopenedCard = replaceTaskCardStatus(targetCard, 'Implemented', 'In Progress');"
          new_card = "const reopenedCard = replaceTaskCardStatus(targetCard, target.status, 'In Progress');"
          if old_card not in source:
            raise SystemExit('reopen card replacement target missing')
          source = source.replace(old_card, new_card, 1)
          old_error = "if (reopenedCard === targetCard) throw new Error(`${taskId} card is not Implemented`);"
          new_error = "if (reopenedCard === targetCard) throw new Error(`${taskId} card is not ${target.status}`);"
          if old_error not in source:
            raise SystemExit('reopen card error target missing')
          source = source.replace(old_error, new_error, 1)
          path.write_text(source, encoding='utf-8')
      - run: pnpm exec prettier --write scripts/taskctl.mjs
      - name: Record M3-02 implementation
        run: node scripts/taskctl.mjs advance --ci=success --commit=63d4d9c07ed3932a13adfc18bc19531bf15e77d3
      - name: Reopen verified M1-08 and pause the next active task
        run: node scripts/taskctl.mjs reopen M1-08
      - run: node scripts/taskctl.mjs validate
      - run: pnpm exec vitest run tests/unit/task-control.test.ts
      - name: Commit transition and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/tmp-reopen-verified-m1-08.yml
          git add scripts/taskctl.mjs docs/tasks docs/product/V1.0_TRACEABILITY_MATRIX.md
          git commit -m "chore(tasks): reopen M1-08 quality remediation"
          git push origin HEAD:chore/reopen-verified-m1-08
