name: Temporary Reopen Verified M1-08

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  transition:
    if: ${{ github.head_ref == 'chore/reopen-verified-m1-08' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chore/reopen-verified-m1-08
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Allow verified tasks to reopen for quality remediation
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/taskctl.mjs')
          source = path.read_text(encoding='utf-8')
          old = """  const deferred = (state.deferredVerification ?? []).find((entry) => entry.id === taskId);
          if (!deferred) throw new Error(`${taskId} is not in deferredVerification`);
          const target = taskIndex.get(taskId);
          if (!target || target.status !== 'Implemented') {
            throw new Error(`${taskId} must be Implemented before reopening`);
          }
          """
          new = """  const deferred = (state.deferredVerification ?? []).find((entry) => entry.id === taskId);
          const target = taskIndex.get(taskId);
          if (!target || !['Implemented', 'Verified'].includes(target.status)) {
            throw new Error(`${taskId} must be Implemented or Verified before reopening`);
          }
          if (target.status === 'Implemented' && !deferred) {
            throw new Error(`${taskId} is not in deferredVerification`);
          }
          """
          if old not in source:
            raise SystemExit('reopen target guard not found')
          source = source.replace(old, new)
          source = source.replace(
            "const reopenedCard = replaceTaskCardStatus(targetCard, 'Implemented', 'In Progress');",
            "const reopenedCard = replaceTaskCardStatus(targetCard, target.status, 'In Progress');",
          )
          source = source.replace(
            "if (reopenedCard === targetCard) throw new Error(`${taskId} card is not Implemented`);",
            "if (reopenedCard === targetCard) throw new Error(`${taskId} card is not ${target.status}`);",
          )
          path.write_text(source, encoding='utf-8')
      - run: pnpm exec prettier --write scripts/taskctl.mjs
      - name: Record M3-02 implementation
        run: node scripts/taskctl.mjs advance --ci=success --commit=63d4d9c07ed3932a13adfc18bc19531bf15e77d3
      - name: Reopen verified M1-08 and pause the next active task
        run: node scripts/taskctl.mjs reopen M1-08
      - run: node scripts/taskctl.mjs validate
      - run: pnpm exec vitest run tests/unit/task-control.test.ts
      - name: Commit transition and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/tmp-reopen-verified-m1-08.yml
          git add scripts/taskctl.mjs docs/tasks docs/product/V1.0_TRACEABILITY_MATRIX.md
          git commit -m "chore(tasks): reopen M1-08 quality remediation"
          git push origin HEAD:chore/reopen-verified-m1-08
