<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldForge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">LOCAL-FIRST WRITING WORKSTATION</p>
      <h1>WorldForge</h1>
      <p class="lede">The secure desktop shell is connected to its supervised Core service.</p>
      <section class="status-card" aria-live="polite">
        <span>Core status</span>
        <strong data-core-status>starting</strong>
        <small data-diagnostic-id></small>
      </section>
      <button type="button" data-restart-core>Restart Core</button>
      <footer data-app-version>WorldForge</footer>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
